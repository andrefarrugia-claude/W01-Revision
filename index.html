<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revision Platform for W01 — Award in General Insurance</title>
<meta name="description" content="Revision platform for W01 Award in General Insurance: ten topics with flashcards, quizzes, sorters and printable fact sheets.">
<meta name="theme-color" content="#080B16">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Insurance Course">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgdmlld0JveD0iMCAwIDE5MiAxOTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjE5MiIgaGVpZ2h0PSIxOTIiIGZpbGw9IiMxQjJBNEEiIHJ4PSI0NSIvPjx0ZXh0IGZvbnQtc2l6ZT0iNzgiIGZvbnQtd2VpZ2h0PSI4MDAiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZmlsbD0iI0M5QTIzRiIgeD0iMzAiIHk9IjExNCI+RklDPC90ZXh0Pjwvc3ZnPg==">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080B16; --card:rgba(247,240,221,.05); --card2:rgba(247,240,221,.09);
  --ink:#F0EBDC; --ink2:#9AA2BC;
  --blue:#C9A23F; --blue-d:#A07E22; --orange:#C9A23F; --vio:#1B2A4A; --pink:#C9A23F;
  --green:#34D399; --red:#E5484D; --amber:#E7C766;
  --gold:#C9A23F; --gold-l:#E7C766; --navy:#1B2A4A; --cream:#F4ECD8;
  --line:rgba(201,162,63,.16); --line2:rgba(201,162,63,.34); --shadow:rgba(0,0,0,.55);
  --grad:linear-gradient(180deg,#E7C766 0%,#C9A23F 100%);
  --grad2:linear-gradient(160deg,#F6E29B 0%,#C9A23F 100%);
  --paper:rgba(255,255,255,.07);
  --mono:'IBM Plex Mono',monospace; --disp:'Space Grotesk',sans-serif; --body:'Inter',sans-serif; --hero:'Unbounded',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--body);min-height:100vh;-webkit-tap-highlight-color:transparent}
body::before{content:"";position:fixed;inset:-22%;z-index:-1;pointer-events:none;
  background:radial-gradient(46% 40% at 50% -6%,rgba(201,162,63,.14),transparent 70%),
             radial-gradient(52% 46% at 50% 108%,rgba(27,42,74,.55),transparent 72%);
  filter:blur(40px);animation:aurora 30s ease-in-out infinite alternate}
@keyframes aurora{from{transform:translate3d(-2.5%,-2%,0) scale(1)}to{transform:translate3d(2.5%,3%,0) scale(1.07)}}
button{font-family:var(--body)}
button:focus-visible{outline:2.5px solid var(--blue);outline-offset:2px;border-radius:8px}
.wrap{max-width:720px;margin:0 auto;padding:0 16px 70px}
.hz{height:5px;background:linear-gradient(90deg,#C9A23F,#E7C766 55%,#C9A23F);border-radius:0 0 3px 3px}

.topbar{display:flex;align-items:center;gap:10px;padding:18px 0 12px;flex-wrap:wrap}
.back{border:1.5px solid var(--line2);background:var(--card);color:var(--ink);border-radius:11px;padding:8px 13px;
  font:600 13px var(--body);cursor:pointer;transition:.15s;backdrop-filter:blur(10px)}
.back:hover{background:var(--card2)}
.back:active{transform:scale(.95)}
.brand{flex:1;cursor:pointer}
.brand .k{font:600 9px var(--mono);letter-spacing:.26em;text-transform:uppercase;color:var(--ink2)}
.brand .t{font:700 16px var(--hero);line-height:1.25;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.xpill{font:700 11.5px var(--mono);background:var(--grad);border:none;color:#081021;border-radius:20px;padding:8px 14px;white-space:nowrap;box-shadow:0 4px 16px rgba(201,162,63,.45)}
.xpill b{font-size:15px;color:#081021}

/* Topic selector (master pull-down) */
.tswrap{position:relative;width:100%;margin:4px 0 6px;z-index:60}
.tsbtn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:linear-gradient(160deg,#1B2A4A 0%,#0E1730 100%);border:1.5px solid rgba(201,162,63,.42);
  color:var(--cream);font:700 14px var(--disp);padding:13px 16px;border-radius:14px;cursor:pointer;
  box-shadow:0 10px 28px var(--shadow),inset 0 1px 0 rgba(255,255,255,.08);transition:.15s}
.tsbtn:hover{border-color:var(--blue);box-shadow:0 12px 32px var(--shadow),0 0 22px rgba(201,162,63,.22)}
.tsbtn .tslbl{display:flex;align-items:center;gap:10px;flex:1;text-align:left}
.tsbtn .tsno{font:700 11px var(--mono);background:var(--grad);color:#081021;border-radius:6px;padding:3px 8px;letter-spacing:.08em}
.tsbtn .tsti{font:700 14px var(--disp);color:var(--cream)}
.tsbtn .tsch{font-size:13px;color:var(--blue);transition:.2s}
.tswrap.open .tsbtn .tsch{transform:rotate(180deg)}
.tsdd{position:absolute;top:calc(100% + 8px);left:0;right:0;background:#0E1730;border:1.5px solid rgba(201,162,63,.42);
  border-radius:15px;padding:7px;box-shadow:0 22px 50px rgba(0,0,0,.7);z-index:70;display:none;
  max-height:min(72vh,560px);overflow-y:auto;animation:ddpop .15s ease-out}
.tswrap.open .tsdd{display:block}
.tsitem{display:flex;width:100%;text-align:left;background:none;border:0;border-radius:10px;padding:11px 12px;cursor:pointer;
  color:var(--ink);transition:.12s;gap:11px;align-items:flex-start}
.tsitem:hover,.tsitem:focus-visible{background:rgba(201,162,63,.14)}
.tsitem.cur{background:rgba(201,162,63,.16);outline:1px solid rgba(201,162,63,.5)}
.tsitem .tsino{flex:none;font:700 10.5px var(--mono);background:var(--grad);color:#081021;border-radius:6px;padding:4px 7px;letter-spacing:.06em;margin-top:1px}
.tsitem .tsibd{flex:1}
.tsitem .tsitt{font:700 13.5px var(--disp);color:var(--cream);line-height:1.2}
.tsitem .tsisb{font:500 11.2px var(--body);color:var(--ink2);margin-top:2px;line-height:1.4}

.statrow{display:flex;gap:8px;margin:16px 0 4px;flex-wrap:wrap}
.stat{flex:1;min-width:74px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 11px;backdrop-filter:blur(10px)}
.stat .n{font:700 22px var(--hero);background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.stat .l{font:600 8.5px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);margin-top:3px}
.lvlbar{height:9px;background:var(--line);border-radius:5px;margin:12px 0 4px;overflow:hidden}
.lvlbar i{display:block;height:100%;background:var(--grad);border-radius:5px;box-shadow:0 0 14px rgba(201,162,63,.5);transition:.4s}
.lvlmeta{display:flex;justify-content:space-between;font:500 10px var(--mono);color:var(--ink2)}
.scoresec{margin:16px 0 4px;background:linear-gradient(160deg,#C3C8D2 0%,#AAB1BE 100%);border:1px solid #969DAC;border-radius:20px;padding:14px;box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 16px 38px var(--shadow)}
.scoresec .statrow{margin:0 0 12px}
.scoresec .stat{background:#11141F;border:1px solid rgba(201,162,63,.28);backdrop-filter:none}
.scoresec .lvlbar{background:rgba(18,22,34,.4);margin:4px 0}
.scoresec .lvlmeta{color:#2E3543}
.scale{margin-top:11px;background:transparent;border:0;border-top:1px solid rgba(27,42,74,.18);border-radius:0;padding:9px 2px 0}
.scale .sh{font:600 9px var(--mono);letter-spacing:.24em;text-transform:uppercase;color:#414B61;padding:2px 9px 7px}
.srow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 9px;border-radius:9px;font:600 11px var(--mono);color:#4C5670;border:1px solid transparent}
.srow .lbl{letter-spacing:.16em;text-transform:uppercase;color:#1B2A4A}
.srow.on{background:rgba(27,42,74,.12);border-color:rgba(27,42,74,.38);color:#1B2A4A}
.srow.on .lbl{color:#1B2A4A}
.you{font:600 9px var(--mono);font-style:normal;color:#39455F;letter-spacing:.1em;margin-left:6px}
.seclbl{font:600 11px var(--mono);letter-spacing:.3em;text-transform:uppercase;color:var(--ink2);
  margin:26px 0 10px;display:flex;align-items:center;gap:10px}
.seclbl:after{content:"";flex:1;height:1px;background:var(--line)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{position:relative;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:18px;
  overflow:hidden;cursor:pointer;transition:.18s;padding:0;backdrop-filter:blur(10px)}
.tile:hover{transform:translateY(-3px);border-color:var(--line2);box-shadow:0 14px 34px var(--shadow),0 0 0 1px rgba(201,162,63,.3),0 0 24px rgba(201,162,63,.16)}
.tile .in{padding:14px 15px 15px}
.tile .eb{font:600 9px var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--blue)}
.tile h3{font:700 19px var(--disp);margin:5px 0 4px;line-height:1.08;color:var(--ink)}
.tile .d{font-size:12px;color:var(--ink2);line-height:1.5}
.tile .m{font:500 9.5px var(--mono);color:var(--ink2);margin-top:10px}
.tile.wide{grid-column:1/-1}
.tile.facts .eb{color:var(--pink)}
.tile.facts h3{font-size:22px}
.tile .fsmed{width:42px;height:42px;margin-bottom:11px}
.tile .fsmed svg{width:22px;height:22px}
.resume{position:absolute;top:14px;right:12px;font:600 9px var(--mono);letter-spacing:.12em;
  background:rgba(52,211,153,.16);border:1px solid var(--green);color:var(--green);border-radius:7px;padding:4px 8px;text-transform:uppercase}

/* Topic tile (master page) */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
@media (max-width:480px){.tgrid{grid-template-columns:1fr}}
.ttile{position:relative;text-align:left;background:linear-gradient(160deg,rgba(27,42,74,.55) 0%,rgba(14,23,48,.7) 100%);
  border:1.5px solid rgba(201,162,63,.28);border-radius:18px;overflow:hidden;cursor:pointer;transition:.18s;padding:0;
  backdrop-filter:blur(10px);box-shadow:0 10px 28px var(--shadow)}
.ttile:hover{transform:translateY(-3px);border-color:var(--blue);box-shadow:0 14px 34px var(--shadow),0 0 22px rgba(201,162,63,.2)}
.ttile .in{padding:15px 16px 16px}
.ttile .tno{font:700 10.5px var(--mono);background:var(--grad);color:#081021;border-radius:6px;padding:3px 8px;letter-spacing:.08em;display:inline-block;margin-bottom:8px}
.ttile h3{font:700 16.5px var(--disp);line-height:1.18;color:var(--cream);margin-bottom:6px}
.ttile .td{font-size:12px;color:var(--ink2);line-height:1.5}
.ttile .tm{font:500 9px var(--mono);letter-spacing:.14em;color:var(--blue);margin-top:9px;text-transform:uppercase}
.ttile.done{border-color:rgba(52,211,153,.5)}
.ttile.done .tno{background:linear-gradient(180deg,#7BE2BB 0%,#34D399 100%)}
.ttile .doneb{position:absolute;top:12px;right:12px;font:600 8.5px var(--mono);letter-spacing:.12em;
  background:rgba(52,211,153,.18);border:1px solid var(--green);color:var(--green);border-radius:6px;padding:3px 7px;text-transform:uppercase}

.panel{background:var(--card);border:1px solid var(--line);border-radius:20px;backdrop-filter:blur(12px);
  padding:24px 22px;position:relative;overflow:hidden;margin-bottom:14px;box-shadow:0 14px 36px var(--shadow)}
.tag{font:600 10px var(--mono);letter-spacing:.2em;text-transform:uppercase;color:var(--blue)}
.h2{font:700 24px var(--disp);margin:8px 0 6px;line-height:1.08;color:var(--ink)}
.bd{font-size:14.5px;line-height:1.6;color:#CBD3F0}
.bd ul{list-style:none;margin-top:8px}
.bd li{padding:8px 0 8px 24px;position:relative;border-bottom:1px dashed var(--line)}
.bd li:before{content:"◆";position:absolute;left:2px;top:9px;color:var(--pink);font-size:10px}
.note{margin-top:12px;font-size:12.5px;color:#8FE9C2;font-style:italic;line-height:1.55;
  border-left:3px solid var(--green);padding-left:10px}
#card{background:linear-gradient(160deg,#E7EAF0 0%,#CCD1DB 100%);border-color:#B0B6C2;box-shadow:inset 0 1px 0 rgba(255,255,255,.65),0 16px 38px var(--shadow)}
#card .tag{color:#5A6273}
#card .h2{color:#1B2A4A}
#card .bd{color:#2A3856}
#card .bd li{border-bottom:1px dashed rgba(27,42,74,.18)}
#card .bd li:before{color:#7B8494}
#card .chint{color:#5A6273}
#card .note{color:#2F6B53;background:transparent;border-left-color:#34D399}
#card .stamp{background:rgba(18,22,34,.82)}

.opts{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.opt{text-align:left;font-size:13.5px;line-height:1.45;padding:12px 13px;border:1.5px solid var(--line);
  background:var(--card);color:var(--ink);border-radius:13px;cursor:pointer;transition:.15s;display:flex;gap:10px;align-items:flex-start}
.opt:hover{border-color:var(--blue);background:var(--card2);box-shadow:0 0 16px rgba(201,162,63,.18)}
.opt .let{font:600 12px var(--mono);color:var(--blue);margin-top:1px}
.opt.right{background:rgba(52,211,153,.13);border-color:var(--green);color:#A7F3D0;box-shadow:0 0 18px rgba(52,211,153,.25)}
.opt.wrong{background:rgba(251,113,133,.12);border-color:var(--red);color:#FECDD3}
.opt.right .let{color:var(--green)} .opt.wrong .let{color:var(--red)}
.explain{margin-top:12px;font-size:13px;background:rgba(251,191,36,.09);border-left:3px solid var(--amber);color:#EDE4C4;
  padding:10px 12px;border-radius:0 10px 10px 0;line-height:1.55;display:none}

.nav{display:flex;gap:8px;margin-top:8px}
.btn{flex:1;font:700 14px var(--disp);padding:14px;border-radius:14px;border:1.5px solid var(--line2);
  cursor:pointer;transition:.15s;color:var(--ink)}
.btn:hover{background:var(--card2)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.ghost{background:transparent}
.solid{background:var(--grad);border:none;color:#081021;box-shadow:0 6px 20px rgba(201,162,63,.4)}
.solid:hover{filter:brightness(1.1);background:var(--grad)}
.solid.blue{background:var(--blue);color:#1B1402}
.solid.orange{background:var(--grad2);color:#2A1208}
.knew{display:flex;gap:8px;margin-top:10px}
.knew .btn{font-size:12.5px;padding:12px}
.b-good{background:rgba(52,211,153,.13);border-color:var(--green);color:#A7F3D0}
.b-bad{background:rgba(251,113,133,.12);border-color:var(--red);color:#FECDD3}
.btn.danger{border-color:rgba(251,113,133,.45);color:var(--red)}
.btn.danger:hover{background:rgba(251,113,133,.1)}
.resetrow{display:flex;align-items:center;justify-content:flex-end;gap:11px;margin-top:20px}
.rbtn{width:38px;height:38px;flex:none;border-radius:50%;border:none;background:#C0392B;color:#fff;font-size:18px;line-height:1;cursor:pointer;box-shadow:0 5px 16px rgba(192,57,43,.5);transition:.15s;display:flex;align-items:center;justify-content:center}
.rbtn:hover{background:#A93226}
.rbtn:active{transform:scale(.9)}
.rlbl{font:600 11px var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--ink2);cursor:pointer}
.rlbl:hover{color:var(--ink)}

.progress{height:8px;background:var(--line);border-radius:5px;margin:14px 0 5px;overflow:hidden}
.progress i{display:block;height:100%;background:var(--grad);border-radius:5px;box-shadow:0 0 12px rgba(201,162,63,.45);transition:.3s}
.meta{display:flex;justify-content:space-between;font:500 11px var(--mono);color:var(--ink2)}

@keyframes stampIn{0%{transform:scale(2.4) rotate(-14deg);opacity:0}60%{transform:scale(.92) rotate(-8deg);opacity:1}100%{transform:scale(1) rotate(-8deg)}}
.stamp{position:absolute;top:16px;right:14px;font:600 13px var(--mono);letter-spacing:.1em;text-transform:uppercase;
  border:3px solid var(--green);color:var(--green);border-radius:9px;padding:6px 12px;
  transform:rotate(-8deg);animation:stampIn .4s cubic-bezier(.2,1.4,.3,1);background:rgba(7,10,23,.78);pointer-events:none;z-index:3;backdrop-filter:blur(4px)}
.stamp.red{border-color:var(--red);color:var(--red)}
.stamp.blue{border-color:var(--blue);color:var(--blue)}

.bigtimer{font:600 27px var(--mono);text-align:center;margin:6px 0;color:var(--red);text-shadow:0 0 18px rgba(251,113,133,.55)}

.sccard{min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.sccard .sc{font:700 clamp(22px,6vw,30px) var(--disp);line-height:1.12;padding:0 8px;color:var(--ink)}
.sccard .cq{font:600 11px var(--mono);letter-spacing:.2em;text-transform:uppercase;color:var(--ink2);margin-bottom:10px}
.sorbtns{display:flex;gap:10px;margin-top:10px}
.sorbtns .btn{padding:20px 8px;font:700 16px var(--disp);border-width:2px}
.sorbtns .L{border-color:#7E8AAE;color:#C9D2EC;background:rgba(126,138,174,.12)}
.sorbtns .L:hover{box-shadow:0 0 20px rgba(126,138,174,.3)}
.sorbtns .R{border-color:var(--gold);color:var(--gold-l);background:rgba(201,162,63,.1)}
.sorbtns .R:hover{box-shadow:0 0 20px rgba(201,162,63,.3)}
.combo{font:600 12px var(--mono);text-align:center;color:var(--amber);height:16px;margin-top:6px;text-shadow:0 0 12px rgba(251,191,36,.5)}
.flash-g{animation:fg .35s} .flash-r{animation:fr .35s}
@keyframes fg{0%{box-shadow:0 0 0 4px var(--green) inset}100%{box-shadow:none}}
@keyframes fr{0%{box-shadow:0 0 0 4px var(--red) inset}100%{box-shadow:none}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .3s}

.result{text-align:center;padding:28px 18px}
.result .big{font:700 50px var(--hero);background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.result .big small{font-size:20px;-webkit-text-fill-color:var(--ink2);color:var(--ink2)}
.result .msg{font-size:14px;color:var(--ink2);margin:10px 0 16px;line-height:1.55}
.badge{display:inline-block;background:var(--card2);border:1px solid var(--line2);color:var(--ink);font:600 10.5px var(--mono);
  padding:6px 12px;border-radius:20px;margin:3px}
.badge.g{background:rgba(52,211,153,.16);border-color:var(--green);color:var(--green)}
.badge.o{background:rgba(255,138,76,.14);border-color:var(--orange);color:var(--orange)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(90px);
  background:rgba(13,17,38,.9);border:1.5px solid var(--line2);color:var(--ink);padding:12px 20px;border-radius:30px;font:600 13px var(--body);
  transition:.35s;z-index:9;box-shadow:0 12px 30px rgba(0,0,0,.55),0 0 22px rgba(201,162,63,.2);max-width:90vw;text-align:center;backdrop-filter:blur(14px)}
.toast.show{transform:translateX(-50%) translateY(0)}
footer{text-align:center;font:500 10.5px var(--mono);color:var(--ink2);margin-top:26px}
.hide{display:none!important}

@media (max-width:430px){.grid{grid-template-columns:1fr}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

.fswrap{margin-bottom:16px}
.fs{position:relative;background:linear-gradient(160deg,#EDEFF3 0%,#DCE0E7 100%);border:2.5px solid #1B2A4A;border-radius:4px;padding:24px 20px 18px;box-shadow:0 10px 26px var(--shadow)}
.fs:before{content:"";position:absolute;inset:7px;border:1.5px solid #AEB4C0;border-radius:2px;pointer-events:none}
.fs:after{content:"❖";position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:#EDEFF3;color:#8E96A4;padding:0 10px;font-size:14px;line-height:1}
.fshead{display:flex;gap:13px;align-items:flex-start}
.fshead svg.crest{flex:none;width:48px;height:56px;margin-top:2px}
.fshk{font:600 9px var(--mono);letter-spacing:.28em;text-transform:uppercase;color:#5A6273}
.fst{font:800 clamp(21px,5.4vw,29px) 'Playfair Display',serif;color:#1B2A4A;line-height:1.05;letter-spacing:.01em;text-transform:uppercase;margin-top:3px}
.fsrule{height:2px;background:linear-gradient(90deg,#9AA2B2 0%,#9AA2B2 55%,transparent);margin:9px 0}
.fsintro{font-size:12.4px;line-height:1.62;color:#33405C;text-align:justify}

 {n:"01",kick:"Foundations",ti:"The Concept of Risk",
  blurb:"Five classic definitions, the scholars' positions, and risk read more broadly as uncertainty over a future outcome.",
  intro:"From an academic perspective, numerous scholars and researchers in the field of risk studies have defined risk as an event whose occurrence is uncertain. When such a risk materialises, it may develop into a catastrophe, resulting in both tangible and intangible losses. Alternatively, risk may be viewed as a potential loss based on varying probabilities. These probabilities may relate to individuals, such as death, illness or disability, or to property and assets, such as fire, collision, theft, structural collapse, the sinking of vessels, and other perils.",
  dhead:"Definition of risk in insurance",
  dlede:"Risk has been defined in insurance literature in several ways, including the following:",
  defs:[
   ["people","Risk is the possibility of an event and its associated consequences arising from a particular situation."],
   ["chart","Risk is the probability of an event that may result in an economic loss."],
   ["question","Risk represents uncertainty in predicting and evaluating future events."],
   ["down","Risk is the possibility of loss."],
   ["link","Risk may be viewed as a combination of interrelated events."]],
  wrap:"In general, the foregoing definitions may be consolidated into a broader concept whereby risk is regarded as an intangible phenomenon that influences individuals when making daily decisions, creating a state of doubt, concern or uncertainty regarding the outcomes of those decisions in relation to a particular matter or course of action.",
  chead:"A further definition may also be proposed",cicon:"shield",
  callout:"Risk is a contingent event whose occurrence is uncertain; and even where its occurrence is inevitable, the timing of that occurrence remains unknown — as is the case in life insurance.",
  notes:[
   ["book","Various definitions of risk have been advanced in the literature. Although they differ in wording and interpretation, they generally agree on the essential nature of risk and the consequences arising from its occurrence. Mark R. Greene, in his book <i>Risk and Insurance</i>, defines risk as “the possibility of loss”; likewise, Riegel and Miller, in <i>Insurance Principles and Practice</i>, define it as “the possibility that something may happen”."],
   ["quote","A broader interpretation of the concept of risk can be found in Williams and Heins' <i>Risk Management and Insurance</i>. The authors move beyond the conventional view of risk as merely a loss-producing event and define it as the uncertainty experienced by individuals regarding future outcomes, even when all possible outcomes and their probabilities are known."],
   ["magnifier","Particular attention should be paid to the authors' use of the term “future outcome” rather than limiting risk to an event that results in a loss. This perspective reflects a more objective and realistic approach, recognising that the occurrence of risk may simply represent a qualitative change from a state of soundness or utility to a state of impairment or damage."],
   ["gear","The physical changes resulting from such an occurrence may render the property wholly or partially unfit for its intended use. On the other hand, the occurrence of a future outcome becomes particularly relevant in the context of life assurance."],
   ["people","For example, under a Pure Endowment policy, the occurrence of the insured contingency may produce a positive outcome. Survival to the age specified in the policy entitles the policyholder to receive the agreed insurance benefit."]],
  conicon:"scales",
  conclusion:"Accordingly, this broader interpretation of risk as uncertainty regarding future outcomes appears to be more consistent with practical reality, particularly where the consequences of its occurrence may not necessarily be adverse and may, in certain circumstances, produce desirable results."},
 {n:"02",kick:"Classification",ti:"Classifying Risk",
  blurb:"The three axes — financial, pure or speculative, fundamental or particular — and why only some risks qualify for insurance.",
  intro:"Risk exists wherever the future cannot be known with certainty: it rests on doubt over the cause and its effect, uncertainty of the future and its outcome, and the unpredictability of a loss or negative result. Before any exposure can be assessed or priced, however, it must first be classified, since classification determines whether the mechanism of insurance can respond to it at all.",
  dhead:"How risk is classified in insurance",
  dlede:"Every risk may be placed on three independent axes, supported by two further distinctions:",
  defs:[
   ["coin","Financial or non-financial — whether the consequences of the event can be measured and expressed in monetary terms."],
   ["scales","Pure or speculative — whether the exposure can result only in a loss or, at best, the status quo, or whether it also carries a genuine chance of gain."],
   ["people","Fundamental or particular — whether the risk is widespread in its cause and effect, touching whole communities, or personal and individual in both respects."],
   ["question","Risk or chance — both describe uncertainty; risk denotes the possibility of an adverse outcome, whereas chance implies the possibility of a favourable one."],
   ["magnifier","True, insurable uncertainty — it may or may not be recognised by the parties, it is fortuitous rather than deliberate, and it lies beyond the control of the insured."]],
  wrap:"Taken together, these distinctions form the underwriter's first filter. By placing a proposed risk on each axis in turn, the insurer establishes at the outset whether the exposure is of a kind that the insurance mechanism is capable of carrying.",
  chead:"A working rule may also be proposed",cicon:"shield",
  callout:"Insurers favour risks that are financial, pure and particular. Speculative risk is deliberately undertaken in the hope of profit and is therefore excluded, while fundamental risks are frequently too large to be pooled privately and may call for state or pooled solutions.",
  notes:[
   ["flame","Pure risks — a house fire, theft of stock, a workplace injury — can produce only a loss or leave matters as they were; no gain is possible. Speculative risks, such as investing in shares, trading currency or launching a new product, are accepted voluntarily precisely because gain is possible."],
   ["people","Fundamental risks such as war, famine, pandemic and earthquake arise from causes outside any individual and strike whole societies; particular risks, such as a single car crash or an office burglary, arise from individual causes and fall upon individuals."],
   ["matrix","The same peril may sit on either side of the line according to its scale: a nationwide flood is fundamental in character, while a burst pipe damaging one home remains a particular risk."],
   ["down","Non-financial outcomes — sentimental value, the choice of a career or of a spouse — cannot be measured in money and accordingly fall outside the scope of insurance altogether."]],
  conicon:"target",
  conclusion:"Classification is therefore not a mere academic exercise but the gateway to underwriting. Get the classification right and the rest of the underwriting decision flows naturally; misclassify the risk and the insurer either declines what could have been written, or worse, accepts what should have been refused."},
 {n:"03",kick:"Cause of Loss",ti:"Peril, Hazard and the Measurement of Risk",
  blurb:"What causes a loss, what makes that loss more likely, and how frequency and severity combine to give the size of the exposure.",
  intro:"Once a risk has been classified as insurable in principle, the underwriter must turn to its anatomy. Two related concepts — peril and hazard — describe what brings a loss about and what makes it more likely or more severe; the magnitude of the risk is then taken as the product of frequency and severity. These three building blocks form the language in which exposures are described throughout the insurance market.",
  dhead:"Peril, hazard and the size of the risk",
  dlede:"The standard definitions used across the market are as follows:",
  defs:[
   ["flame","Peril — the prime cause of a loss; the event that triggers the damage (for example, fire, flood, storm or theft)."],
   ["warning","Physical hazard — a measurable physical characteristic of the risk that influences the outcome (worn tyres, faulty wiring, the absence of fire doors)."],
   ["people","Moral hazard — a feature of human behaviour or attitude (carelessness, dishonesty, a poor claims history) that influences the likelihood or severity of a loss."],
   ["chart","Frequency — how often a loss is expected to occur in a given period."],
   ["target","Severity — how serious the loss is likely to be when it does occur."]],
  wrap:"In practice the underwriter cannot price the peril alone: the same peril will produce very different losses depending on the hazards attaching to it. A bakery and a paper warehouse are both exposed to fire, but the hazard profile of one differs sharply from the other, and the premium follows accordingly.",
  chead:"A practical anchor",cicon:"matrix",
  callout:"The magnitude of any risk may be expressed, at first approximation, as Frequency × Severity. Plotted on a risk matrix, this product allows the underwriter, and later the risk manager, to rank exposures so that resources are directed first at the risks that matter most.",
  notes:[
   ["pyramid","The Heinrich industrial study famously found that for every one major accident there were of the order of three hundred non-injury incidents. The lesson is that minor incidents are the early warnings of a major loss to come; acting on near-misses is the basis of proactive loss control."],
   ["warning","Physical hazards can usually be measured and engineered out: install fire doors, replace worn tyres, fit machine guards. Moral hazards, being matters of human behaviour, are far harder to underwrite and are addressed largely through selection, conditions and excess."],
   ["magnifier","Hazards are sometimes hidden — a poorly maintained electrical installation, a previously concealed claims history — and are therefore among the most important matters that the insured must disclose at proposal stage."],
   ["matrix","A risk matrix typically plots frequency on one axis and severity on the other. Risks in the high-frequency, high-severity quadrant call for urgent action; those in the low-frequency, low-severity quadrant may safely be retained."]],
  conicon:"shield",
  conclusion:"The vocabulary of peril, hazard, frequency and severity gives the insurer a stable framework for talking about any exposure, however unusual. Mastery of these terms is a prerequisite to everything that follows — underwriting, pricing, loss control and claims handling alike."},
 {n:"04",kick:"Insurable Risks",ti:"The Elements of an Insurable Risk",
  blurb:"The six tests an underwriter applies before any risk can be written, and the public-policy limit that overrides all of them.",
  intro:"Not every risk is capable of being insured. Insurance is a particular financial mechanism with its own logic, and an exposure must satisfy a set of well-established tests before any insurer can properly accept it. These tests are sometimes presented as five, sometimes as six, but in essence they describe the same idea: insurance can only respond to risks of a particular kind.",
  dhead:"The six tests of an insurable risk",
  dlede:"Each test must be satisfied before underwriting can proceed:",
  defs:[
   ["question","Fortuitous — the loss must be accidental from the insured's standpoint; deliberate acts are uninsurable."],
   ["coin","Financial value — the loss must be measurable in money; sentimental or emotional value alone will not suffice."],
   ["flame","Pure — the risk must offer the possibility of loss or, at best, the status quo, never the possibility of gain."],
   ["people","Particular — the risk must be capable of being borne individually and pooled with similar particular risks."],
   ["scales","Legal and not against public policy — the subject matter and the peril must both be lawful, and the cover must not undermine the law of the land."],
   ["link","Insurable interest — the proposer must have a legally recognised financial relationship with the subject matter of insurance."]],
  wrap:"These tests are cumulative rather than alternative: a risk that fails on any single criterion cannot properly be insured. The underwriter applies them as an initial filter at proposal stage, and they are revisited at renewal and at claim.",
  chead:"A working rule",cicon:"shield",
  callout:"Where any one of the six tests fails, the insurance contract is either void from inception or unenforceable. The honest underwriter is therefore as concerned to identify the uninsurable elements of a proposal as to price the insurable ones.",
  notes:[
   ["warning","Fortuity is the most frequently breached of the six tests. The deliberate destruction of insured property by the insured (arson, scuttling, staged loss) is not fortuitous and is therefore both uninsurable and, in practice, criminal."],
   ["coin","The financial value test explains why insurers will pay for the rebuilding of a destroyed house but not for the loss of sentimental items whose value lies wholly outside the market."],
   ["scales","Public policy is the broadest of the limits and the most flexible. The courts will refuse to enforce a policy that protects an illegal venture (a smuggling cargo, for instance) or that would in effect reward wrongdoing."],
   ["link","Insurable interest links the insured personally to the subject matter, distinguishing a contract of insurance from a wager. Without it, the contract is unenforceable as a gaming contract under longstanding statute."]],
  conicon:"target",
  conclusion:"The six tests, taken together, define the very perimeter of what insurance can do. They sit at the heart of every underwriting decision and explain, when an insurer refuses a risk, why no premium, however high, could have made the difference."},
 {n:"05",kick:"Loss Control",ti:"Loss Control and the True Cost of Loss",
  blurb:"Direct and indirect costs, the Heinrich pyramid of near-misses, and why proactive loss control pays for itself.",
  intro:"When a loss occurs, only part of its cost is visible. The damaged vehicle, the burnt stock and the broken window can be valued by anyone with a pen and a calculator; the management time absorbed by the incident, the lost market share, the trained staff who leave during reinstatement, the higher premium next year — these may dwarf the visible figure but rarely appear on the claim form. A serious approach to loss control begins by recognising both halves of the iceberg.",
  dhead:"What loss really costs",
  dlede:"Every significant loss generates two streams of cost, the second usually larger than the first:",
  defs:[
   ["target","Direct cost — death, injury, physical damage or legal liability arising immediately from the event itself."],
   ["chart","Indirect cost — business interruption, management time, rehabilitation, litigation, loss of market share and loss of goodwill."],
   ["pyramid","Near-misses — minor incidents that did not, on this occasion, cause a serious loss but indicate that one is in prospect."],
   ["gear","Loss-control measures — engineering controls, training, procedures and supervision designed to reduce frequency, severity or both."],
   ["coin","Cost-benefit balance — control measures are justified where their cost is less than the expected saving in losses."]],
  wrap:"The picture is completed by the famous study of H. W. Heinrich, which examined large numbers of industrial incidents and found that for every one major accident there were of the order of three hundred non-injury incidents. The implication, central to all modern loss control, is that minor events are the visible early warnings of a major event to come.",
  chead:"The Heinrich lesson",cicon:"pyramid",
  callout:"Reduce the small incidents and you will, in time, reduce the rare catastrophic one. Every near-miss is a free lesson; the only question is whether the organisation is willing to learn from it.",
  notes:[
   ["warning","The hidden costs of a loss commonly include retraining, lost orders, customer dissatisfaction, reputational damage, regulatory attention and the long tail of higher premiums. A rule of thumb in the safety literature puts the indirect cost at four to ten times the direct cost."],
   ["gear","Engineering controls (fire walls, sprinklers, guards, interlocks) attack frequency at source; procedural controls (training, permits to work, supervision) attack the human factor; financial controls (excesses, retentions) shape the cost when the loss does occur."],
   ["chart","Loss-control investment is justified by a straightforward economic test: it should pay for itself in reduced losses over a reasonable horizon, with the safety improvement treated as a free benefit."],
   ["magnifier","The risk manager's role is therefore part engineering, part economics and part culture. The most effective programmes treat near-misses as data, not embarrassments, and reward the staff who report them."]],
  conicon:"shield",
  conclusion:"Properly understood, loss control is not a cost to be minimised but an investment whose return is the loss that did not happen — the unseen but real saving that underwrites both the safety of people and the profitability of the enterprise."},
 {n:"06",kick:"How Insurance Works",ti:"Risk Management and How Insurance Works",
  blurb:"Identify, analyse, control — the three-stage discipline of risk management — and the trio of mechanisms by which insurance turns uncertainty into certainty.",
  intro:"Risk management is the disciplined business of dealing with risk before it becomes a loss. It rests on a simple three-stage cycle: identify the exposures, analyse them by frequency and severity, and control them economically. Insurance sits within this cycle as one of several tools, alongside avoidance, reduction, retention and contractual transfer; what distinguishes it is the manner in which it does its work.",
  dhead:"The risk-management cycle and the insurance mechanism",
  dlede:"Risk management is conventionally described in three steps, supported by three insurance mechanisms:",
  defs:[
   ["magnifier","Identify — find every exposure to which the enterprise's assets or earning capacity are subject, including those that are easily overlooked."],
   ["matrix","Analyse — assess each exposure by frequency and severity, often by means of a risk matrix that ranks the exposures for action."],
   ["gear","Control — treat the exposures cost-effectively, whether by avoidance, reduction, retention or transfer to a third party."],
   ["transfer","Risk transfer — the financial consequences of the loss pass, against payment of a premium, to the insurer."],
   ["drops","Common pool — the contributions of the many fund the losses of the few; the law of large numbers makes the cost predictable in aggregate."]],
  wrap:"Insurance, properly understood, is the contractual expression of the third step of the cycle and represents a particular kind of transfer: the financial consequences of a loss are transferred to an insurer who, in exchange for an equitable premium, undertakes to make the insured good once the contingency occurs.",
  chead:"The trio at the heart of insurance",cicon:"umbrella",
  callout:"Risk transfer, a common pool and an equitable premium together form the trio at the heart of insurance — fair, reasonable and adequate to fund the claims that will arise. Take any of the three away and the mechanism collapses.",
  notes:[
   ["coin","An equitable premium is one that is fair as between insured and insurer, reasonable in amount, and adequate in aggregate to fund the expected claims plus the insurer's costs and a margin for capital."],
   ["people","Beyond the obvious indemnity, insurance generates wider social benefits: peace of mind for individuals, the encouragement of loss control, the protection of innocent third parties, and the investment of accumulated premiums in the wider economy."],
   ["chart","The insurer's invisible earnings — the income generated on premium funds while they await payment of claims — are an important pillar of the industry's contribution to the balance of payments of any insurance-exporting economy."],
   ["matrix","Risk management is therefore not a substitute for insurance, nor insurance for risk management; the two are complementary, and the modern enterprise uses both in combination."]],
  conicon:"target",
  conclusion:"Risk management seeks to make losses less likely and less severe; insurance ensures that when, despite every reasonable precaution, a loss does occur, the financial consequences fall on a body equipped to absorb them. The two together turn the inherent uncertainty of doing business into a manageable cost."}
]}
,
{id:"02",title:"The Insurance Market",kicker:"Market Structure",
desc:"Buyers, sellers and intermediaries; Lloyd's; reinsurance; distribution channels; the roles of underwriters, actuaries, adjusters, surveyors and compliance.",
cards:[
 {t:"01 · Structure",ti:"The Three-Sided Market",
  f:"The insurance market, like any market, has three constituent parties — those who buy, those who place, and those who sell.",
  p:"Name the three sides of the insurance market.",
  a:["Buyers — the general public, companies, associations, partnerships, sole traders and public bodies","Intermediaries — agents, brokers and other distribution channels","Sellers — the insurance companies, Lloyd's syndicates and reinsurers"],
  n:"The intermediary sits between buyer and seller, owing duties in both directions.",
  q:"Which three groups form the structure of the insurance market?",
  o:["Buyers, intermediaries and sellers","Underwriters, brokers and adjusters","Lloyd's, IAIS and the regulator","Direct, indirect and online"],c:0,
  e:"Buyers, intermediaries and sellers — the classic three-sided structure."},
 {t:"02 · Buyers",ti:"Who Buys Insurance?",
  f:"The buyer side ranges from individuals taking out a single household policy to multinationals placing global programmes.",
  p:"List six categories of insurance buyer.",
  a:["General public — individuals and households","Companies — limited and unlimited","Associations and clubs","Partnerships","Sole traders","Public bodies — central and local government"],
  n:"Each category has different needs and a different risk profile.",
  q:"Which of the following is NOT a buyer in the insurance market?",
  o:["Loss adjuster","Sole trader","Public body","Partnership"],c:0,
  e:"The loss adjuster works for the insurer in handling claims, not as a buyer of cover."},
 {t:"03 · Sellers",ti:"Forms of Insurance Company",
  f:"Insurers may be constituted in several different legal forms, each with its own ownership and capital structure.",
  p:"Name the principal forms in which an insurer may be constituted.",
  a:["Proprietary — owned by shareholders","Mutual — owned by policyholders","Specialist — concentrating on a defined class","Composite — writing both life and general business","Captive — owned by its parent to insure its parent's risks","Protected cell companies and Takaful insurers"],
  n:"A composite writes both long-term (life) and general business; a specialist writes one class only.",
  q:"A mutual insurer is owned by:",
  o:["Its policyholders","Its shareholders","The state","Its reinsurers"],c:0,
  e:"In a mutual, the policyholders are also the members and effective owners."},
 {t:"04 · Lloyd's",ti:"The Lloyd's Market",
  f:"Lloyd's is not itself an insurer but the market within which underwriting members trade as syndicates.",
  p:"Outline the structure of the Lloyd's market.",
  a:["Underwriting members (Names) provide the capital","Names form syndicates","Each syndicate appoints a managing agent, a members' agent and professional underwriters","Lloyd's brokers approach underwriters with a slip or by the Electronic Placing System","Corporate members with limited liability are now permitted alongside individual Names"],
  n:"Lloyd's is a market of syndicates supported by members' capital, not a single insurance company.",
  q:"At Lloyd's, who provides the underwriting capital?",
  o:["The members (Names)","The brokers","The Corporation of Lloyd's itself","The reinsurers"],c:0,
  e:"Underwriting members — known as Names — provide the capital that backs each syndicate."},
 {t:"05 · Intermediaries",ti:"Authorised Intermediaries",
  f:"Distribution between insurer and buyer is generally conducted through authorised intermediaries.",
  p:"List the principal types of insurance intermediary.",
  a:["Agents — authorised persons acting as appointed representatives","Brokers — independent intermediaries advising the client","Lloyd's brokers, in-house brokers and broker networks","Consultants, advisers and introducers","Bancassurers, aggregators and affinity partnerships"],
  n:"Authorised persons must be approved by the regulator; introducers and appointed representatives act under a principal.",
  q:"An intermediary acting independently and advising the client on the market is a:",
  o:["Broker","Tied agent","Captive","Underwriter"],c:0,
  e:"The broker is the independent intermediary acting principally for the client."},
 {t:"06 · Authorisation",ti:"Regulatory Authorisation",
  f:"No firm may transact insurance business unless properly authorised by the regulator and bound by its rules.",
  p:"State the basic regulatory position for intermediaries.",
  a:["Authorised persons must be approved by the local regulator","Authorised persons may appoint appointed representatives, who may act for more than one principal","They may also appoint introducers, whose role is more limited","The independent broker may give the client independent insurance advice"],
  n:"Acting in breach of authorisation is both unlawful and grounds for regulatory enforcement.",
  q:"An appointed representative acts:",
  o:["Under the authority of an authorised principal","Wholly independently of any insurer","On behalf of the reinsurer only","Without any regulatory oversight"],c:0,
  e:"An appointed representative acts under the authority of its authorised principal."},
 {t:"07 · Reinsurance",ti:"The Purpose of Reinsurance",
  f:"Reinsurance is insurance for insurers — and its purposes go well beyond simply limiting individual losses.",
  p:"State the principal purposes of reinsurance.",
  a:["Smooth peaks and troughs in the insurer's results","Protect the insurer's portfolio","Increase underwriting capacity","Support new and unusual risks","Improve customer service through larger limits","Allow new business ventures to be undertaken"],
  n:"Reinsurers in turn reinsure each other — a process known as retrocession.",
  q:"One purpose of reinsurance is to:",
  o:["Smooth the insurer's results","Pay the insured's claim directly","Replace the regulator","Eliminate the need for capital"],c:0,
  e:"A core purpose of reinsurance is to smooth the insurer's results over time."},
 {t:"08 · Distribution",ti:"Direct vs Indirect Channels",
  f:"Insurance reaches the buyer either directly from the insurer or through one or more intermediate channels.",
  p:"Distinguish direct from indirect distribution.",
  a:["Direct — sold by the insurance undertaking itself, for example via its own employees or website","Indirect — sold through intermediate channels, such as brokers, aggregators or affinity partners","An aggregator that never sees the client face-to-face is an indirect seller"],
  n:"The same insurer often distributes through both channels simultaneously.",
  q:"A buyer who purchases through an online price-comparison site is using:",
  o:["An indirect channel","A direct channel","A reinsurer","A Lloyd's syndicate"],c:0,
  e:"An aggregator is an intermediate channel — indirect distribution."},
 {t:"09 · Underwriter",ti:"The Role of the Underwriter",
  f:"The underwriter is the front-line decision-maker who assesses the risk and prices it.",
  p:"What does the underwriter do?",
  a:["Assesses the risk presented","Decides whether to accept it","Determines the terms, conditions and scope of cover","Calculates a suitable premium"],
  n:"All underwriting decisions are made before the loss; they cannot be revisited once it has occurred.",
  q:"Calculating the premium is the function of the:",
  o:["Underwriter","Loss adjuster","Loss assessor","Surveyor"],c:0,
  e:"Pricing the risk and setting cover are the underwriter's responsibility."},
 {t:"10 · Claims",ti:"Claims Personnel",
  f:"The claims function is the visible promise of insurance — the moment when the cover bought is finally tested.",
  p:"State the four duties of the claims handler.",
  a:["Deal with claims fairly and efficiently","Distinguish between genuine and fraudulent claims","Assess and provide for the cost of the claim","Determine whether experts are required, and settle the claim"],
  n:"How well claims are handled is the strongest predictor of customer retention.",
  q:"Distinguishing fraudulent from genuine claims is the duty of:",
  o:["Claims personnel","The underwriter","The actuary","The regulator"],c:0,
  e:"Claims personnel must assess each claim and identify any that are fraudulent."},
 {t:"11 · Adjuster vs Assessor",ti:"Loss Adjuster vs Loss Assessor",
  f:"Both investigate claims, but they act for different parties and are paid in different ways.",
  p:"Distinguish the loss adjuster from the loss assessor.",
  a:["Loss adjuster — independent qualified professional, member of CILA, appointed and paid by the insurer to investigate large claims","Loss assessor — appointed by the insured to assist with the claim; fees are not refundable by the insurer"],
  n:"The adjuster is the insurer's investigator; the assessor is the insured's advocate.",
  q:"A claims professional appointed and paid by the insurer is the:",
  o:["Loss adjuster","Loss assessor","Underwriter","Actuary"],c:0,
  e:"The adjuster acts for the insurer; the assessor acts for the insured."},
 {t:"12 · Surveyor",ti:"The Surveyor",
  f:"The surveyor brings a technical and forensic eye to both underwriting and claims.",
  p:"What does the surveyor do?",
  a:["Carries out risk-assessment functions on behalf of the underwriter","Suggests improvements to reduce the risk","Proposes exclusions where the risk is unacceptable","Provides forensic services in support of specific claims"],
  n:"A surveyor's report often determines whether and on what terms a complex risk is written.",
  q:"The surveyor's report is principally relied on by the:",
  o:["Underwriter","Insured","Regulator","Actuary"],c:0,
  e:"The surveyor reports for the underwriter, who uses the findings in pricing the risk."},
 {t:"13 · Actuary",ti:"The Actuary",
  f:"The actuary turns historical data into the statistical bedrock on which premiums and reserves rest.",
  p:"State the functions of the actuary in an insurance company.",
  a:["Uses statistics to assess probability of loss","Calculates premium rates and fund contributions","Assesses the solvency and profitability of the insurer","Advises management on long-term financial risk"],
  n:"Actuarial work is especially important in long-term (life) business.",
  q:"Calculating premium rates and assessing solvency are the work of the:",
  o:["Actuary","Loss adjuster","Compliance officer","Surveyor"],c:0,
  e:"The actuary uses statistics to price risk and assess solvency."},
 {t:"14 · Compliance",ti:"The Compliance Officer",
  f:"The compliance officer ensures the firm operates within the perimeter set by the regulator.",
  p:"State the principal duties of the compliance officer.",
  a:["Ensure compliance with all rules and regulations set by the regulator","Complete regulatory returns","Review and check business processes","Maintain the firm's compliance manual","Perform money-laundering reporting functions"],
  n:"The role straddles regulatory law, internal audit and risk management.",
  q:"Acting as the Money Laundering Reporting Officer typically falls to the:",
  o:["Compliance officer","Underwriter","Claims handler","Loss assessor"],c:0,
  e:"Money-laundering reporting is a compliance responsibility."},
 {t:"15 · Classes",ti:"Classes of Insurance",
  f:"Insurance is sold by class, and many products combine several classes into a single packaged policy.",
  p:"List the principal classes of insurance.",
  a:["Home, travel, pet and health","Liability — public, employers', professional","Commercial property and pecuniary","Construction and engineering","Marine and aviation","Life and long-term business"],
  n:"Combined and packaged policies bundle several classes together — the 'Quality Street' approach.",
  q:"A combined policy that bundles home contents, buildings and liability is best described as:",
  o:["A packaged policy","A reinsurance treaty","An aggregator product","A captive arrangement"],c:0,
  e:"Several classes packaged into a single policy is a packaged or combined policy."}

facts:[
 {n:"01",kick:"Structure",ti:"The Three-Sided Insurance Market",
  blurb:"Buyers, intermediaries and sellers — the structure of the market and the place of each party within it.",
  intro:"Like any other market, the insurance market is built around three parties: those who buy a product, those who place it on their behalf, and those who supply it. What gives the insurance market its particular character is the breadth of each side. Buyers range from the householder taking out a first contents policy to multinational groups placing global programmes; sellers range from the small specialist insurer to the most complex composite operating in every developed country; and between them stand intermediaries of many different kinds, ranging from the simple introducer to the global broker.",
  dhead:"The three sides of the market",
  dlede:"In its broadest outline the market may be presented as follows:",
  defs:[
   ["people","Buyers — individuals, companies, associations, partnerships, sole traders and public bodies, each with their own risk profile and purchasing needs."],
   ["link","Intermediaries — authorised brokers, agents, appointed representatives, introducers, bancassurers, aggregators and affinity partners."],
   ["umbrella","Sellers — the proprietary, mutual, specialist and composite insurers, alongside Lloyd's syndicates, captives, reinsurers, protected cell companies and Takaful insurers."],
   ["gear","Distribution — the sellers reach the buyer either directly or through one or more of the intermediate channels."],
   ["chart","Reinsurance — sitting behind the visible market, reinsurers spread the largest risks across the wider financial system."]],
  wrap:"The boundaries between these categories are not always rigid. A bancassurer is both a seller of its own life products and an intermediary for general insurance; a captive may insure the risks of its parent and also accept third-party business. The categories are useful as a first map of the market rather than as a strict legal taxonomy.",
  chead:"A working description",cicon:"shield",
  callout:"The insurance market may be defined as the meeting of buyers, intermediaries and sellers under the supervision of a regulator, in which insurance risks are transferred against the payment of premium and in accordance with the law of contract.",
  notes:[
   ["people","On the buyer side, by far the largest single segment is the general public — millions of households purchasing motor, household, life and travel policies on essentially standard terms. Commercial buyers form a smaller but vastly more diverse and valuable segment."],
   ["umbrella","On the seller side, proprietary insurers (owned by shareholders) dominate by volume in most markets, but mutual insurers (owned by policyholders) remain a significant force, particularly in life and certain mutual classes such as P&I."],
   ["link","Intermediaries account for the great majority of commercial business and a large share of personal lines, despite the rise of direct internet distribution; their value lies in advice, market reach and continuity of relationship."],
   ["scales","Each party in the market operates under the supervision of the local insurance regulator, whose role is the subject of a later topic. Authorisation, conduct of business rules and prudential standards apply across all three sides."]],
  conicon:"target",
  conclusion:"The structure of the market is therefore best understood as a triangle of buyers, intermediaries and sellers, with reinsurance behind the sellers and the regulator overseeing the whole. Every other study of the market — Lloyd's, distribution channels, the roles of underwriters and adjusters — fits within this framework."},
 {n:"02",kick:"Sellers",ti:"The Sellers — Forms of Insurer",
  blurb:"Proprietary, mutual, specialist and composite insurers; captives, reinsurers, Lloyd's, P&I clubs, PCCs and Takaful — the family of risk-carriers.",
  intro:"The buyer of insurance encounters a remarkably varied family of suppliers, each with its own ownership structure, capital base and field of operation. Understanding the principal forms of insurer is essential for the intermediary advising a client, the underwriter pricing a risk and the student approaching the market for the first time. The headline categories are few and stable, even if individual firms move between them as they grow.",
  dhead:"The principal forms in which insurers are constituted",
  dlede:"The major categories used throughout the insurance literature are these:",
  defs:[
   ["umbrella","Proprietary insurer — owned by shareholders and operating for profit; the dominant form in most developed markets."],
   ["people","Mutual insurer — owned by policyholders, who are also its members; surpluses are retained or returned to members."],
   ["target","Specialist insurer — concentrating on one class or sector of business (for example, marine, aviation, professional indemnity)."],
   ["link","Composite insurer — writing both life (long-term) and general business under appropriate authorisation."],
   ["shield","Captive — owned by its industrial or commercial parent to insure its parent's risks (and sometimes the risks of others)."]],
  wrap:"Behind these mainstream categories sit a number of more specialised structures. Reinsurance companies stand behind the primary insurers, accepting risks ceded to them by insurers, Lloyd's syndicates and other reinsurers; the further reinsurance of a reinsurer's exposure is known as retrocession. Lloyd's itself operates as a market within which syndicates of underwriting members trade. Mutual Indemnity Associations — the P&I clubs of the marine market — operate on a mutual basis for the shipowning community. Protected cell companies allow segregated cells of business within a single legal vehicle, and Takaful insurers operate under Islamic principles.",
  chead:"A point worth pausing on",cicon:"matrix",
  callout:"The legal form of an insurer is not simply a matter of corporate plumbing. It determines the source of capital, the appetite for risk, the distribution channels available and, in the end, the kind of business the insurer will write.",
  notes:[
   ["coin","Proprietary insurers raise capital from shareholders and answer to them; mutuals draw their capital from accumulated surpluses and answer to their policyholder-members. The two models produce quite different attitudes to long-term underwriting cycles."],
   ["target","A specialist insurer is often deeper in one class than any composite can afford to be, and may write business that the wider market will not. Specialists therefore play a particularly important role in difficult or technical lines."],
   ["umbrella","Composites combine life and general business under one roof, with separate funds maintained by regulation. The composite model has come and gone in fashion; in many markets it has been split apart in recent decades, while in others it remains the norm."],
   ["shield","Captives have grown from being the preserve of the largest multinational groups into a mainstream tool of corporate risk management, retaining selected layers of risk within the group rather than purchasing them externally."]],
  conicon:"scales",
  conclusion:"The variety of insurer types is no historical curiosity but a working tool: each form exists because it answers a particular question of risk, capital or distribution that the others cannot. The well-advised buyer will know not only what cover is needed but which kind of insurer is best placed to provide it."},
 {n:"03",kick:"Lloyd's",ti:"The Lloyd's Market",
  blurb:"Underwriting members, syndicates, managing agents and the slip — the unique structure of Lloyd's and how a risk is placed there.",
  intro:"Lloyd's of London is the oldest and most distinctive feature of the world's insurance market. It is not itself an insurance company but a market — a managed space within which underwriting members, organised into syndicates, accept risks brought to them by Lloyd's brokers. The structure has evolved considerably over the centuries, but its essential character — capital provided by members, underwriting carried out by professional underwriters, distribution through brokers — remains intact.",
  dhead:"The structure of the Lloyd's market",
  dlede:"The principal building blocks of the market are these:",
  defs:[
   ["people","Underwriting members — known as Names — provide the capital that supports the underwriting of risks at Lloyd's."],
   ["link","Syndicates — Names group together in syndicates to share the underwriting; the syndicate is the underwriting vehicle."],
   ["gear","Managing agent — appointed by the syndicate to manage its business; members' agents represent the Names; professional underwriters run the syndicate's day-to-day underwriting."],
   ["transfer","Lloyd's broker — the regulated intermediary who places risks at Lloyd's, typically using a slip or, increasingly, the Electronic Placing System."],
   ["umbrella","Corporate members — Lloyd's has long since allowed corporate members with limited liability to participate alongside individual Names."]],
  wrap:"A risk to be placed at Lloyd's is documented on a slip — a single page summarising the essential terms — which the broker takes from underwriter to underwriter, building up the line stamps until the risk is fully subscribed. The slip is then converted into a fuller policy document, but the slip itself remains the underwriting record.",
  chead:"A market within a market",cicon:"book",
  callout:"Lloyd's is best thought of as a market within the wider insurance market: it has its own rules, its own brokers, its own underwriting room and its own famous instruments — the Lutine Bell, the Loss Book, the slip — but its risks ultimately compete with those of the company market across the same lines of business.",
  notes:[
   ["coin","Names — whether individuals or corporates — provide the capital that supports the underwriting at Lloyd's. Historically individual Names had unlimited liability; corporate members with limited liability are now the dominant source of underwriting capital."],
   ["people","Managing agents run the syndicates as professional underwriting businesses; members' agents look after the interests of the Names whose capital is at risk; professional underwriters make the day-to-day underwriting decisions for the syndicate."],
   ["transfer","The Lloyd's broker is itself a regulated intermediary, distinct from a company broker. Lloyd's brokers have privileged access to the underwriting room and a particular set of duties relating to that access."],
   ["chart","The Electronic Placing System and related digital initiatives have transformed the mechanics of placing at Lloyd's, but the underlying logic — broker carries the risk from underwriter to underwriter — remains in place."]],
  conicon:"shield",
  conclusion:"Lloyd's continues to occupy a unique place in the global insurance market: not the largest insurer in the world, but in many lines the most influential, and a market whose particular structure remains a model for the role of capital, intermediation and specialist underwriting."},
 {n:"04",kick:"Intermediaries",ti:"Intermediaries and the Distribution Channels",
  blurb:"Agents, brokers, networks, bancassurers, aggregators and affinity partners — and the regulatory framework that surrounds them.",
  intro:"Most insurance reaches the buyer through an intermediary, and the variety of intermediaries on offer reflects the variety of buyers they serve. At one end stand the great international brokers, advising the largest commercial buyers and placing programmes in every market; at the other end stand small introducers passing customers to a single insurer in exchange for a small commission. Between these poles lies a wide spectrum of agents, networks, aggregators and affinity partners.",
  dhead:"The principal categories of intermediary",
  dlede:"The intermediary side of the market is conventionally divided as follows:",
  defs:[
   ["people","Agents — authorised persons, often appointed representatives, acting under the authority of a regulated principal."],
   ["link","Brokers — independent intermediaries acting principally for the client; Lloyd's brokers, in-house brokers and broker networks form sub-categories."],
   ["question","Consultants, advisers and introducers — narrower roles, the introducer doing little more than passing the client on."],
   ["coin","Bancassurers — banks and similar institutions selling insurance alongside their banking products."],
   ["chart","Aggregators and affinity partners — price-comparison websites and customer groupings (motoring associations, professional bodies) acting as a distribution channel."]],
  wrap:"All of these channels must operate within the regulatory framework that governs insurance distribution. The authorised person must be approved by the local regulator and is bound by its rules; authorised persons may in turn appoint appointed representatives (who may act for more than one principal) and introducers. The independent broker offers the client independent advice on the market; the appointed representative cannot do so to the same extent.",
  chead:"A practical anchor",cicon:"scales",
  callout:"Whatever the channel, the duty of the intermediary is to act in the client's best interests within the limits of its mandate. The label on the door — broker, agent, bancassurer, aggregator — describes the structure of the relationship; the conduct expected of the firm is the same.",
  notes:[
   ["link","The broker is in principle the agent of the client, not of the insurer, even though commission is usually paid by the insurer. This division of loyalties is governed both by contract and by conduct-of-business rules."],
   ["people","Appointed representatives are a creature of statute. They act under the authority of an authorised principal but may, in many markets, represent more than one principal at the same time; the principal carries regulatory responsibility for the conduct of its representatives."],
   ["coin","Bancassurance has grown dramatically since the 1990s, particularly in life and creditor business. Its strength lies in customer reach; its weakness, in some markets, in the breadth of advice offered alongside the bank's own products."],
   ["chart","Aggregators have transformed personal-lines distribution. They serve consumers well in terms of price comparison but raise their own conduct questions about the comparability of cover, the duty of disclosure and the management of conflicts of interest."]],
  conicon:"shield",
  conclusion:"The intermediary side of the market is, in many ways, where conduct of business in insurance is most actively contested. Each channel earns its place by adding value to the client; where it ceases to do so, it is — sooner or later — displaced by a channel that does."},
 {n:"05",kick:"Reinsurance",ti:"Reinsurance and Retrocession",
  blurb:"Why insurers insure themselves, the purposes reinsurance serves, and the role of retrocession in spreading the largest risks across the global system.",
  intro:"Reinsurance is insurance for insurers. By transferring some of its accepted risks to a reinsurer, an insurance company can write more business than its own capital would otherwise allow, smooth its results over time and protect itself against the largest single losses. Reinsurance does not change the position of the original insured, who remains the insured of the primary insurer, but it transforms the insurer's own balance sheet and risk appetite.",
  dhead:"The purposes of reinsurance",
  dlede:"Reinsurance is purchased for several related, and often overlapping, reasons:",
  defs:[
   ["chart","Smooth peaks and troughs in the insurer's annual results, reducing the volatility of its earnings."],
   ["shield","Protect the insurer's portfolio against accumulations and concentrations of risk."],
   ["transfer","Increase the underwriting capacity of the insurer, allowing it to accept larger risks than its own capital would otherwise support."],
   ["target","Support the writing of new, unusual or otherwise difficult risks where the insurer alone could not commit."],
   ["people","Improve customer service through larger limits, broader cover and the support of reinsurers' specialist expertise."]],
  wrap:"Reinsurers themselves accept business from a number of sources: insurance companies, Lloyd's syndicates and other reinsurers. The further reinsurance of a reinsurer's accepted business — the cession of risk from one reinsurer to another — is known as retrocession. Through retrocession, the largest individual risks are gradually spread across the global reinsurance and capital-market system, in much the same way as primary risks are spread by reinsurance.",
  chead:"A working principle",cicon:"link",
  callout:"Reinsurance does not eliminate risk; it redistributes it. The risk that began with the original insured passes to the insurer, then in part to the reinsurer, then in part to the retrocessionaire — but at every stage it remains a real exposure to whoever ultimately holds it.",
  notes:[
   ["umbrella","Reinsurance may be arranged on a treaty basis, covering all qualifying risks within a defined portfolio, or on a facultative basis, covering an individual risk. Each form has its place; a typical insurer uses both."],
   ["coin","Proportional reinsurance shares premium and claims between insurer and reinsurer in fixed proportions; non-proportional reinsurance responds when losses exceed a defined level, in the manner of an excess-of-loss policy."],
   ["chart","The reinsurance market is heavily concentrated in a small number of global centres, with cycles of soft and hard pricing that follow the experience of major catastrophes. The Hurricane Andrew event of 1992, for example, was a watershed for modern catastrophe modelling."],
   ["transfer","Capital-market alternatives — catastrophe bonds, sidecars and other forms of insurance-linked security — sit alongside traditional reinsurance and have, in recent years, taken a significant share of catastrophe-risk transfer."]],
  conicon:"shield",
  conclusion:"Reinsurance is therefore not an optional extra but a structural feature of the insurance industry: it is the means by which a finite pool of insurer capital supports the very large pool of losses that the modern world presents."},
 {n:"06",kick:"Specialist Roles",ti:"Underwriters, Adjusters, Surveyors, Actuaries and Compliance",
  blurb:"The professional roles that together turn an insurance proposal into a written policy, a notification into a settled claim, and a firm into a regulated business.",
  intro:"An insurance company is, in the end, the people who staff it. Behind the policy document stand a number of distinct professional roles, each with its own training, its own institute and its own place in the life cycle of a policy. The same handful of roles appears in every developed market, and the student who masters their functions has mastered much of how the industry actually works.",
  dhead:"The key specialist roles in the industry",
  dlede:"The principal professional roles within an insurance company and its supporting market are as follows:",
  defs:[
   ["target","Underwriter — assesses each risk, decides whether to accept it, sets the terms and conditions of cover and calculates the premium."],
   ["question","Claims personnel — handle claims fairly and efficiently, distinguish fraudulent from genuine, provide for the cost and settle."],
   ["magnifier","Loss adjuster — independent claims professional, member of CILA, appointed and paid by the insurer to investigate larger claims."],
   ["people","Loss assessor — claims professional appointed by the insured to assist the policyholder in preparing and presenting the claim."],
   ["gear","Surveyor — provides technical assessments of risk for underwriting and forensic input on claims; suggests improvements and exclusions."]],
  wrap:"Three further roles complete the picture. The actuary uses statistics to assess the probability of loss, calculate premiums and fund contributions, and report on the solvency and profitability of the insurer. The risk manager — increasingly found inside large insureds as well as insurers — identifies, analyses and economically controls the risks that face the enterprise. The compliance officer ensures that the firm complies with the rules and regulations set by the regulator, completes returns, reviews business processes, maintains the compliance manual and performs the money-laundering reporting function.",
  chead:"A practical hierarchy",cicon:"shield",
  callout:"The underwriter decides the risk; the actuary prices it in aggregate; the surveyor inspects it; the claims handler resolves it; the adjuster and assessor investigate it on opposite sides; the compliance officer keeps the firm within the law. Each role exists because the others cannot do its work.",
  notes:[
   ["target","Underwriting is at once a science and an art: the underwriter uses statistics, surveyors' reports and the actuary's rates as starting points, but the final decision on a complex commercial risk involves judgement that no model can entirely replace."],
   ["magnifier","Loss adjusters and loss assessors are sometimes confused. The simplest distinction is this: the adjuster is paid by the insurer and is independent of both parties; the assessor is paid by the insured and acts as the insured's claims advocate."],
   ["chart","Actuarial work is most visible in long-term business (life and pensions) but is increasingly important in general business, particularly in pricing personal lines, reserving and modelling solvency under Solvency II and similar regimes."],
   ["scales","The compliance function has grown from a small back-office role into a senior management responsibility in the past twenty years, driven by ever more demanding conduct, prudential and financial-crime regulation."]],
  conicon:"target",
  conclusion:"Behind every policy document and every paid claim lies the combined work of underwriters, actuaries, surveyors, claims handlers, adjusters, assessors, risk managers and compliance officers. To work effectively in any one of these roles, the practitioner must understand the work of the others."}
]}
