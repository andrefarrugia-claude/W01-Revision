{id:"05",title:"Disclosure and Representation",kicker:"Good Faith",
desc:"Utmost good faith, material facts, the statutory reforms of 2012 and 2015, and the remedies that follow from breach.",
cards:[
 {t:"01 · UGF",ti:"Utmost Good Faith",
  f:"Insurance contracts are uberrimae fidei — of the utmost good faith — distinct from the ordinary caveat emptor of commerce.",
  p:"State the doctrine of utmost good faith.",
  a:["A positive duty on both parties to disclose all material facts","To make no misrepresentation","Reciprocal: owed by insurer to insured and by insured to insurer","Without express enquiry — the duty arises from the relationship itself"],
  n:"The doctrine modifies the ordinary commercial position of caveat emptor.",
  q:"Utmost good faith requires:",
  o:["Voluntary disclosure of all material facts","Disclosure only of facts specifically asked","Honesty in business dealings generally","A signed declaration only"],c:0,
  e:"UGF is a positive duty without prompting."},
 {t:"02 · Caveat",ti:"Caveat Emptor vs UGF",
  f:"Insurance departs from the ordinary commercial rule because of the unique asymmetry of information.",
  p:"Distinguish caveat emptor from utmost good faith.",
  a:["Caveat emptor — let the buyer beware; each party looks after his own interest","Utmost good faith — each party must volunteer all material facts","Insurance: the insured alone knows the risk being placed; the insurer must rely on disclosure","The asymmetry of information justifies the special duty"],
  n:"Without UGF, insurance underwriting would be practically impossible.",
  q:"The ordinary commercial rule that does NOT apply to insurance is:",
  o:["Caveat emptor","Pacta sunt servanda","Consensus ad idem","Privity of contract"],c:0,
  e:"Caveat emptor is displaced in insurance by the duty of utmost good faith."},
 {t:"03 · Carter",ti:"Carter v. Boehm (1766)",
  f:"Lord Mansfield's classic statement of the doctrine — and the foundation of all that has followed.",
  p:"State the rule in Carter v. Boehm.",
  a:["Lord Mansfield held that the underwriter trusts the insured's representation","The peculiar facts of the risk are usually known to the insured alone","The insured must disclose every material fact he knows or ought to know","Concealment of a material fact — even innocently — entitles the insurer to avoid the policy"],
  n:"The classical statement: 'Good faith forbids either party, by concealing what he privately knows, to draw the other into a bargain from his ignorance.'",
  q:"Carter v. Boehm (1766) is the foundational case on:",
  o:["Utmost good faith","Insurable interest","Indemnity","Proximate cause"],c:0,
  e:"Lord Mansfield's judgment is the locus classicus of UGF."},
 {t:"04 · MIA 1906",ti:"Material Fact (MIA 1906)",
  f:"The Marine Insurance Act 1906 defines a material fact in terms of its effect on the prudent underwriter.",
  p:"State the statutory definition of a material fact.",
  a:["Every circumstance which would influence the judgement of a prudent underwriter","In fixing the premium, or","In determining whether he will take the risk","Section 18(2) of the Marine Insurance Act 1906"],
  n:"The test is objective: would the prudent underwriter be influenced?",
  q:"Under MIA 1906, a fact is material if it would influence:",
  o:["The prudent underwriter's judgement on risk or premium","The insured's view of the cover","The intermediary's commission","The court's decision in claims"],c:0,
  e:"Materiality is judged from the prudent underwriter's standpoint."},
 {t:"05 · CIA 2012",ti:"Consumer Insurance (Disclosure) Act 2012",
  f:"For consumer business, the duty of voluntary disclosure has been replaced by a duty to take reasonable care not to make a misrepresentation.",
  p:"State the consumer rule under the 2012 Act.",
  a:["Consumer insurance — for personal/domestic purposes, not trade","Replaced the duty of disclosure with a duty to take reasonable care not to make a misrepresentation","Insurer must ask clear and specific questions","Consumer must answer honestly and carefully","Test of reasonableness — what would a reasonable consumer have done?"],
  n:"The duty of voluntary disclosure no longer applies to consumer policies in the UK.",
  q:"Under the Consumer Insurance (Disclosure) Act 2012, the consumer must:",
  o:["Take reasonable care not to make a misrepresentation","Volunteer all material facts","Disclose only matters known","Sign a declaration of full disclosure"],c:0,
  e:"Reasonable care not to misrepresent — not voluntary disclosure."},
 {t:"06 · IA 2015",ti:"Insurance Act 2015",
  f:"For non-consumer business, the duty of disclosure has been recast as a duty of fair presentation.",
  p:"State the duty of fair presentation under the Insurance Act 2015.",
  a:["The insured must make to the insurer, before the contract is entered into, a fair presentation of the risk","Disclosure of every material circumstance the insured knows or ought to know","Or sufficient information to put a prudent insurer on notice that further enquiries are needed","Disclosure must be in a manner which would be reasonably clear and accessible to a prudent insurer","Material representations of fact must be substantially correct; representations of expectation or belief, made in good faith"],
  n:"The Act applies to non-consumer business effected after 12 August 2016.",
  q:"The duty of fair presentation under the Insurance Act 2015 requires:",
  o:["Disclosure in a reasonably clear and accessible manner","Voluntary disclosure of every fact known","Disclosure only when asked","Full underwriting information in all cases"],c:0,
  e:"Fair presentation: reasonably clear and accessible to the prudent insurer."},
 {t:"07 · Material",ti:"What Must Be Disclosed",
  f:"Anything that bears materially on the risk — physical, moral or historical.",
  p:"Identify examples of material facts that must be disclosed.",
  a:["Physical hazards — construction, occupancy, security","Moral hazards — previous claims, fraud convictions, financial difficulties","Previous insurance history — refusals, cancellations, special terms","Material changes during the policy term, where required by contract"],
  n:"Materiality is judged from the underwriter's perspective, not the insured's.",
  q:"Which is most likely to be a material fact?",
  o:["A previous insurance refusal","The colour of the building","The names of the trustees","The proposer's hobbies (unrelated)"],c:0,
  e:"A previous refusal goes to the heart of the underwriter's judgement."},
 {t:"08 · Not material",ti:"What Need Not Be Disclosed",
  f:"Not everything need be told — certain categories of fact are excused by law.",
  p:"List facts that need not be disclosed.",
  a:["Facts of common knowledge","Facts of law","Facts which the insurer already knows","Facts the insurer waives by failing to ask","Facts which lessen the risk","Facts the insurer ought to know in the ordinary course of business"],
  n:"The list reflects practical limits on the disclosure duty.",
  q:"Which need NOT be disclosed?",
  o:["Facts which lessen the risk","Previous claims","Material moral hazards","Previous policy cancellations"],c:0,
  e:"Facts that reduce the risk to the underwriter are not material in the relevant sense."},
 {t:"09 · Reps",ti:"Representations vs Warranties",
  f:"Representations induce the contract; warranties are terms of it. Each has its own role and consequences.",
  p:"Distinguish representations from warranties.",
  a:["Representations — statements made before the contract is concluded, inducing the insurer to enter into it; remedies are based on misrepresentation","Warranties — contractual promises by the insured forming part of the contract itself; breach historically discharged the insurer's liability","The Insurance Act 2015 has reformed the position on warranties to make remedies more proportionate"],
  n:"The classical distinction: misrepresentation as to inducement; warranty as to performance.",
  q:"A warranty in insurance is:",
  o:["A contractual term promising a particular state of affairs","A statement made before the policy is signed","A guarantee given by the broker","A regulatory licence"],c:0,
  e:"A warranty is a contractual promise within the policy itself."},
 {t:"10 · Consumer remedies",ti:"Consumer Remedies (CIA 2012)",
  f:"Remedies vary by the nature of the breach: innocent, careless, or deliberate/reckless.",
  p:"State the consumer remedies for misrepresentation.",
  a:["Innocent misrepresentation — insurer must pay the claim in full","Careless misrepresentation — proportionate remedy: insurer may pay a reduced claim, charge an additional premium, or vary the terms; or, if the insurer would not have written the risk at all, avoid","Deliberate or reckless misrepresentation — insurer may avoid the contract, refuse all claims, and retain the premium","The test of category is the consumer's state of mind"],
  n:"The 2012 Act introduced graduated remedies in place of the all-or-nothing rule.",
  q:"Under the 2012 Act, an innocent consumer misrepresentation:",
  o:["Does not entitle the insurer to refuse the claim","Always entitles the insurer to avoid","Carries the same remedy as fraud","Has no effect"],c:0,
  e:"Innocent misrepresentation by a consumer must be paid in full."},
 {t:"11 · Non-consumer",ti:"Non-Consumer Remedies (IA 2015)",
  f:"For commercial business, the Insurance Act 2015 provides proportionate remedies for breach of the duty of fair presentation.",
  p:"State the remedies under Schedule 1 of the Insurance Act 2015.",
  a:["Deliberate or reckless breach — insurer may avoid the contract, refuse all claims, and need not return the premium","Other (careless or innocent) breach — proportionate remedies: if the insurer would not have written the risk at all, avoidance with return of premium; if the insurer would have written on different terms, treated as if so written; if the insurer would have charged a higher premium, claim reduced proportionately","The insurer must show that 'but for' the breach the contract would have been on different terms"],
  n:"The 'but for' test is the operative mechanism of proportionate remedy.",
  q:"Under the Insurance Act 2015, a non-deliberate breach where the insurer would have charged 50% more premium results in:",
  o:["A proportionate reduction in claim (paying about two-thirds)","Full avoidance","Full payment","Refund of premium only"],c:0,
  e:"The claim is reduced in proportion to the additional premium."},
 {t:"12 · Warranties",ti:"Warranties under the Insurance Act 2015",
  f:"The historic rule that breach of warranty discharges the insurer from all liability has been substantially reformed.",
  p:"State the reformed position on warranties.",
  a:["Breach of warranty suspends — rather than terminates — the insurer's liability","Liability resumes once the breach is remedied","Basis clauses (converting all proposal answers into warranties) are abolished","Where a warranty relates to a particular type of loss, breach does not discharge liability for unrelated losses"],
  n:"The reform produces a more proportionate consequence for breach.",
  q:"Under the Insurance Act 2015, breach of warranty:",
  o:["Suspends liability until the breach is remedied","Discharges liability permanently","Has no effect on liability","Always entitles the insurer to avoid"],c:0,
  e:"Liability is now suspended, not terminated."},
 {t:"13 · Held covered",ti:"Held Covered Clauses",
  f:"A clause permitting the insurer to continue cover, against payment of an additional premium, where the insured's circumstances change.",
  p:"Explain held covered clauses.",
  a:["A clause in the policy by which cover continues despite a change of circumstance that would otherwise discharge the insurer","Typically in marine and aviation cover for deviation, change of voyage, or breach of warranty","Subject to prompt notice and payment of any additional premium","An important practical accommodation to the realities of long voyages and changing circumstances"],
  n:"Held covered clauses preserve continuity of cover; without them, every minor variation might bring the policy to an end.",
  q:"A 'held covered' clause:",
  o:["Continues cover subject to additional premium and notice","Provides automatic free extension","Cancels cover in the event of breach","Limits liability to a fixed maximum"],c:0,
  e:"Cover continues subject to terms — typically additional premium and notice."},
 {t:"14 · Duration",ti:"When the Duty Applies",
  f:"The duty operates principally at inception and renewal; during the term it is governed by the policy.",
  p:"State when the duty of disclosure or fair presentation applies.",
  a:["At inception — when the contract is being formed","At renewal — treated as a new contract in English law","At alteration — where the policy is varied","During the term — only insofar as the policy expressly imposes a continuing duty (notification of change of circumstances)","The fundamental duty is one of presentation at the formation of contract"],
  n:"Renewal is, for these purposes, a new contract requiring fresh disclosure.",
  q:"The duty of fair presentation primarily applies at:",
  o:["Inception and renewal","Inception only","Every change in the risk","The time of claim"],c:0,
  e:"The duty operates principally at the formation of contract — including renewal."},
 {t:"15 · Compulsory",ti:"Compulsory Insurance and Third-Party Rights",
  f:"In compulsory classes, statute protects innocent third parties even where the insurer would otherwise be entitled to avoid.",
  p:"Explain the position in compulsory classes.",
  a:["Motor third-party — Road Traffic Act 1988: insurers must pay third parties even where the insurer would otherwise be entitled to avoid the policy for non-disclosure or breach by the insured","Employers' liability — Employers' Liability (Compulsory Insurance) Act 1969 and Third Parties (Rights against Insurers) Acts","The insurer retains a right of recovery against the insured but cannot leave the third party uncompensated","The protection reflects the social purpose of compulsory cover"],
  n:"The insurer-insured dispute is preserved, but the third party is protected.",
  q:"In motor third-party cover under the RTA 1988, an innocent third party:",
  o:["Recovers from the insurer regardless of disputes between insurer and insured","Recovers only after settlement with the insured","Has no rights against the insurer","Recovers only on first-party policies"],c:0,
  e:"The third party is protected by statute; the insurer's recourse is against the insured."}

facts:[
 {n:"01",kick:"Doctrine",ti:"Utmost Good Faith — the Foundation",
  blurb:"Insurance is uberrimae fidei. The implications of that Latin phrase run through every part of the contract.",
  intro:"Insurance contracts are contracts of the utmost good faith — uberrimae fidei. The doctrine is one of the great distinguishing marks of insurance law, departing fundamentally from the ordinary commercial rule of caveat emptor. It exists because of the unique asymmetry of information in insurance: the insured alone knows the peculiar facts of the risk being placed; the insurer must rely on what the insured tells him; without a positive duty of disclosure, underwriting would be practically impossible.",
  dhead:"The principal features of the doctrine",
  dlede:"Utmost good faith carries the following features:",
  defs:[
   ["scales","A positive duty on both parties to disclose all material facts."],
   ["link","Reciprocity — the duty is owed by the insurer to the insured and by the insured to the insurer."],
   ["question","No prompting required — the duty arises from the relationship and is not dependent on specific questions being asked."],
   ["target","Materiality judged objectively — would the prudent underwriter (or, in the converse case, the prudent insured) have been influenced?"],
   ["warning","A duty to make no misrepresentation — and a positive duty to disclose, distinct from the duty merely to answer questions honestly."]],
  wrap:"The doctrine is most often discussed in relation to the duties owed by the insured to the insurer, but its reciprocity is real. The insurer must not, for example, misrepresent the cover, accept a premium for a risk he knows to be uninsurable, or remain silent in circumstances where disclosure of a relevant fact is required. The duty cuts both ways.",
  chead:"The classic case",cicon:"book",
  callout:"Carter v. Boehm (1766). Lord Mansfield: 'Good faith forbids either party, by concealing what he privately knows, to draw the other into a bargain from his ignorance of that fact, and his believing the contrary.' This is the locus classicus of UGF, and remains good law more than two and a half centuries later.",
  notes:[
   ["link","Lord Mansfield's reasoning was based on the practical fact that the peculiar facts of the risk lie chiefly within the insured's knowledge. Modern data sources have changed the landscape somewhat, but the underlying asymmetry remains."],
   ["scales","The doctrine was codified for marine business in the Marine Insurance Act 1906, sections 17 to 20, and has been substantially reformed for non-marine business by the Consumer Insurance (Disclosure and Representations) Act 2012 and the Insurance Act 2015."],
   ["warning","UGF does not require the insured to volunteer guesses or speculations. The duty extends to facts known or which ought to be known in the ordinary course of business."],
   ["target","Modern statutory reforms have softened, but not abolished, the doctrine. The duty of fair presentation under the Insurance Act 2015 is, in substance, a recast of utmost good faith adapted to modern commercial practice."]],
  conicon:"shield",
  conclusion:"Utmost good faith is the doctrinal heart of insurance contract law. Every other rule — material facts, misrepresentation, warranty — is in some way derived from or related to it."},
 {n:"02",kick:"Statutes",ti:"The 2012 and 2015 Reforms",
  blurb:"Two recent Acts have substantially reformed the law of disclosure — graduated remedies, fair presentation and the end of the old all-or-nothing rule.",
  intro:"For over two centuries, the position on disclosure was governed essentially by the Marine Insurance Act 1906 and the common-law principles it codified. The result, however, was thought to be too harsh: even an innocent error could entitle the insurer to avoid the policy and refuse all claims. Two recent Acts have substantially reformed the position: the Consumer Insurance (Disclosure and Representations) Act 2012 for consumer business, and the Insurance Act 2015 for non-consumer business.",
  dhead:"The new statutory regime",
  dlede:"The two reforming Acts may be set out as follows:",
  defs:[
   ["people","Consumer Insurance (Disclosure and Representations) Act 2012 — applies to personal/domestic policies; replaces the duty of disclosure with a duty to take reasonable care not to make a misrepresentation; introduces graduated remedies."],
   ["building","Insurance Act 2015 — applies to non-consumer (commercial) policies; recasts the duty as one of 'fair presentation of the risk'; introduces proportionate remedies and reforms the law of warranties."],
   ["coin","Graduated remedies — innocent, careless, and deliberate/reckless breaches are now treated differently, with avoidance reserved for the most serious cases."],
   ["scales","Warranty reform (IA 2015) — breach now suspends rather than terminates liability, and 'basis clauses' are abolished."],
   ["target","'But for' test — the insurer must show that, but for the breach, the contract would have been on different terms; recovery is reduced in proportion."]],
  wrap:"The reforms have not abolished the duty of disclosure; they have made its consequences more proportionate. A consumer who innocently mis-answers a question still has a claim to be paid in full; a commercial insured whose breach was minor faces a proportionate reduction rather than total loss of cover. Deliberate and reckless breaches, however, continue to attract the full traditional sanctions.",
  chead:"A worked example",cicon:"matrix",
  callout:"A commercial insured fails to disclose a previous claim. The insurer would have charged 25% more premium had it known. Under the Insurance Act 2015, the claim is reduced proportionately: the insured recovers approximately 80% of what the policy would otherwise have paid (premium charged / premium that would have been charged × claim).",
  notes:[
   ["link","The 2012 Act took effect for consumer policies issued on or after 6 April 2013; the 2015 Act took effect for non-consumer policies on or after 12 August 2016. Both have now had several years' operation."],
   ["question","Contracting out of the 2015 Act in commercial business is permitted but subject to the 'transparency requirements': any disadvantageous term must be sufficiently clear and brought to the insured's attention."],
   ["warning","The graduated remedies do not protect deliberate or reckless misrepresentation; in those cases the insurer's traditional remedy of avoidance, with no return of premium, remains available."],
   ["coin","Practitioners should be alive to the fact that policies still in force on inception dates before these reforms may be governed by the old law; the 1906 Act position remains relevant for legacy business."]],
  conicon:"target",
  conclusion:"The 2012 and 2015 reforms together represent the most significant change to the law of disclosure in over a century. Their guiding principle is proportionality: graduated breaches attract graduated remedies."},
 {n:"03",kick:"Materiality",ti:"Material Facts — What Counts and What Does Not",
  blurb:"The test is the prudent underwriter's judgement; the categories are well established. Knowing them is half the practical battle.",
  intro:"At the heart of every disclosure question is the concept of materiality. A fact is material if it would influence the judgement of a prudent underwriter — either in fixing the premium, or in determining whether to take the risk at all. The test is objective: it asks what the prudent underwriter would do, not what the actual underwriter would have done, or what the insured thought. Beyond the test, the categories of material and immaterial fact are well established.",
  dhead:"Material facts — examples",
  dlede:"Material facts include the following categories:",
  defs:[
   ["building","Physical hazards — features of the subject matter that increase the risk: construction, occupancy, security, location, condition."],
   ["people","Moral hazards — features of the insured that bear on the risk: previous claims, convictions, financial difficulties, fraud history."],
   ["link","Insurance history — previous refusals, cancellations, special terms imposed by other insurers."],
   ["warning","Previous losses — claims paid or refused, including under other policies."],
   ["scales","Changes during the term — insofar as the policy requires their notification."]],
  wrap:"Equally important — and often overlooked — are the categories of fact that need not be disclosed. The insurer cannot complain of non-disclosure of facts of common knowledge, facts of law, facts the insurer already knows, facts the insurer ought to know in the ordinary course of business, facts the insurer has waived by failing to ask, or facts that lessen the risk. These exceptions reflect both common sense and the practical limits of any disclosure regime.",
  chead:"A guiding principle",cicon:"target",
  callout:"At the proposal stage, the practitioner should ask: 'Would this fact, if known, change either the premium quoted or the decision to underwrite at all?' If yes, it is material and should be disclosed; if no, it falls outside the duty.",
  notes:[
   ["question","Materiality is not the same as causation. A fact may be material in respect of one type of loss but not another, and the Insurance Act 2015 has helpfully recognised that breach of a warranty unconnected to the loss does not discharge liability."],
   ["coin","Moral hazards are particularly important and particularly often disputed. A previous fraud conviction, even if unrelated to the current risk, is almost always material; the insurer is entitled to know with whom it is dealing."],
   ["link","Where the proposer answers no questions on a particular topic, the insurer may have waived its right to that information by not asking — particularly where the proposal form is comprehensive on other topics."],
   ["warning","The categories of 'facts the insurer ought to know in the ordinary course of business' are tested against the standards of the prudent insurer in the relevant market; reinsurance and specialist lines have their own conventions."]],
  conicon:"shield",
  conclusion:"Materiality is the gateway concept of the law of disclosure. Master the categories, apply the prudent underwriter test, and most practical questions on disclosure can be answered with confidence."},
 {n:"04",kick:"Breach",ti:"Breach and its Consequences",
  blurb:"The remedies now depend not just on what was misrepresented but on why — innocent, careless or deliberate.",
  intro:"The consequences of breach of the disclosure duty depend on three factors: who the insured is (consumer or non-consumer), what the nature of the breach was (innocent, careless, deliberate or reckless), and what the insurer would have done but for the breach. The 2012 and 2015 Acts together provide a calibrated set of responses, more proportionate than the old all-or-nothing rule but still substantial in their most severe form.",
  dhead:"Remedies under the two regimes",
  dlede:"The remedies for breach may be set out as follows:",
  defs:[
   ["shield","Consumer — innocent: insurer must pay the claim in full, no remedy at all."],
   ["scales","Consumer — careless: proportionate remedy — reduced claim, additional premium, varied terms, or avoidance with return of premium if the insurer would not have written at all."],
   ["warning","Consumer — deliberate/reckless: avoidance, no claim, retain premium."],
   ["target","Non-consumer — non-deliberate breach of fair presentation: proportionate remedy on the 'but for' principle."],
   ["coin","Non-consumer — deliberate/reckless: avoidance, no claim, no return of premium."]],
  wrap:"The graduated structure reflects a clear policy choice: the law will be hard on those who lie or cheat, but should not be ruinous to those who make innocent errors. A consumer who genuinely misunderstood a question and made an honest mistake is now in a far better position than was the case under the pre-2012 law.",
  chead:"A worked illustration",cicon:"matrix",
  callout:"A consumer carelessly under-states her annual mileage on a motor proposal. The insurer would have charged 20% more premium had it known. The Act provides a proportionate remedy: the claim is paid, but reduced to approximately 83% of what would otherwise have been recovered (premium charged / premium that would have been charged).",
  notes:[
   ["link","The classification of a breach as innocent, careless, deliberate or reckless is itself often the most contentious question on a contested claim. The Acts provide tests but the application is fact-sensitive."],
   ["question","The 'but for' calculation under the 2015 Act can produce striking results: where the insurer would not have written the risk at all, the entire claim is lost (subject to return of premium); where the additional premium would have been modest, the reduction is modest also."],
   ["warning","Deliberate or reckless breach is not the same as fraud. A breach is deliberate if the insured knew the statement was untrue or did not care; reckless if the insured was indifferent to its truth. Fraud, with its own additional consequences, requires actual intent to deceive."],
   ["coin","The insurer who wishes to rely on a breach must show both materiality and the inducing effect on its actual decision; the 'but for' test prevents technical reliance on breaches that made no real difference."]],
  conicon:"target",
  conclusion:"The new regime is proportionate but not weak. A serious breach still has serious consequences; the law has simply reserved those consequences for cases that genuinely merit them."},
 {n:"05",kick:"Warranties",ti:"Warranties and Conditions",
  blurb:"Contractual terms in the policy itself — historically harsh in their consequences, now reformed by the Insurance Act 2015.",
  intro:"A warranty in insurance is a contractual term by which the insured promises a particular state of affairs. The classical common-law rule was that breach of warranty discharged the insurer's liability automatically from the date of breach — a rule of remarkable severity, applying even where the breach had no connection to the loss claimed. The Insurance Act 2015 has substantially reformed this position.",
  dhead:"Warranties under the new regime",
  dlede:"The reformed position on warranties is as follows:",
  defs:[
   ["scales","A warranty is a contractual term by which the insured promises something — a state of affairs, the existence of a fact, or future conduct."],
   ["target","Breach of warranty no longer discharges the insurer's liability permanently; it suspends liability for so long as the breach continues."],
   ["link","Liability resumes once the breach has been remedied and the position is restored."],
   ["warning","Where a warranty relates to a particular type of loss (for example, a security warranty in respect of theft), breach does not discharge liability for unrelated losses."],
   ["question","Basis clauses — by which all answers in the proposal form were converted into warranties — are abolished by the 2015 Act."]],
  wrap:"The reform produces a much more proportionate result. A breach of a security warranty during the day no longer voids a night-time fire claim; an installation defect on one piece of plant no longer defeats a claim arising from an unrelated breakdown elsewhere; a temporary lapse, once put right, no longer ends cover for ever. The contract continues to do its work, suspended only for the period of the breach.",
  chead:"A worked example",cicon:"shield",
  callout:"A factory has a warranty requiring its sprinkler system to be operational at all times. The sprinklers are out of service for a fortnight while being serviced; during that fortnight an unrelated machinery breakdown occurs. Under the 2015 Act, the breakdown claim is not defeated by the warranty breach — the breach relates to fire risk, not breakdown.",
  notes:[
   ["coin","Conditions, by contrast with warranties, are policy terms whose breach gives rise to remedies short of discharge — typically reduction or repudiation of the particular claim affected. The distinction between condition and warranty is one the policy itself must make clear."],
   ["link","Conditions precedent to liability remain a powerful tool for insurers: breach of a condition precedent to a particular claim still defeats that claim, though without affecting the policy as a whole."],
   ["warning","The reform of warranties applies prospectively from August 2016; older policies, and some sectors with their own bespoke conventions, may continue to operate under the historic rules until renewal under the new regime."],
   ["target","Held covered clauses provide a contractual mechanism for continuing cover even after breach, subject to prompt notice and payment of additional premium; they sit alongside the statutory reforms as a further mitigation."]],
  conicon:"target",
  conclusion:"Warranties remain powerful contractual tools but they no longer operate as quasi-statutory traps. The 2015 reforms restore proportion to a doctrine that had become increasingly out of step with modern commercial expectations."},
 {n:"06",kick:"Compulsory",ti:"Compulsory Insurance and Third-Party Rights",
  blurb:"In compulsory classes, the law protects innocent third parties even when the insurer would otherwise be entitled to avoid.",
  intro:"In compulsory classes of insurance — chiefly motor third-party and employers' liability — the law goes beyond the ordinary contractual position and provides direct protection for innocent third parties. The policy may be defective as between insurer and insured for any number of reasons (non-disclosure, breach of warranty, failure to pay premium); but the third-party victim is given a direct claim against the insurer that cannot be defeated by those defects.",
  dhead:"The principal compulsory classes and their protections",
  dlede:"The position in the principal compulsory classes is as follows:",
  defs:[
   ["target","Motor third-party — Road Traffic Act 1988: insurer must satisfy any judgement obtained by a third party even where the insurer would otherwise be entitled to avoid; right of recovery against the insured is preserved."],
   ["building","Employers' liability — Employers' Liability (Compulsory Insurance) Act 1969 requires cover; Third Parties (Rights against Insurers) Acts give injured employees direct rights against the insurer."],
   ["scales","Other statutory compulsory classes — professional indemnity for solicitors, riding establishments, nuclear installations, oil pollution — each with its own statutory regime."],
   ["coin","Subrogation — the insurer who has paid the third party retains its right of recovery against the insured for any sums paid out where the policy would otherwise have defeated the claim."]],
  wrap:"The principle is one of social protection: the victim of a road accident or a workplace injury should not be left without recovery merely because the responsible party failed to disclose a previous claim or breached a warranty. The insurer pays, then recovers from the insured if it can — a clean separation of the public-protective and private-contractual aspects of the policy.",
  chead:"A practical illustration",cicon:"warning",
  callout:"A motor insured fails to disclose a previous conviction; the insurer is entitled to avoid the policy. But before avoidance can take effect, the insured causes injury to a third party. Under the RTA 1988, the insurer must satisfy the third party's claim in full; it then has a statutory right of recovery against the insured for the sums paid.",
  notes:[
   ["link","The Third Parties (Rights against Insurers) Act 2010 (which replaced the 1930 Act) modernised the procedure by which a third party can pursue the insurer directly when the insured is insolvent or has ceased to exist."],
   ["question","The protective regime extends only as far as the statute reaches: voluntary cover beyond the compulsory minimum remains subject to the ordinary contractual rules and may be defeated by non-disclosure or breach in the usual way."],
   ["warning","The protective regime is not a charter for insureds to flout the disclosure rules: the right of recovery against the insured is real, and an insured who provokes its operation will find itself uninsured in substance even if its victims are paid."],
   ["coin","In practice, recovery from the insured in such cases is often impossible — particularly where the insured is impecunious — and the insurer simply bears the loss. The market spreads it across all policyholders through pricing."]],
  conicon:"shield",
  conclusion:"In compulsory classes, the law subordinates the ordinary contractual remedies to the wider social purpose of protecting innocent third parties. The result is a complex but coherent framework in which contractual remedies and statutory protection sit side by side."}
]}

{id:"06",title:"Proximate Cause",kicker:"Causation",
desc:"The active, efficient cause that sets in motion the chain of events bringing about loss — and how policies allocate liability between insured, excluded and uninsured perils.",
cards:[
 {t:"01 · Definition",ti:"Pawsey v. Scottish Union (1908)",
  f:"The leading definition of proximate cause — efficient, not last in time.",
  p:"State the definition in Pawsey v. Scottish Union.",
  a:["The active, efficient cause that sets in motion a chain of events","Which brings about a result","Without the intervention of any force started and working actively from a new and independent source","'Proximate' means efficient, not the nearest in time"],
  n:"Lord Bacon: 'it were infinite for the law to consider the causes of causes'.",
  q:"Proximate cause in Pawsey v. Scottish Union means:",
  o:["The active, efficient cause without new and independent intervention","The cause nearest in time to the loss","The first event in the chain","Any cause contributing to the loss"],c:0,
  e:"It is the efficient, dominant cause — not necessarily the nearest in time."},
 {t:"02 · Peril",ti:"Peril and Hazard",
  f:"A peril is the cause of loss; a hazard is a factor that increases the chance of a peril operating.",
  p:"Distinguish peril from hazard.",
  a:["Peril — the cause of loss (fire, theft, storm)","Hazard — a condition that increases the chance of a peril operating or its severity","Physical hazard — features of the subject matter (construction, occupancy)","Moral hazard — features of the insured (carelessness, dishonesty)"],
  n:"Policies insure against perils; they price hazards.",
  q:"Fire is to peril as wooden construction is to:",
  o:["Hazard","Peril","Loss","Risk"],c:0,
  e:"Wooden construction is a physical hazard — it increases the chance of the peril (fire) operating."},
 {t:"03 · Categories",ti:"Three Categories of Peril",
  f:"For any policy, every peril falls into one of three categories — and the result depends on which.",
  p:"List the three categories of peril.",
  a:["Insured perils — those expressly covered by the policy","Excluded perils — those expressly excluded by the policy","Uninsured (or unnamed) perils — those neither expressly insured nor excluded"],
  n:"The rules of proximate cause apply to the interaction of these three categories.",
  q:"A peril neither expressly insured nor expressly excluded is:",
  o:["Uninsured (unnamed)","Excluded","Insured by default","Covered automatically"],c:0,
  e:"Such a peril is treated as uninsured — but its consequences depend on its relation to other perils in the chain."},
 {t:"04 · Single",ti:"Single Cause",
  f:"Where one peril alone causes the loss, the outcome depends purely on whether that peril is insured.",
  p:"State the rule where a single peril operates.",
  a:["Insured peril — claim payable in full","Excluded peril — claim refused","Uninsured peril — claim refused (no cover provided for it)","The simplest of the proximate-cause scenarios"],
  n:"The single-cause case sets the baseline for the more complex multi-cause analyses.",
  q:"A loss caused solely by an uninsured (unnamed) peril is:",
  o:["Not payable — there is no cover for the peril","Payable in full","Payable in part","Subject to average"],c:0,
  e:"An uninsured peril produces no cover."},
 {t:"05 · Concurrent",ti:"Concurrent Causes",
  f:"Where two or more perils operate independently and at the same time, each contributing to the loss.",
  p:"State the rule for concurrent causes.",
  a:["Where one is insured and one excluded — and the loss cannot be apportioned — the exclusion typically prevails","Where one is insured and one uninsured — and the loss cannot be apportioned — the insured peril's share is recoverable","Where the loss can be apportioned, each share is treated separately","The policy wording often dictates the precise result"],
  n:"Modern policies use express wordings ('directly or indirectly', 'whether declared or not') to govern the position.",
  q:"In concurrent causation involving an insured and an excluded peril, the loss is typically:",
  o:["Not payable — the exclusion prevails","Always payable in full","Payable on a 50:50 basis","Subject to court order"],c:0,
  e:"The exclusion usually defeats the claim where causes are inseparably concurrent."},
 {t:"06 · Chain",ti:"Chain of Events — Unbroken",
  f:"Where one peril sets off another in an unbroken chain, the original peril remains the proximate cause.",
  p:"State the rule where the chain is unbroken.",
  a:["The proximate cause is the original peril that set the chain in motion","Each subsequent event is a consequence, not a new cause","The intervening events do not break the chain of causation","The original peril determines whether the loss is covered"],
  n:"The classical example: storm damages a building, allowing rain to enter — the proximate cause remains the storm.",
  q:"Where storm damage exposes property to rain damage in an unbroken chain, the proximate cause is:",
  o:["The storm","The rain","Both equally","Neither"],c:0,
  e:"The storm set the chain in motion; the rain is a consequence."},
 {t:"07 · Break",ti:"Chain of Events — Broken",
  f:"A new and independent cause intervenes, breaking the chain — the original peril is no longer proximate.",
  p:"State the rule where the chain is broken.",
  a:["A new and independent cause (novus actus interveniens) intervenes","The chain of causation from the original peril is severed","The new cause becomes the proximate cause for the subsequent loss","The original peril is no longer responsible for the later events"],
  n:"The novus actus must be genuinely new and independent — not merely a foreseeable consequence.",
  q:"A 'new and independent' cause that breaks the chain is called:",
  o:["A novus actus interveniens","A primary cause","A concurrent cause","A remote cause"],c:0,
  e:"Novus actus interveniens — a new act intervening."},
 {t:"08 · Storm",ti:"Worked Example: Storm and Rain",
  f:"A classic textbook illustration of an unbroken chain.",
  p:"Analyse: a storm blows tiles from a roof; rain then enters and damages the contents.",
  a:["The peril is storm; the consequence is rain damage to the contents","Storm is the active, efficient cause that set the chain in motion","Rain entered as a direct and foreseeable consequence","Proximate cause: storm — the loss is recoverable under a storm policy"],
  n:"Compare: rain enters through a window left open — no storm; rain is the proximate cause and may not be covered.",
  q:"Storm blows tiles off; rain then damages contents. Proximate cause is:",
  o:["Storm","Rain","Negligence","An act of God"],c:0,
  e:"The storm set the chain in motion; the rain is consequence, not cause."},
 {t:"09 · Earthquake",ti:"Worked Example: Earthquake and Fire",
  f:"Where the earthquake itself is excluded, a fire following may still be recoverable — or not — depending on the wording.",
  p:"Analyse: an earthquake fractures a gas pipe and a fire ensues.",
  a:["Earthquake is the proximate cause of all the consequent damage","Where earthquake is excluded, the policy may go further and exclude 'fire following earthquake' as well","The phrase 'whether directly or indirectly caused by earthquake' is often used","Modern wordings are explicit — the result depends on the exact language of the exclusion"],
  n:"In standard fire wordings, 'fire following earthquake' is usually excluded.",
  q:"Earthquake fractures a pipe; a fire ensues. Under a policy excluding 'fire directly or indirectly caused by earthquake', the fire damage is:",
  o:["Not covered — the exclusion captures it","Covered — the proximate cause is fire","Covered in part only","Subject to apportionment"],c:0,
  e:"The wording 'directly or indirectly' captures fire following earthquake."},
 {t:"10 · War",ti:"Worked Example: War and Riot",
  f:"War, civil war and similar perils are commonly excluded — and the exclusion typically extends widely.",
  p:"Analyse: a riot during a state of insurrection damages property.",
  a:["War, civil war and insurrection are commonly excluded under standard policies","Riot and civil commotion may be separately insured (subject to exclusions for war)","The Riot Damages Act 1886 provides statutory compensation in some cases","The exclusion in the policy is usually expressed in broad terms"],
  n:"Coxe v. Employers Liability Assurance Co. (1916) — train hit by enemy fire during transit; war was the proximate cause; military operations exclusion applied.",
  q:"In Coxe v. Employers Liability, the proximate cause of injury was:",
  o:["War — captured by the military operations exclusion","Accident — within the cover","Negligence","Act of God"],c:0,
  e:"Coxe held that war/military operations was the proximate cause."},
 {t:"11 · Rider",ti:"Worked Example: Rider Thrown from Horse",
  f:"A subtle case where the chain may be broken by a new and independent cause.",
  p:"Analyse: a rider is thrown from his horse, falls into a stream, and drowns.",
  a:["The rider's fall was caused by being thrown","Drowning, in the stream where he landed, was the immediate cause of death","The question: was being thrown the proximate cause of drowning?","On the classical analysis: yes — being thrown set the chain in motion; drowning was a direct consequence"],
  n:"This is the textbook illustration of an unbroken chain in personal accident contexts.",
  q:"A rider is thrown into a stream and drowns. The proximate cause of death is:",
  o:["Being thrown from the horse","Drowning","Negligence of the horse","Bad luck"],c:0,
  e:"Being thrown set the chain in motion; drowning followed directly."},
 {t:"12 · Modification",ti:"Modification by Policy Wording",
  f:"The common law on proximate cause can be — and often is — modified by express wording.",
  p:"Explain how the policy may modify proximate cause.",
  a:["By extending an exclusion to causes 'directly or indirectly' giving rise to loss","By including or excluding 'consequential' loss","By specifying that the policy applies 'whether declared or not' to particular perils","By identifying which peril is to be treated as proximate in defined circumstances"],
  n:"Modern policies use express wordings to control causation; the common law applies in the absence of such wordings.",
  q:"The wording 'directly or indirectly caused by' is used to:",
  o:["Extend an exclusion to capture consequential perils","Extend cover to consequential perils","Limit causation to single events","Convert exclusions into warranties"],c:0,
  e:"Such wording extends an exclusion to capture indirect consequences as well."},
 {t:"13 · Insured first",ti:"Insured Peril First in Chain",
  f:"Where an insured peril starts the chain, the consequent damage from an uninsured (unnamed) peril is generally recoverable.",
  p:"State the rule where an insured peril starts the chain and an uninsured peril follows.",
  a:["The insured peril is the proximate cause","The uninsured peril, following in unbroken chain, is a consequence","The full loss is generally recoverable under the policy","Unless the uninsured peril is in fact an excluded peril"],
  n:"This is the principle that makes storm-then-rain claims payable under storm policies.",
  q:"Storm is insured; a tree falls (uninsured peril) directly because of the storm. The damage from the tree is:",
  o:["Recoverable — storm is the proximate cause","Not recoverable — tree is not an insured peril","Recoverable only in part","Subject to court order"],c:0,
  e:"The chain is unbroken; storm remains the proximate cause."},
 {t:"14 · Excluded first",ti:"Excluded Peril First in Chain",
  f:"Where an excluded peril starts the chain, the consequent damage from an insured peril is generally not recoverable.",
  p:"State the rule where an excluded peril starts the chain.",
  a:["The excluded peril is the proximate cause","The insured peril following in unbroken chain is a consequence","The loss is generally not recoverable","Subject to express wording overriding the position"],
  n:"This is why 'fire following earthquake' is typically not recovered under a standard fire policy.",
  q:"Earthquake (excluded) causes a fire (insured). Loss is generally:",
  o:["Not recoverable — earthquake is the proximate cause","Recoverable — fire is insured","Recoverable in part","Recoverable under a separate earthquake policy"],c:0,
  e:"The excluded peril at the start of the chain defeats the claim."},
 {t:"15 · Coxe",ti:"Coxe v. Employers Liability (1916)",
  f:"The leading case on the application of the war/military operations exclusion in personal accident cover.",
  p:"State the rule in Coxe v. Employers Liability.",
  a:["An officer was killed when struck by a train at night during a state of war","The blackout in operation under wartime regulations was a contributory factor","The court held that the proximate cause was the military operations giving rise to the blackout","The war exclusion in the policy accordingly applied"],
  n:"The case is often cited for the principle that the proximate cause is the substantive, not the formal, cause.",
  q:"In Coxe v. Employers Liability, the court held the proximate cause to be:",
  o:["The military operations giving rise to the blackout","The train","The officer's own conduct","The lighting regulations alone"],c:0,
  e:"The substantive cause was the military operations; the blackout was merely the form."}
