facts:[
 {n:"01",kick:"Foundations",ti:"Ethics and the CII Code",
  blurb:"Beyond compliance — the professional standards that define what it means to be a CII member.",
  intro:"Ethics is the foundation of professional practice in insurance. Compliance with laws and regulations is essential but not enough on its own: the rules cannot anticipate every situation, and a person of integrity is needed to do the right thing where they are silent. The Chartered Insurance Institute's Code of Ethics sets out the professional standards expected of all CII members, from new entrants through to the most senior practitioners.",
  dhead:"The CII Code of Ethics",
  dlede:"The Code requires CII members to:",
  defs:[
   ["scales","Comply with the Code and all relevant laws and regulations applicable to their work."],
   ["target","Act with the highest ethical standards and integrity in all professional matters."],
   ["people","Act in the best interests of clients — particularly where the member's own interests might pull in a different direction."],
   ["building","Provide a high standard of service and maintain the knowledge and skills required for the role."],
   ["shield","Treat people fairly regardless of any protected characteristic — race, gender, disability, sexual orientation, age, religion, etc."]],
  wrap:"These principles look unremarkable when stated baldly, but they are demanding in application. Acting in the best interests of clients is not always commercially convenient; speaking up where standards are being compromised requires courage; treating colleagues fairly under pressure requires discipline. The Code is a standing reminder of what membership of a profession actually requires.",
  chead:"A guiding test",cicon:"matrix",
  callout:"When facing an ethical dilemma, the CII suggests asking: Would I be comfortable if my actions were reported in the press? Would I be proud to explain my decision to my family? Would the action stand up to scrutiny by a regulator? If the answer to any is 'no', the action is probably wrong.",
  notes:[
   ["link","The CII Code applies to all CII members — Affiliates through to Fellows — and to all student members. Breach can lead to disciplinary action up to and including expulsion from the Institute."],
   ["coin","Ethical lapses are typically the result not of bad intent but of pressure, fatigue, or rationalisation. Maintaining a clear sense of professional standards, and surrounding oneself with colleagues who do likewise, is the best practical defence."],
   ["warning","The most damaging ethical failures are often those that compound over time — small compromises that escalate, or short-term advantages that build into structural problems. Vigilance at the start is far easier than correction later."],
   ["target","Continuing professional development (CPD) is a Code requirement. The reasoning is straightforward: a professional who does not keep up to date cannot provide a competent service, and incompetence is itself an ethical issue."]],
  conicon:"shield",
  conclusion:"The CII Code is not a list of constraints; it is a description of what a professional is. Internalising its requirements is what turns a person doing a job into a member of a profession."},
 {n:"02",kick:"ESG",ti:"ESG and Climate Risk",
  blurb:"Environmental, social and governance considerations — now central to insurance and increasingly central to regulation.",
  intro:"ESG — environmental, social and governance — has moved from a niche concern to a central feature of insurance business in the past decade. Insurers face climate risk as both risk-takers (through their underwriting exposures) and investors (through their asset portfolios); regulators increasingly expect ESG factors to be integrated into risk management, capital assessment and disclosure; customers expect their providers to operate sustainably and ethically. Knowing the territory is now part of basic professional competence.",
  dhead:"The three pillars and their insurance implications",
  dlede:"ESG considerations in insurance break down as follows:",
  defs:[
   ["target","Environmental — climate change is the dominant theme; insurers face physical risks (storms, floods, droughts), transition risks (stranded assets, regulatory change) and liability risks (litigation against polluters)."],
   ["people","Social — workforce diversity, human rights, community impact, financial inclusion; the social licence to operate is increasingly subject to scrutiny."],
   ["scales","Governance — board structure, executive remuneration, audit, ethics, regulatory compliance; the third pillar is what enables the first two to be addressed effectively."],
   ["link","Investment dimension — insurers are major investors; their asset portfolios are exposed to all three ESG dimensions."],
   ["warning","Reporting requirements — TCFD-aligned disclosure, sustainability reporting, regulatory expectations all converging on transparent ESG reporting."]],
  wrap:"The insurance industry's response to ESG has been mixed. Many firms have made ambitious public commitments — net-zero underwriting portfolios, withdrawal from coal financing, integration of climate risk into ORSA — but progress is uneven. The pressure from regulators, investors and customers, however, is firmly in one direction; firms that do not engage seriously with ESG will find themselves increasingly disadvantaged.",
  chead:"A modern case",cicon:"book",
  callout:"Climate-related litigation has expanded rapidly. Cases against major energy companies, government bodies and others now total in the thousands worldwide. Where these companies have insurance — directors and officers cover, public liability, professional indemnity — their insurers are drawn into the exposure. Climate liability is no longer hypothetical.",
  notes:[
   ["link","The Task Force on Climate-related Financial Disclosures (TCFD) issued recommendations in 2017 for climate-related financial disclosures by companies. These have been progressively adopted into regulation and listing requirements globally."],
   ["coin","Stranded assets — assets that lose value because of the transition to a low-carbon economy — are a major concern for insurance investment portfolios. Fossil fuel reserves, carbon-intensive infrastructure and similar holdings face the prospect of significant write-downs."],
   ["warning","Greenwashing — claiming environmental credentials not supported by actual practice — has become a major reputational and regulatory risk. Conduct regulators have brought enforcement action against firms for misleading sustainability claims."],
   ["target","The 'just transition' concept recognises that the move to a low-carbon economy must take account of social impacts: workers and communities dependent on carbon-intensive industries cannot be simply left behind. Insurance has a role to play in supporting the transition."]],
  conicon:"target",
  conclusion:"ESG is now a mainstream concern, not a niche specialism. Every insurance professional should have at least a basic familiarity with the framework; those involved in strategy, underwriting or investment need a much deeper command."},
 {n:"03",kick:"Governance",ti:"Corporate Governance in Insurance",
  blurb:"How insurers are directed and controlled — the board, the committees, the controls and the regulators who expect to see them work.",
  intro:"Corporate governance is the system of rules, practices and processes by which an insurance company is directed and controlled. Strong governance is both a regulatory requirement and a commercial necessity: weak governance has been a feature of nearly every major insurance failure over recent decades. The modern framework — built up over years of reform and refinement — sets demanding standards for board composition, internal control, audit and accountability.",
  dhead:"The principal elements",
  dlede:"Modern corporate governance in insurance comprises:",
  defs:[
   ["building","The board — its composition, independence, balance of skills, separation of chairman and CEO; non-executive directors providing independent challenge."],
   ["scales","Board committees — audit, risk, nomination, remuneration; each chaired by an independent director and with defined terms of reference."],
   ["target","Internal control — risk management framework, internal audit, financial reporting controls, IT and operational controls."],
   ["link","Senior accountability — the Senior Managers and Certification Regime makes individual senior managers personally accountable for the conduct of the business."],
   ["coin","Remuneration — alignment of executive pay with long-term success, deferral and clawback for misconduct, transparency to shareholders."]],
  wrap:"The Senior Managers and Certification Regime (SMCR), introduced for insurance in 2018, represents the most significant recent development. Individual senior managers are personally accountable for defined responsibilities; failures of conduct can result in personal regulatory action including disqualification and fines. The regime has materially changed the seriousness with which senior individuals approach their roles.",
  chead:"A famous failure",cicon:"warning",
  callout:"The collapse of Equitable Life in 2000 was substantially a failure of governance: an inadequately independent board, ineffective risk management, opaque decision-making and a culture that resisted external challenge. The failure cost policyholders billions and prompted significant regulatory reform in its aftermath.",
  notes:[
   ["link","The UK Corporate Governance Code applies to listed companies and sets out the 'comply or explain' framework that has been the template for governance reform internationally. Many insurance firms apply the Code voluntarily even where they are not listed."],
   ["warning","The role of non-executive directors has become significantly more demanding. Time commitments have increased, accountability has deepened, and the expectation of expertise has risen. Finding suitably qualified non-executives is a real challenge for many firms."],
   ["coin","Remuneration is one of the most sensitive areas of governance. Executive pay scandals — extreme rewards combined with poor company performance — have driven repeated rounds of reform. The current emphasis is on long-term alignment, deferral and the possibility of clawback for misconduct."],
   ["target","Board diversity — by gender, ethnicity, background and skill — is now widely understood to improve decision quality and reduce groupthink. Most boards have made significant progress but the work is far from complete."]],
  conicon:"shield",
  conclusion:"Corporate governance is the framework within which all other regulatory and ethical requirements operate. Strong governance enables firms to manage risk, treat customers fairly and meet regulatory expectations; weak governance makes all of these much harder."},
 {n:"04",kick:"Risk",ti:"Risk Management Framework and ORSA",
  blurb:"The structured system for identifying, measuring, managing and reporting risk — and the forward-looking assessment that ties it together.",
  intro:"Modern insurance regulation expects insurers to operate a comprehensive risk management framework: a structured system covering all material risks faced by the business, with defined processes for identification, measurement, management and reporting. The Own Risk and Solvency Assessment (ORSA) brings this framework to a forward-looking head, requiring the insurer to assess whether its capital resources are adequate to the risks identified.",
  dhead:"The framework and the ORSA",
  dlede:"The principal elements are these:",
  defs:[
   ["target","Risk identification — systematic identification of all material risks (underwriting, market, credit, operational, strategic, reputational)."],
   ["scales","Risk measurement — quantification where possible; scenarios and stress tests where probabilistic measurement is impractical."],
   ["shield","Risk management — controls, mitigations, transfers (including reinsurance), acceptance of residual risk."],
   ["link","Risk monitoring and reporting — ongoing tracking, escalation, board-level reporting."],
   ["coin","ORSA — forward-looking assessment of risk and capital adequacy over the business planning horizon; submitted to the regulator and used by the board for strategic decisions."]],
  wrap:"The ORSA is the most distinctive feature of the modern framework. Earlier prudential regimes focused on point-in-time capital adequacy; the ORSA requires insurers to consider their own assessment of risks and capital over a multi-year horizon, including stressed scenarios. The exercise is intended to be genuinely strategic — informing business planning and major decisions, not merely producing a document for regulatory filing.",
  chead:"A practical illustration",cicon:"matrix",
  callout:"An insurer's ORSA may identify that its capital is adequate for the standard SCR but inadequate for a severe pandemic scenario combined with a major financial market downturn. The exercise reveals a strategic risk that the standard regulatory calculation does not capture — and prompts action (capital raising, reinsurance, business restructuring) before the risk crystallises.",
  notes:[
   ["link","The 'three lines of defence' model is widely used to structure risk management responsibilities. First line: operational management owns and manages risk. Second line: risk and compliance functions oversee and challenge. Third line: internal audit provides independent assurance."],
   ["coin","Risk culture is increasingly emphasised by regulators. Even the best-designed framework will fail without a culture that supports honest reporting of risks, challenge of management decisions and proactive risk management at all levels."],
   ["warning","Operational risk — losses arising from people, processes, systems and external events — has historically been hard to quantify but is now recognised as a major and growing risk for insurance firms, particularly in relation to cyber threats and IT failures."],
   ["target","Climate risk integration into the risk management framework is an emerging regulatory expectation. Firms are expected to identify, measure and manage climate-related risks alongside traditional risk categories, with explicit consideration in the ORSA."]],
  conicon:"target",
  conclusion:"The risk management framework, anchored by the ORSA, is the modern insurer's principal tool for understanding and responding to the risks it faces. Done well, it informs strategy and protects the firm; done badly, it is a paper exercise that delivers no real value."},
 {n:"05",kick:"Resilience",ti:"Operational Resilience and Business Continuity",
  blurb:"Keeping critical functions running through disruption — and the regulatory expectations that now apply.",
  intro:"Operational resilience has become a major regulatory focus, accelerated by the COVID-19 pandemic and continuing cyber threats. Insurers must be able to maintain critical operations through disruption: pandemic, cyber attack, IT failure, natural disaster, supplier failure or geopolitical event. The expectation is not merely to plan for the foreseeable but to develop genuine resilience — the capacity to continue serving customers even in unforeseen circumstances.",
  dhead:"The principal elements of operational resilience",
  dlede:"The current regulatory framework requires firms to:",
  defs:[
   ["target","Identify important business services — the functions whose disruption would harm consumers or market integrity."],
   ["scales","Set impact tolerances — the maximum disruption to each important business service that the firm could tolerate."],
   ["link","Map dependencies — people, processes, technology, third parties, facilities — that support each important business service."],
   ["warning","Test resilience — through scenarios, simulations and 'red team' exercises designed to find weaknesses."],
   ["building","Recover — defined procedures for resumption of normal operations, with regular updates and lessons learned."]],
  wrap:"The framework reflects a recognition that some disruptions cannot be prevented but their impact can be limited. Critical operations should be designed so that they can continue, perhaps with reduced functionality, even when major elements of the supporting infrastructure are unavailable. The COVID-19 experience showed that firms with robust remote-working capabilities and diversified supplier arrangements coped far better than those without.",
  chead:"A modern test",cicon:"warning",
  callout:"A major cyber attack disables an insurer's main IT systems for a week. Operational resilience asks: can the firm still pay claims, handle complaints, accept renewals? Are there manual workarounds? Can critical data be restored? Are customers communicated with effectively? The answers determine whether the disruption causes lasting harm or merely temporary inconvenience.",
  notes:[
   ["link","The PRA, FCA and Bank of England issued joint policy on operational resilience in 2021, with implementation through 2025. The framework is now a central feature of supervision for major financial services firms."],
   ["coin","Third-party risk is a significant component of operational resilience. Modern insurers depend on large numbers of suppliers — IT, claims handling, distribution, professional services — and the failure of a critical supplier can disrupt critical operations as completely as an internal failure."],
   ["warning","Cyber resilience is the most rapidly evolving area. Ransomware attacks on insurance firms have caused weeks of disruption; the threat environment continues to deepen. Firms must invest heavily in detection, response and recovery."],
   ["target","Operational resilience and business continuity overlap but are not identical. Business continuity tends to focus on documented response to anticipated events; operational resilience adds the broader capacity to continue critical operations through unforeseen disruption."]],
  conicon:"shield",
  conclusion:"Operational resilience has moved from being a back-office concern to a central feature of regulatory expectation and board-level strategy. Firms that take it seriously will weather the inevitable disruptions of the coming decades far better than those that do not."},
 {n:"06",kick:"Data",ti:"Data Protection and GDPR",
  blurb:"Insurance is one of the most data-intensive industries — and data protection law imposes strict obligations on every aspect of its handling.",
  intro:"Insurance is built on data. Every proposal collects personal information; every underwriting decision uses it; every claim involves further data collection and processing. Modern data protection law — the General Data Protection Regulation in the EU, the UK GDPR domestically, and similar regimes worldwide — imposes strict obligations on every aspect of this handling. Compliance is a major operational discipline; breach can result in substantial fines and significant reputational damage.",
  dhead:"The GDPR principles applied to insurance",
  dlede:"The principal GDPR principles, with insurance application:",
  defs:[
   ["target","Lawfulness, fairness and transparency — clear basis for processing; customers know what is happening with their data."],
   ["link","Purpose limitation — data collected for one purpose (e.g. proposal) cannot be used for an unrelated purpose without consent."],
   ["coin","Data minimisation — collect only what is actually needed; do not gather data for hypothetical future use."],
   ["scales","Accuracy — keep data accurate and up to date; respond to correction requests promptly."],
   ["shield","Storage limitation — retain data only as long as necessary; have clear retention policies."],
   ["warning","Integrity and confidentiality — secure data appropriately; manage access; protect against breach."]],
  wrap:"In insurance the application of these principles produces practical challenges. Underwriting requires substantial personal data, but the duty of data minimisation argues for collecting only what is genuinely needed. Claims investigations may require collecting sensitive data, but transparency requires informing the customer. Marketing relies on data, but purpose limitation restricts what can be done with data collected for underwriting. Each of these tensions requires careful management.",
  chead:"A modern obligation",cicon:"book",
  callout:"Under GDPR, a personal data breach affecting individuals' rights must be reported to the regulator (in the UK, the ICO) within 72 hours of becoming aware of it. Affected individuals must also be notified where high risk arises. Failure to report can attract substantial fines on top of any fine for the breach itself.",
  notes:[
   ["link","Insurance has special categories of personal data — health data, criminal convictions, genetic data — that require additional protections. Processing these is permitted on specific grounds, including 'reasons of substantial public interest', but the obligations are demanding."],
   ["coin","Data subject rights — access, correction, deletion, portability, restriction of processing — apply to insurance customers as to others. Firms must have processes to respond to these requests within the statutory time limits (generally one month)."],
   ["warning","International data transfers are tightly regulated. Insurance groups operating across multiple jurisdictions must use approved mechanisms (standard contractual clauses, binding corporate rules) to transfer personal data internationally."],
   ["target","Data ethics — going beyond legal compliance to consider whether particular uses of data are appropriate — is an emerging discipline. Insurance applications include profiling, automated decision-making and the use of new data sources (social media, telematics, genetic information)."]],
  conicon:"target",
  conclusion:"Data protection is now embedded in every aspect of insurance operations. The technical requirements are detailed; the underlying principle is straightforward — respect the data of individuals, collect only what is needed, protect it carefully, and use it only for purposes the individual would expect."}
]}
];

const FUN_FACTS={
 "01":[
  {ti:"Insurance is nearly four thousand years old",
   bd:"The Babylonian Code of Hammurabi, dating to around 1750 BC, contained a practice known as bottomry. A merchant borrowing to finance a shipment paid an additional sum on top of the loan, and in exchange the debt was wiped out if the goods were lost or stolen at sea. Risk pooling and risk transfer, the very ideas that underpin modern insurance, were already at work."},
  {ti:"The 1755 Lisbon earthquake reshaped how we think about risk",
   bd:"On All Saints' Day in 1755, an enormous earthquake, fire and tsunami devastated Lisbon. The Marquês de Pombal, charged with rebuilding the city, sent a structured questionnaire to every parish asking how long the shaking lasted, how the buildings fell and how many died. It was one of the earliest systematic attempts to quantify a catastrophic risk by collecting data, an approach that runs straight through to modern catastrophe modelling."},
  {ti:"\"Premium\" means a prize taken in advance",
   bd:"The English word descends from the Latin praemium, literally \"reward\" or \"prize before\". The insurer takes the prize at the outset of the contract, and the policyholder, in exchange, takes the peace of mind of replacing an unknown future loss with a known present cost. The very vocabulary of insurance carries the idea of risk transfer in its etymology."}
 ],
 "02":[
  {ti:"Lloyd's began in a coffee house",
   bd:"Edward Lloyd opened his coffee house on Tower Street, London, in 1688, later moving to Lombard Street. Sailors, merchants and ship owners gathered there to swap intelligence on voyages and to write the earliest marine insurance contracts on its tables. The modern Lloyd's market, with its syndicates, brokers and Names, traces an unbroken line back to those coffee tables."},
  {ti:"The Lutine Bell and the rituals of bad news",
   bd:"HMS Lutine was wrecked off the Dutch coast in 1799 carrying a cargo of gold and silver insured at Lloyd's. The bell was salvaged from the wreck and hangs in the Lloyd's Underwriting Room to this day. By tradition it was rung once when bad news arrived about an overdue vessel, and twice when good news came in. The bell is now sounded only on ceremonial occasions, but the tradition endures."},
  {ti:"Almost anything can be insured at Lloyd's",
   bd:"Lloyd's syndicates have famously written cover for film stars' legs, concert pianists' hands, food critics' tastebuds and, on at least one occasion, alien abduction. The underlying principle is straightforward: provided the risk can be defined and priced, and is genuinely uncertain, an underwriter somewhere in the market will quote for it."}
 ],
 "03":[
  {ti:"A smoke ball, a £100 reward, and the law of contract",
   bd:"In Carlill v. Carbolic Smoke Ball Company (1893), the makers of a patented \"smoke ball\" promised £100 to anyone who used it and still caught influenza. Mrs Carlill did just that, claimed her £100, and won. The case is a foundation stone of the modern law of offer and acceptance in unilateral contracts, and it crops up in every insurance textbook because it shows precisely how an advertised offer can become a binding contract."},
  {ti:"A peppercorn will do",
   bd:"English law requires consideration for a contract to be binding, but the law has long held that consideration need only be sufficient, not adequate. A literal peppercorn handed over each year has been accepted as good consideration for a long lease. The principle matters in insurance because even a tiny premium, properly tendered and accepted, can fix the parties in a binding contract of insurance."},
  {ti:"The Marine Insurance Act 1906 was a one man codification",
   bd:"Sir Mackenzie Chalmers, a Treasury draftsman, distilled centuries of common law on marine insurance into the eighty-four sections of the Marine Insurance Act 1906. It remains the single most influential piece of insurance legislation in the common-law world and is still cited in modern judgments, more than a century after Chalmers laid down his pen."}
 ],
 "04":[
  {ti:"The Life Assurance Act 1774 was once known as the Gambling Act",
   bd:"Eighteenth century Londoners had developed a taste for taking out life policies on strangers, public figures and ailing royals, then waiting for the funeral. Parliament finally acted in 1774, requiring an insurable interest in any life assured. The Act is sometimes still called the Gambling Act, a reminder that the doctrine of insurable interest was forged to stop insurance turning into a wager on someone else's death."},
  {ti:"Macaura and the burnt timber",
   bd:"In Macaura v. Northern Assurance (1925), Mr Macaura sold his timber estate to a company in which he owned every share, then insured the timber in his own name. When fire destroyed the lot, the House of Lords held he could not recover, because the timber belonged to the company, not to him. A single shareholder, however total his ownership of the company, has no insurable interest in the company's assets. Few cases are taught more often."},
  {ti:"A peer and a fortune teller",
   bd:"The eighteenth century craze for life-policy gambling included a now infamous London market in policies on the lives of named celebrities. Bets were placed on whether a particular peer would survive a duel, or a famous actress an illness. The Life Assurance Act 1774 swept the practice away. Insurance has rested ever since on the principle that the insured must stand to lose something genuine if the insured event occurs."}
 ],
 "05":[
  {ti:"Lord Mansfield, a fort in Sumatra and the duty of disclosure",
   bd:"In Carter v. Boehm (1766), the governor of Fort Marlborough in Sumatra insured the fort against French capture without telling the underwriter that the fort was poorly defended and that French attack was a real prospect. The fort fell. Lord Mansfield held the insurer could avoid the policy because the insured had failed to disclose material facts, and laid down the doctrine of utmost good faith that still anchors modern disclosure law."},
  {ti:"A trivial slip and a void policy",
   bd:"Before the Consumer Insurance (Disclosure and Representations) Act 2012, a basis of contract clause could convert any answer on a proposal form into a warranty. A consumer who carelessly answered \"no\" to a question about minor parking damage could find an entirely unrelated theft claim refused years later. The 2012 Act, and the Insurance Act 2015 for commercial business, swept these clauses away for good."},
  {ti:"The cargo ship and the careless white lie",
   bd:"In Versloot Dredging v. HDI Gerling (2016), the Supreme Court considered a shipowner who supported a genuine claim with a fabricated story about a watchkeeper. The court held that such a \"collateral lie\" did not, by itself, forfeit a genuine claim, distinguishing fraudulent claims from fraudulent devices used to bolster them. The judgment marked the modern limits of the fraud rule and was promptly reflected in standard policy wordings."}
 ],
 "06":[
  {ti:"The Pawsey definition that has lasted more than a century",
   bd:"In Pawsey v. Scottish Union and National (1907), the court defined proximate cause as \"the active, efficient cause that sets in motion a chain of events bringing about a result, without the intervention of any force started and working actively from a new and independent source\". Every standard insurance textbook in the English-speaking world still quotes those words. Few definitions in law have aged so well."},
  {ti:"A torpedoed ship that ran aground",
   bd:"In Leyland Shipping v. Norwich Union (1918), a torpedo struck a vessel during the First World War. Crew and tugs fought to bring her safely to harbour, but the harbour master, fearing she would sink and block the entrance, ordered her moved. She broke her back and sank. The House of Lords held that the torpedo was still the proximate cause, even though the grounding came later in time. Proximate means efficient, not last."},
  {ti:"A train, a blackout and a war exclusion",
   bd:"In Coxe v. Employers' Liability Assurance (1916), an officer walked the line at night to check that a wartime blackout was being observed and was struck and killed by a train. The court held that the proximate cause of his death was the war, because the blackout that made the line invisible existed only because of military operations. The war exclusion in his policy applied. The case remains a classroom example of how proximate cause looks past the immediate event."}
 ],
 "07":[
  {ti:"Castellain v. Preston and the foundation of indemnity",
   bd:"In Castellain v. Preston (1883), Brett L.J. delivered what is still the locus classicus of the indemnity principle: the contract of insurance is a contract of indemnity, and of indemnity only, and the assured shall be fully indemnified, but never more than fully indemnified. Every doctrine of contribution, subrogation and average flows from that sentence."},
  {ti:"The Titanic claim was settled with striking speed",
   bd:"RMS Titanic was insured at Lloyd's for around one million pounds when she struck the iceberg in April 1912. Despite the scale of the disaster, the claim was settled in full within thirty days of the loss being confirmed. The episode is still cited as an early demonstration of how robust market practice could turn a catastrophe into a paid claim with remarkable speed."},
  {ti:"Why fifteen per cent matters",
   bd:"Modern reinstatement policies typically include an 85% memorandum: provided the sum insured is at least 85% of the full reinstatement cost, no deduction is made for depreciation and no average applies. The 15% margin is a deliberate calibration: enough to forgive an honest valuation error, firm enough to discourage deliberate under-insurance. It is one of the more elegant pieces of compromise in market practice."}
 ],
 "08":[
  {ti:"Yorkshire Insurance and the windfall recovery",
   bd:"In Yorkshire Insurance v. Nisbet Shipping (1962), an insurer paid £72,000 for the loss of a vessel and later recovered £127,000 from the wrongdoer when currency depreciation worked in its favour. The court held that the insurer could keep only the £72,000 it had actually paid out; the rest belonged to the insured. Subrogation, like insurance itself, allows neither party to profit."},
  {ti:"Lister, Romford Ice and a famously unpopular result",
   bd:"In Lister v. Romford Ice (1957), a lorry driver employed by the defendant injured his own father, also a Romford employee. The employer's insurer paid the damages and then subrogated against the negligent son. The House of Lords agreed they could, but the result was so unpopular that the insurance market entered a voluntary gentlemen's agreement not to exercise subrogation against fellow employees. It has held for over half a century."},
  {ti:"The police pay for riots",
   bd:"Under the Riot Damages Act 1886, replaced by the Riot Compensation Act 2016, insurers paying for damage caused by riot can recover the cost from the relevant police authority. During the 2011 English riots, claims in the hundreds of millions were paid by insurers and recouped from police forces under this statutory route. Public disorder, it turns out, is paid for by the public purse."}
 ],
 "09":[
  {ti:"Compulsory motor insurance has a clear birthday",
   bd:"The Road Traffic Act 1930 was the first piece of British legislation to make third-party motor insurance compulsory. Before then, a victim of negligent driving had a legal right to damages but no practical means of collecting them if the driver had no money. Almost every developed country has since followed the same path, but the United Kingdom was an early mover."},
  {ti:"The Motor Insurers' Bureau and a market-funded safety net",
   bd:"The Motor Insurers' Bureau was established in 1946 to handle claims arising from accidents caused by uninsured or untraced drivers. It is funded by every authorised motor insurer in the country, in proportion to their motor premium income. Victims of hit-and-run drivers are paid as if the driver had been properly insured. It is one of the more elegant pieces of market self-policing in financial services."},
  {ti:"The Equitable Life and a 238-year story",
   bd:"The Equitable Life Assurance Society was founded in 1762 and is generally regarded as the world's oldest mutual life office. It survived for 238 years and then closed to new business in 2000, after the House of Lords held it could not deny promised guaranteed annuity rates. Its difficulties prompted a generation of regulatory reform and stand as a permanent reminder that long history is no substitute for sound governance."}
 ],
 "10":[
  {ti:"The CII received its Royal Charter in 1912",
   bd:"The Chartered Insurance Institute was granted a Royal Charter on 17 January 1912, making it the professional body for insurance practitioners in the United Kingdom. Members are bound by its Code of Ethics, which now sits alongside FCA conduct rules as one of the principal sources of professional standards in the modern market."},
  {ti:"ESG was born in a quietly-titled UN report",
   bd:"The familiar abbreviation ESG was coined in a 2004 report, Who Cares Wins, prepared under the auspices of the United Nations Global Compact. The report argued that environmental, social and governance factors were not soft extras but material drivers of long-term business value. Two decades later, ESG considerations now sit at the heart of every major insurer's strategy, investment policy and risk framework."},
  {ti:"GDPR has a precise birthday",
   bd:"The General Data Protection Regulation took effect across the European Union on 25 May 2018, replacing a patchwork of national data protection laws with a single regime carrying fines of up to four per cent of global turnover. The United Kingdom retained the regime through the UK GDPR after Brexit. Insurance, with its huge appetite for personal data, was reshaped by the new rules almost overnight."}
 ]
};

const RANKS=["Fair","Satisfactory","Good","Very Good","Excellent"];
const SHEET_ICONS=["scales","matrix","warning","shield","pyramid","umbrella"];

/* ================= STATE ================= */
let CT=null; /* current topic */
let S={xp:0,best:0,mastered:[],sorterBest:0,sheetsRead:[]};
function lsKey(){return "insCourseV1:"+(CT?CT.id:"none");}
function loadState(){
  S={xp:0,best:0,mastered:[],sorterBest:0,sheetsRead:[]};
  if(!CT)return;
  try{const x=JSON.parse(localStorage.getItem(lsKey()));if(x)S=Object.assign(S,x);}catch(e){}
  if(!Array.isArray(S.mastered))S.mastered=[];
  if(!Array.isArray(S.sheetsRead))S.sheetsRead=[];
}
function save(){if(!CT)return;try{localStorage.setItem(lsKey(),JSON.stringify(S));}catch(e){}}
function topicProgress(t){
  try{const x=JSON.parse(localStorage.getItem("insCourseV1:"+t.id));
    if(!x)return {xp:0,mast:0,sheets:0,done:false};
    const xp=x.xp||0,mast=(x.mastered||[]).length,sheets=(x.sheetsRead||[]).length;
    return {xp,mast,sheets,done:mast>=15&&sheets>=6};
  }catch(e){return {xp:0,mast:0,sheets:0,done:false};}
}
function addXP(n){S.xp+=n;save();paintXP();}
function level(){return Math.min(Math.floor(S.xp/150),RANKS.length-1);}
function paintXP(){
  const pill=document.getElementById("xpill");
  if(!CT){pill.style.display="none";return;}
  pill.style.display="";
  const l=level();
  pill.innerHTML="SCORE: <b>"+S.xp+"</b> PTS = "+RANKS[l].toUpperCase();
}

let view="select", idx=0, flipped=false;
let qz=null, sr=null, sheetIdx=0, funIdx=0, curSorterIdx=0;

const $=s=>document.querySelector(s), app=document.getElementById("app");
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1700);}
function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(p=>p[1]);}
function stamp(host,txt,cls){if(!host)return;const s=document.createElement("span");s.className="stamp "+(cls||"");s.textContent=txt;host.appendChild(s);setTimeout(()=>s.remove(),1100);}
function esc(s){return (s+"").replace(/&/g,"&amp;").replace(/</g,"&lt;");}

/* ================= TOPIC SELECTOR DROPDOWN ================= */
function buildTopicDD(){
  const dd=document.getElementById("tsdd");
  dd.innerHTML=TOPICS.map(t=>{
    const p=topicProgress(t);
    return `<button class="tsitem ${CT&&CT.id===t.id?"cur":""}" data-tid="${t.id}">
      <span class="tsino">${t.id}</span>
      <span class="tsibd">
        <span class="tsitt">${t.title}${p.done?" ✓":""}</span>
        <span class="tsisb">${t.kicker} · ${p.xp} pts · ${p.mast}/15 cards · ${p.sheets}/6 sheets</span>
      </span></button>`;
  }).join("");
  dd.querySelectorAll("[data-tid]").forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    document.getElementById("tswrap").classList.remove("open");
    pickTopic(b.dataset.tid);
  });
}
function paintTopicBtn(){
  const btn=document.getElementById("tsbtn");
  if(CT){
    btn.innerHTML=`<span class="tslbl"><span class="tsno">${CT.id}</span><span class="tsti">${CT.title}</span></span><span class="tsch">▾</span>`;
  }else{
    btn.innerHTML=`<span class="tslbl"><span class="tsno">▾</span><span class="tsti">Choose a topic to begin</span></span><span class="tsch">▾</span>`;
  }
}
function pickTopic(tid){
  CT=TOPICS.find(t=>t.id===tid)||null;
  loadState();
  paintTopicBtn();
  buildSheetDD();
  document.getElementById("tabs").classList.toggle("hide",!CT);
  idx=0;flipped=false;sheetIdx=0;funIdx=0;curSorterIdx=0;qz=null;sr=null;
  go("home");
}
function buildSheetDD(){
  const f=document.getElementById("ddFacts");
  if(!CT){f.innerHTML="";return;}
  f.innerHTML=`<button class="ddi" data-act="facts"><b>Open library</b><small>Six classically styled reference sheets · printable</small></button>`+
    CT.facts.map((s,i)=>`<button class="ddi" data-act="sheet:${i}"><b>Sheet ${s.n} · ${s.ti}</b><small>${s.kick} · ${s.defs.length} key points</small></button>`).join("");
  f.querySelectorAll(".ddi").forEach(b=>b.onclick=e=>{
    e.stopPropagation();closeDD();
    const a=b.dataset.act;
    if(a.startsWith("sheet:")){sheetIdx=+a.slice(6);go("sheet");}
    else go(a);
  });
}

/* ================= ROUTER ================= */
function go(v){
  if(v!=="quiz"&&qz&&qz.t){clearInterval(qz.t);qz.t=null;}
  if(v!=="sorter"&&sr&&sr.t){clearInterval(sr.t);sr.t=null;}
  view=v;
  document.getElementById("backBtn").classList.toggle("hide",v==="select"||(v==="home"&&CT));
  window.scrollTo({top:0});
  closeDD();setTab();paintXP();
  render();
}
function closeDD(){
  document.querySelectorAll(".tabwrap.open").forEach(w=>w.classList.remove("open"));
  document.getElementById("tswrap").classList.remove("open");
}
function setTab(){
  const map={facts:"facts",sheet:"facts",pack:"facts",study:"study",sorter:"sorter",funfact:"funfact",
             quiz:(qz&&qz.blitz)?"quizB":"quizN"};
  const k=map[view]||"";
  document.querySelectorAll(".tabwrap").forEach(w=>w.classList.toggle("active",w.dataset.t===k));
}
document.querySelectorAll(".tab").forEach(t=>t.onclick=e=>{
  e.stopPropagation();
  const w=t.parentElement,was=w.classList.contains("open");
  closeDD();if(!was)w.classList.add("open");
});
document.getElementById("tsbtn").onclick=e=>{
  e.stopPropagation();
  const w=document.getElementById("tswrap"),was=w.classList.contains("open");
  closeDD();if(!was){buildTopicDD();w.classList.add("open");}
};
document.querySelectorAll(".tabwrap .ddi").forEach(b=>b.onclick=e=>{
  e.stopPropagation();closeDD();
  const a=b.dataset.act;if(!a)return;
  if(a==="quizN"){startQuiz(false);go("quiz");}
  else if(a==="quizB"){startQuiz(true);go("quiz");}
  else if(a==="sorter"){startSorter();go("sorter");}
  else if(a==="funfact"){go("funfact");}
  else go(a);
});
document.addEventListener("click",closeDD);
document.querySelector(".brand").onclick=()=>{CT=null;loadState();paintTopicBtn();document.getElementById("tabs").classList.add("hide");go("select");};
document.getElementById("backBtn").onclick=()=>{
  if(view==="sheet"||view==="pack")go("facts");
  else if(view==="home"&&!CT)return;
  else if(view==="home"){CT=null;loadState();paintTopicBtn();document.getElementById("tabs").classList.add("hide");go("select");}
  else go("home");
};
function render(){
  if(view==="select")return renderSelect();
  if(!CT)return renderSelect();
  if(view==="home")renderHome();
  else if(view==="study")renderStudy();
  else if(view==="quiz")renderQuiz();
  else if(view==="sorter")renderSorter();
  else if(view==="facts")renderFacts();
  else if(view==="sheet")renderSheet();
  else if(view==="pack")renderPack();
  else if(view==="funfact")renderFunFact();
}

/* ================= TOPIC SELECTION (master page) ================= */

  const totals=TOPICS.map(topicProgress);
  const tXP=totals.reduce((a,b)=>a+b.xp,0);
  const tDone=totals.filter(p=>p.done).length;
  app.innerHTML=`
  <div class="fp">
    <div class="fpk">W01 · Award in General Insurance · Revision Platform</div>
    <h1 class="fph">A Revision Resource for W01 — Award in Insurance</h1>
    <p class="fps">Choose a topic below to open the revision platform. Each topic carries fifteen flashcards, six printable fact sheets, a full quiz, a sixty second blitz, a risk sorter and three curated fun facts drawn from the W01 syllabus. Use the pull down at the top to switch between topics at any time. Progress is saved on this device for each topic separately.</p>
  </div>
  <div class="scoresec">
    <div class="statrow">

      <div class="stat"><div class="n">${totals.reduce((a,b)=>a+b.mast,0)}/150</div><div class="l">Cards mastered</div></div>

  </div>
  <div class="tgrid">
    ${TOPICS.map((t,i)=>{const p=totals[i];return `<button class="ttile ${p.done?"done":""}" data-tid="${t.id}">
      <div class="in">
        ${p.done?'<span class="doneb">Complete ✓</span>':""}
        <span class="tno">Topic ${t.id}</span>
        <h3>${t.title}</h3>
        <div class="td">${t.desc}</div>
        <div class="tm">${t.kicker} · ${p.xp} pts · ${p.mast}/15 cards · ${p.sheets}/6 sheets</div>
      </div></button>`;}).join("")}
  </div>
  <div class="resetrow">
    <span class="rlbl" id="resetAllLbl">Reset all progress (all ten topics)</span>
    <button class="rbtn" id="resetAllBtn" aria-label="Reset all progress" title="Reset all progress">↺</button>
  </div>`;
  document.querySelectorAll("[data-tid]").forEach(b=>b.onclick=()=>pickTopic(b.dataset.tid));
  const doResetAll=()=>{
    if(confirm("Reset progress for ALL ten topics? This clears every score, mastered card, streak and sheet read on this device. This cannot be undone.")){
      TOPICS.forEach(t=>{try{localStorage.removeItem("insCourseV1:"+t.id);}catch(e){}});
      loadState();renderSelect();paintXP();
    }
  };
  $("#resetAllBtn").onclick=doResetAll; $("#resetAllLbl").onclick=doResetAll;
}

  <div class="resetrow">
    <span class="rlbl" id="resetLbl">Reset this topic's progress</span>
    <button class="rbtn" id="resetBtn" aria-label="Reset progress" title="Reset progress">↺</button>
  </div>`;
  const doReset=()=>{
    if(confirm("Reset progress for "+CT.title+"? This clears the score, mastered cards, streaks and sheets read for this topic only.")){
      localStorage.removeItem(lsKey());loadState();renderHome();paintXP();
    }
  };
  $("#resetBtn").onclick=doReset; $("#resetLbl").onclick=doReset;
  paintXP();
}

/* ================= FLASHCARDS ================= */
function renderStudy(){
  const CARDS=CT.cards;
  const c=CARDS[idx],done=S.mastered.includes(idx);
  app.innerHTML=`
  <div class="panel" id="card" style="cursor:pointer;min-height:320px">
    ${!flipped?`
      <div class="tag">${c.t}</div>
      <div class="h2">${c.ti}</div>
      <div class="bd"><p>${c.f}</p></div>
      <p class="chint" style="margin-top:18px;font:600 11px var(--mono)">▸ TAP FOR FULL DETAIL</p>`:`
      ${done?'<span class="stamp" style="animation:none">Mastered</span>':""}
      <div class="tag">${c.t} · answer</div>
      <div class="h2">${c.ti}</div>
      <div class="bd"><ul>${c.a.map(x=>`<li>${x}</li>`).join("")}</ul></div>
      <div class="note">${c.n}</div>`}
  </div>
  ${flipped?`<div class="knew">
    <button class="btn b-bad" id="kbad">Need to review</button>
    <button class="btn b-good" id="kgood">${done?"Mastered ✓":"I knew it"}</button></div>`:""}
  <div class="nav">
    <button class="btn ghost" id="prev">‹ Prev</button>
    <button class="btn solid" id="next">Next ›</button>
  </div>
  <div class="progress"><i style="width:${(idx+1)/CARDS.length*100}%"></i></div>
  <div class="meta"><span>CARD ${idx+1} / ${CARDS.length}</span><span>${S.mastered.length} MASTERED</span></div>`;
  $("#card").onclick=()=>{flipped=!flipped;renderStudy();};
  $("#prev").onclick=e=>{e.stopPropagation();idx=(idx-1+CARDS.length)%CARDS.length;flipped=false;renderStudy();};
  $("#next").onclick=e=>{e.stopPropagation();idx=(idx+1)%CARDS.length;flipped=false;renderStudy();};
  if(flipped){
    $("#kgood").onclick=e=>{e.stopPropagation();
      if(!S.mastered.includes(idx)){S.mastered.push(idx);addXP(10);stamp($("#card"),"Mastered");toast("+10 points · "+S.mastered.length+"/15 mastered");}
      save();idx=(idx+1)%CARDS.length;flipped=false;setTimeout(renderStudy,420);};
    $("#kbad").onclick=e=>{e.stopPropagation();
      S.mastered=S.mastered.filter(i=>i!==idx);save();toast("Flagged for review");
      idx=(idx+1)%CARDS.length;flipped=false;renderStudy();};
  }
}

/* ================= QUIZ / BLITZ ================= */
function startQuiz(blitz){
  const CARDS=CT.cards;
  qz={blitz,order:shuffle([...Array(CARDS.length).keys()]),pos:0,score:0,streak:0,answered:false,left:60,t:null};
  if(blitz)qz.t=setInterval(()=>{qz.left--;const e=$("#btimer");if(e)e.textContent=qz.left+"s";if(qz.left<=0){clearInterval(qz.t);quizResult();}},1000);
}
function renderQuiz(){
  const CARDS=CT.cards;
  if(!qz)return startQuiz(false),renderQuiz();
  if(qz.pos>=qz.order.length)return quizResult();
  const c=CARDS[qz.order[qz.pos]];qz.answered=false;
  const opts=shuffle(c.o.map((txt,i)=>({txt,i})));
  app.innerHTML=`
  ${qz.blitz?`<div class="bigtimer" id="btimer">${qz.left}s</div>`:""}
  <div class="panel" id="qpanel">
    <div class="tag">${c.t} · Q${qz.pos+1} OF ${qz.order.length}</div>
    <div class="h2">${c.ti}</div>
    <div class="bd"><p>${c.q}</p></div>
    <div class="opts">${opts.map((o,j)=>`<button class="opt" data-i="${o.i}"><span class="let">${"ABCD"[j]}</span><span>${o.txt}</span></button>`).join("")}</div>
    <div class="explain" id="exp">${c.e}</div>
  </div>
  <div class="nav"><button class="btn solid hide" id="nextq">Next ›</button></div>
  <div class="progress"><i style="width:${qz.pos/qz.order.length*100}%"></i></div>
  <div class="meta"><span>SCORE ${qz.score}</span><span>STREAK ${qz.streak} 🔥</span></div>`;
  document.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
    if(qz.answered)return;qz.answered=true;
    const i=+b.dataset.i;
    document.querySelectorAll(".opt").forEach(x=>{x.onclick=null;if(+x.dataset.i===c.c)x.classList.add("right");});
    if(i!==c.c)b.classList.add("wrong");
    $("#exp").style.display="block";
    if(i===c.c){qz.score++;qz.streak++;addXP(10);
      if(qz.streak>S.best){S.best=qz.streak;save();}
      stamp($("#qpanel"),qz.streak>=3?qz.streak+" STREAK":"Correct");
      if(qz.streak>=3)toast(qz.streak+" in a row! 🔥 +10 points");}
    else{qz.streak=0;stamp($("#qpanel"),"Noted","red");}
    if(qz.blitz){setTimeout(()=>{qz.pos++;if(qz.left>0)renderQuiz();},850);}
    else $("#nextq").classList.remove("hide");
  });
  const nq=$("#nextq");if(nq)nq.onclick=()=>{qz.pos++;renderQuiz();};
}
function quizResult(){
  if(qz.t)clearInterval(qz.t);
  const total=qz.blitz?qz.pos:qz.order.length, pct=total?Math.round(qz.score/total*100):0;
  const badges=[];
  if(qz.score===qz.order.length)badges.push(["Perfect Round","g"]);
  if(S.best>=5)badges.push(["Streak Master ×"+S.best,"o"]);
  if(qz.blitz)badges.push(["Blitz Survivor",""]);
  if(S.mastered.length>=15)badges.push(["Topic Mastered","g"]);
  const msg=pct>=80?"Outstanding — you are underwriting-ready on this topic.":pct>=50?"Solid grasp — revisit the flagged topics.":"Keep going — flip through the flashcards and retry.";
  app.innerHTML=`<div class="panel result">
    <div class="tag">${qz.blitz?"BLITZ COMPLETE":"QUIZ COMPLETE"}</div>
    <div class="big">${qz.score}<small>/${qz.blitz?total:qz.order.length}</small></div>
    <div class="msg">${pct}% correct · best streak ${S.best}<br>${msg}</div>
    <div>${badges.map(b=>`<span class="badge ${b[1]}">${b[0]}</span>`).join("")||'<span class="badge">No badges yet</span>'}</div>
    <div class="nav" style="margin-top:20px">
      <button class="btn ghost" id="rhome">Menu</button>
      <button class="btn solid" id="ragain">Play again</button>
    </div></div>`;
  $("#ragain").onclick=()=>{startQuiz(qz.blitz);renderQuiz();};
  $("#rhome").onclick=()=>go("home");
}

/* ================= FUN FACT ================= */
function renderFunFact(){
  const facts=FUN_FACTS[CT.id]||[];
  if(!facts.length){app.innerHTML='<div class="panel"><p>No fun facts for this topic.</p></div>';return;}
  if(funIdx>=facts.length)funIdx=0;
  const f=facts[funIdx];
  app.innerHTML=`
  <div class="panel" id="fun" style="background:linear-gradient(160deg,#F4ECD8 0%,#E7C766 100%);border-color:#A07E22;box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 16px 38px var(--shadow)">
    <div class="tag" style="color:#5A3D0A">✦ Fun fact · ${funIdx+1} of ${facts.length}</div>
    <div class="h2" style="color:#1B2A4A">${f.ti}</div>
    <div class="bd" style="color:#2A3856"><p>${f.bd}</p></div>
  </div>
  <div class="nav">
    <button class="btn ghost" id="funhome">Menu</button>
    <button class="btn solid" id="funnext" style="flex:2">Another fun fact ›</button>
  </div>
  <div class="meta"><span>FACT ${funIdx+1} / ${facts.length}</span><span>TOPIC ${CT.id} · ${CT.kicker.toUpperCase()}</span></div>`;
  $("#funnext").onclick=()=>{funIdx=(funIdx+1)%facts.length;renderFunFact();};
  $("#funhome").onclick=()=>go("home");
}

/* ================= RISK SORTER ================= */
function startSorter(){
  const pairs=CT.sorters;
  const p=pairs[Math.floor(Math.random()*pairs.length)];
  /* convert items[{t,s}] into [text,side] arrays */
  const deck=p.items.map(it=>[it.t,it.s===0?"L":"R"]);
  sr={p,deck:shuffle(deck),pos:0,score:0,combo:0,left:30,t:null,lock:false,done:false};
  sr.t=setInterval(()=>{sr.left--;const e=$("#stimer");if(e)e.textContent=sr.left+"s";if(sr.left<=0){clearInterval(sr.t);sr.done=true;renderSorter();}},1000);
}
function renderSorter(){
  if(!sr)startSorter();
  if(sr.done)return sorterResult();
  if(sr.pos>=sr.deck.length){sr.done=true;if(sr.t){clearInterval(sr.t);sr.t=null;}return sorterResult();}
  const it=sr.deck[sr.pos];
  app.innerHTML=`
  <div class="bigtimer" id="stimer">${sr.left}s</div>
  <div class="panel sccard" id="spanel">
    <div class="cq">${sr.p.name} · ${esc(sr.p.hint)}</div>
    <div class="sc">${it[0]}</div>
  </div>
  <div class="sorbtns">
    <button class="btn L" data-s="L">◀ ${sr.p.L}</button>
    <button class="btn R" data-s="R">${sr.p.R} ▶</button>
  </div>
  <div class="combo">${sr.combo>=2?"COMBO ×"+sr.combo+" 🔥":""}</div>
  <div class="meta" style="margin-top:6px"><span>SCORE ${sr.score}</span><span>BEST ${S.sorterBest}</span></div>`;
  document.querySelectorAll("[data-s]").forEach(b=>b.onclick=()=>{
    if(sr.lock||sr.done)return;sr.lock=true;
    const ok=b.dataset.s===it[1],pan=$("#spanel");
    if(ok){sr.combo++;sr.score+=10*Math.min(sr.combo,5);addXP(2);pan.classList.add("flash-g");}
    else{sr.combo=0;pan.classList.add("flash-r","shake");}
    setTimeout(()=>{sr.lock=false;sr.pos++;if(!sr.done)renderSorter();},280);
  });
}
function sorterResult(){
  const nb=sr.score>S.sorterBest;
  if(nb){S.sorterBest=sr.score;save();}
  app.innerHTML=`<div class="panel result">
    <div class="tag">RISK SORTER · ${sr.p.name.toUpperCase()}</div>
    <div class="big">${sr.score}</div>
    <div class="msg">${nb?"New personal best! 🏆":"Best so far: "+S.sorterBest}<br>Combos multiply your points — keep the streak alive.</div>
    <div class="nav" style="margin-top:14px">
      <button class="btn ghost" id="shome">Menu</button>
      <button class="btn solid orange" id="sagain">Sort again</button>
    </div></div>`;
  $("#sagain").onclick=()=>{startSorter();renderSorter();};
  $("#shome").onclick=()=>go("home");
}

      <p class="fsintro">${s.intro}</p>

  </div>
  <div class="fsg">
    <div class="fscol">
      <div class="fsbox"><div class="fsband">${s.dhead}</div>
        <div class="fsdefs"><p class="fslede">${s.dlede}</p>
          ${s.defs.map((d,i)=>`<div class="fsi"><span class="fsn">${i+1}</span><p>${d[1]}</p>${med(d[0])}</div>`).join("")}

    </div>
    <div class="fscon">
      <div class="fsband">In summary · ${CT.kicker}</div>

    </div>

</div></div>`;
}
function markRead(i){
  if(!S.sheetsRead.includes(i)){S.sheetsRead.push(i);save();addXP(10);toast("+10 points · Sheet "+CT.facts[i].n+" read");}
}
function renderFacts(){
  const FACTS=CT.facts;
  app.innerHTML=`
  <div class="panel"><div class="hz" style="margin:-24px -22px 16px"></div>
    <div class="tag">Insurance Education Library · 6 Sheets</div>
    <div class="h2">Fact Sheets — ${CT.title}</div>
    <div class="bd"><p>Six classically styled reference sheets covering the topic. Read them on screen for +10 points each, or print the pack — one sheet per page — for the classroom.</p></div>
    <div class="nav" style="margin-top:14px"><button class="btn solid" id="openpack" style="flex:1">🖨 Open print pack — all six sheets</button></div>
  </div>
  <div class="grid">
    ${FACTS.map((s,i)=>`<button class="tile ${i===0?"wide facts":""}" data-sh="${i}"><div class="hz"></div><div class="in">
      ${S.sheetsRead.includes(i)?'<span class="resume">Read ✓</span>':""}
      ${med(SHEET_ICONS[i]||"shield")}
      <div class="eb">Sheet ${s.n} · ${s.kick}</div><h3>${s.ti}</h3>
      <div class="d">${s.blurb}</div><div class="m">${s.defs.length} KEY POINTS · PRINT-READY</div></div></button>`).join("")}
  </div>`;
  document.querySelectorAll("[data-sh]").forEach(b=>b.onclick=()=>{sheetIdx=+b.dataset.sh;go("sheet");});
  $("#openpack").onclick=()=>go("pack");
}
function renderSheet(){
  const FACTS=CT.facts;
  const s=FACTS[sheetIdx];markRead(sheetIdx);
  app.innerHTML=sheetHTML(s)+`
  <div class="nav no-print">
    <button class="btn ghost" id="shprev" ${sheetIdx===0?"disabled":""}>‹ Prev</button>
    <button class="btn solid" id="shprint">🖨 Print</button>
    <button class="btn solid blue" id="shnext" ${sheetIdx===FACTS.length-1?"disabled":""}>Next ›</button>
  </div>
  <div class="meta no-print"><span>SHEET ${sheetIdx+1} / ${FACTS.length}</span><span>${S.sheetsRead.length}/6 READ</span></div>`;
  $("#shprev").onclick=()=>{if(sheetIdx>0){sheetIdx--;window.scrollTo({top:0});renderSheet();}};
  $("#shnext").onclick=()=>{if(sheetIdx<FACTS.length-1){sheetIdx++;window.scrollTo({top:0});renderSheet();}};
  $("#shprint").onclick=()=>window.print();
}
function renderPack(){
  const FACTS=CT.facts;
  let gained=0;
  FACTS.forEach((_,i)=>{if(!S.sheetsRead.includes(i)){S.sheetsRead.push(i);S.xp+=10;gained+=10;}});
  save();paintXP();
  if(gained)toast("+"+gained+" points · full pack opened");
  app.innerHTML=`<div class="nav no-print" style="margin:0 0 14px">
    <button class="btn ghost" id="pkback">‹ Library</button>
    <button class="btn solid" id="pkprint" style="flex:2">🖨 Print / save PDF — 6 pages</button>
  </div>`+FACTS.map(sheetHTML).join("");
  $("#pkback").onclick=()=>go("facts");
  $("#pkprint").onclick=()=>window.print();
}
