facts:[
 {n:"01",kick:"Concept",ti:"The Doctrine of Proximate Cause",
  blurb:"The dominant, efficient cause — not the last in time. The principle that allocates losses to perils.",
  intro:"In every claim, the question must be asked: what caused the loss? The answer is rarely as simple as identifying the last event in time. A roof is damaged by storm; rain then enters and ruins the carpets — what caused the loss to the carpets? The storm, the rain, or both? The doctrine of proximate cause provides the answer: the proximate cause is the active, efficient cause that sets in motion a chain of events bringing about the result, without the intervention of any force started and working actively from a new and independent source.",
  dhead:"The principle and its operation",
  dlede:"The doctrine of proximate cause has the following principal features:",
  defs:[
   ["target","Proximate means efficient, not nearest in time — the dominant cause of the loss."],
   ["link","The chain of causation runs from the initial peril through to the final loss; each link must be considered."],
   ["warning","A novus actus interveniens — a new and independent cause — breaks the chain and becomes the new proximate cause."],
   ["scales","Where multiple causes operate concurrently, the policy wording typically determines the result."],
   ["question","Lord Bacon: 'It were infinite for the law to consider the causes of causes, and their impulsions one of another' — hence the need to identify the proximate cause and stop there."]],
  wrap:"The doctrine is essentially common law, and its modern application is shaped both by the classical cases — Pawsey, Leyland, Coxe — and by express policy wordings that extend or restrict its operation. A practitioner approaching a contested claim must therefore consider both the general principle and the precise words of the policy.",
  chead:"The classic case",cicon:"book",
  callout:"Pawsey v. Scottish Union (1908). The court defined proximate cause as 'the active, efficient cause that sets in motion a chain of events bringing about a result, without the intervention of any force started and working actively from a new and independent source'. This remains the authoritative statement.",
  notes:[
   ["link","Leyland Shipping v. Norwich Union (1918) — a torpedoed ship sank after attempts to save her failed; the proximate cause of the loss was held to be the torpedo, not the subsequent grounding. The case is a powerful illustration of the principle that proximate means efficient, not last in time."],
   ["warning","The Marine Insurance Act 1906, section 55(1), codifies the doctrine for marine business: 'Subject to the provisions of this Act, and unless the policy otherwise provides, the insurer is liable for any loss proximately caused by a peril insured against...'"],
   ["scales","The phrase 'unless the policy otherwise provides' is critical: parties may contract around the common-law position by express wording, and modern policies frequently do so."],
   ["target","The doctrine applies to all classes of insurance, marine and non-marine, life and general — though its practical importance is greatest in property and liability cover where causation is often genuinely in issue."]],
  conicon:"shield",
  conclusion:"Proximate cause is the great connecting principle between peril and loss. Master it, and the analysis of causation in any claim becomes systematic; ignore it, and even straightforward losses can become baffling."},
 {n:"02",kick:"Categories",ti:"Insured, Excluded and Uninsured Perils",
  blurb:"Every peril in a chain of causation falls into one of three categories under the policy. The interactions determine the outcome.",
  intro:"For any policy, every peril that might cause a loss falls into one of three categories: insured perils (expressly covered), excluded perils (expressly excluded), and uninsured or unnamed perils (neither covered nor excluded — simply outside the scope of the policy). When a single peril operates, the result is straightforward; when a chain of perils operates, the rules of proximate cause and the interactions between categories determine recovery.",
  dhead:"The three categories",
  dlede:"The three categories of peril must be carefully distinguished:",
  defs:[
   ["shield","Insured perils — those expressly named in the operative clause, schedule or insuring agreement of the policy."],
   ["warning","Excluded perils — those expressly excluded by exception, condition or general exclusion. The policy will not respond to losses proximately caused by these."],
   ["question","Uninsured (unnamed) perils — those neither expressly insured nor expressly excluded. They fall outside the cover by silence but are not, in principle, the same as excluded perils."],
   ["link","Single cause — the result depends purely on the category of the operating peril."],
   ["target","Multiple causes — the result depends on the relationship between perils in the chain and on the wording of the policy."]],
  wrap:"The distinction between excluded and merely uninsured perils matters because the treatment of consequential damage can differ. Where an insured peril leads in an unbroken chain to damage from an uninsured peril, the consequential damage is usually recoverable; where an excluded peril intervenes or is the starting point, recovery is typically defeated. The wording of the policy may, however, displace these defaults.",
  chead:"A worked illustration",cicon:"matrix",
  callout:"Fire is an insured peril; theft is excluded; smoke damage is neither named nor excluded. A fire breaks out, generates smoke, and during the confusion thieves enter and steal goods. The fire damage and the smoke damage are recoverable (insured + uninsured-consequential); the theft is not (excluded peril in the chain).",
  notes:[
   ["link","Modern all-risks policies invert the structure: cover is provided for all risks of physical loss or damage except as expressly excluded. The doctrine of proximate cause still applies, but the analysis runs through the exclusions rather than the insuring clause."],
   ["warning","The boundary between excluded and uninsured perils can be blurred by general exclusions phrased in broad terms; reading the policy as a whole — exclusions and definitions together — is essential."],
   ["coin","Where a policy is silent on a particular peril and that peril is the sole cause of loss, the loss is simply outside the cover; the analysis ends there. The interesting questions arise in chains and concurrent causation."],
   ["target","Reinsurance treaties often contain bespoke wordings that override the common-law treatment of these categories; the same principles apply, but the wording must always be read first."]],
  conicon:"target",
  conclusion:"The three-fold categorisation of perils is the practical scaffolding on which proximate cause operates. Once each peril in a chain has been placed in its correct category, the rules of causation can be applied with confidence."},
 {n:"03",kick:"Chains",ti:"Chains of Causation — Unbroken and Broken",
  blurb:"When does one peril's setting of the chain in motion control the analysis, and when does a new independent cause take over?",
  intro:"Most of the interesting questions of proximate cause concern chains of events. A peril operates, sets off a sequence of consequences, and the question is whether all the consequent damage is to be attributed to the original peril, or whether a new and independent cause has intervened at some point to break the chain. The answer matters intensely because it determines whether the chain of recovery runs all the way back to an insured peril or stops short at an excluded one.",
  dhead:"Unbroken and broken chains",
  dlede:"The rules on chains may be set out as follows:",
  defs:[
   ["link","An unbroken chain — the original peril remains the proximate cause throughout; the consequential events are merely links flowing from it."],
   ["warning","A broken chain — a new and independent cause (novus actus interveniens) intervenes; from that point onward, it becomes the proximate cause for the subsequent damage."],
   ["question","The intervening cause must be genuinely new and independent — not merely a foreseeable consequence of the original peril."],
   ["target","Foreseeability — a consequence that is the natural and probable result of the original peril does not break the chain, however many intervening links there are."],
   ["scales","Human intervention — deliberate, unreasonable human action can break the chain; reasonable mitigation does not."]],
  wrap:"The classical examples are well known. Storm dislodges tiles; rain enters and damages contents — storm is the proximate cause (unbroken chain). Rider is thrown from his horse, falls into a stream and drowns — being thrown is the proximate cause (unbroken chain). Fire damages a building; a passing thief, unconnected to the fire, exploits the broken windows to steal — theft is the proximate cause of the theft loss (chain broken by independent act).",
  chead:"A famous illustration",cicon:"book",
  callout:"Leyland Shipping v. Norwich Union (1918). A vessel was torpedoed; while attempts were made to save her she ran aground and was lost. The House of Lords held that the proximate cause of the loss was the torpedo — the grounding was a foreseeable consequence in an unbroken chain — and the war exclusion accordingly applied.",
  notes:[
   ["link","The classic test for novus actus is whether the intervening event was 'fresh and independent' — distinct from the original peril and not its natural continuation. Foreseeable consequences are not fresh; deliberate actions of third parties typically are."],
   ["warning","Self-help and reasonable mitigation by the insured do not break the chain. Indeed, the insured is generally under a duty to mitigate; an attempt to do so that itself causes further damage typically falls within the original chain."],
   ["scales","Where the chain is broken, the loss must be divided: the damage up to the break is attributable to the original peril; the damage after is attributable to the intervening cause. Each must be tested against the policy separately."],
   ["question","Some intervening events are sufficiently unusual to break the chain even though foreseeable in a general sense — earthquakes, terrorist attacks, criminal acts. The line is one of judgement; the cases provide guidance but no formula."]],
  conicon:"shield",
  conclusion:"Chains of causation are the meat of proximate-cause analysis. Trace the chain link by link, ask at each step whether the original peril is still the active, efficient cause, and the answer usually emerges with clarity."},
 {n:"04",kick:"Concurrent",ti:"Concurrent Causes",
  blurb:"When two or more perils operate together — and the policy must allocate liability between them.",
  intro:"Sometimes two or more perils operate at the same time, each contributing to the loss but neither alone being sufficient to cause it. The chain-of-causation analysis does not quite fit, because there is no single chain; instead there are two or more concurrent streams of causation that meet at the moment of loss. The principles for handling concurrent causes are well established, but their application depends critically on the exact wording of the policy.",
  dhead:"The principles of concurrent causation",
  dlede:"Where two or more causes operate concurrently:",
  defs:[
   ["scales","Where one cause is insured and the other excluded — and the loss cannot be apportioned between them — the exclusion typically prevails (the insurer has not promised to cover any loss in respect of which the excluded peril plays a part)."],
   ["link","Where one cause is insured and the other uninsured — and the loss cannot be apportioned — the insured peril's contribution is recoverable; the position is, in effect, more favourable to the insured than where there is an exclusion."],
   ["target","Where the loss can be apportioned — for example, by separately identifying which damage was caused by which peril — each part is treated according to its own peril."],
   ["warning","The wording 'directly or indirectly caused by' in an exclusion is intended to capture losses in which the excluded peril plays even a contributory role."],
   ["coin","The wording 'consequential loss' may extend cover to indirect financial consequences of insured perils, or, depending on context, exclude them."]],
  wrap:"In practice, the most contested concurrent-causation cases arise where an insured peril (such as fire) operates together with an excluded peril (such as war). Modern wordings address this directly: 'fire whether directly or indirectly caused by war' is the standard form for excluding war-related fires. Without such wording, the position can be a matter of dispute.",
  chead:"A worked example",cicon:"matrix",
  callout:"A factory is damaged by both flood and earthquake operating concurrently. The policy covers flood but excludes earthquake 'directly or indirectly'. The exclusion will typically prevail: the loss is not recoverable, because the earthquake has played a part — however small — in causing it.",
  notes:[
   ["link","The judicial treatment of concurrent causes has not been entirely uniform. Different jurisdictions and different cases have taken different views on whether the exclusion or the insuring clause should prevail in the silent case."],
   ["warning","The leading modern English authority is Wayne Tank and Pump Co. v. Employers Liability Insurance Corporation (1974), which held that where one of two effective causes is excluded, the exclusion prevails over the insuring clause."],
   ["question","Apportionment is often factually difficult: how does one say which water damage was caused by burst pipes and which by leaking roofs, when both occurred simultaneously? In practice, loss adjusters and the parties often reach a pragmatic settlement that respects the proximate-cause principles."],
   ["coin","Reinsurance and large-risk business often contains explicit causation clauses that determine in advance how concurrent causes are to be treated; their wording may be substantially different from standard market wordings."]],
  conicon:"target",
  conclusion:"Concurrent causation is the most technically demanding part of the doctrine of proximate cause. The general principles are clear; their application depends on the wording, the facts and the willingness of the parties to apportion loss in a sensible way."},
 {n:"05",kick:"Cases",ti:"The Leading Cases on Proximate Cause",
  blurb:"Pawsey, Leyland, Coxe — the trio of cases that shape the modern law of causation in insurance.",
  intro:"The modern law of proximate cause has been shaped by a relatively small number of leading cases. Pawsey v. Scottish Union (1908) supplied the working definition; Leyland Shipping v. Norwich Union (1918) tested it in the demanding context of wartime marine losses; Coxe v. Employers Liability (1916) extended it to personal accident cover. Together they provide a coherent body of authority that practitioners can apply with confidence.",
  dhead:"The leading cases summarised",
  dlede:"The principal cases on proximate cause are these:",
  defs:[
   ["book","Pawsey v. Scottish Union (1908) — the locus classicus of the definition: 'the active, efficient cause that sets in motion a chain of events bringing about a result, without the intervention of any force started and working actively from a new and independent source'."],
   ["target","Leyland Shipping v. Norwich Union (1918) — a torpedoed ship grounded and was lost; House of Lords held the torpedo was the proximate cause; the war exclusion applied; the case shows that proximate means efficient, not last in time."],
   ["warning","Coxe v. Employers Liability (1916) — officer killed by a train in a wartime blackout; military operations held to be the proximate cause; war exclusion applied; the substantive, not the formal, cause is what matters."],
   ["scales","Wayne Tank v. Employers Liability (1974) — concurrent causation; where one cause is excluded, the exclusion typically prevails over the insuring clause."],
   ["link","Marine Insurance Act 1906, s.55 — codifies the doctrine for marine business and provides the statutory starting point."]],
  wrap:"Read together, the cases produce a workable doctrine. Identify each peril in the chain; categorise each as insured, excluded or uninsured; trace the chain of causation; identify the proximate cause; check for novus actus and for concurrent causes; and finally apply the policy wording to the result. With these steps in mind, the most complex causation question becomes a structured analysis rather than a guessing game.",
  chead:"A modern echo",cicon:"matrix",
  callout:"Modern terrorism cover, business interruption policies and cyber wordings are all areas in which proximate-cause questions arise frequently. The principles laid down in the classical cases continue to apply, even as the perils themselves have changed dramatically.",
  notes:[
   ["link","Recent COVID-19 business interruption litigation has put proximate cause back at the centre of commercial attention. The Supreme Court in the FCA Test Case (2021) had to consider how the doctrine applied to cover written before anyone had heard of the pandemic."],
   ["warning","In FCA v. Arch and others, the court held that proximate cause should be interpreted in light of the parties' reasonable commercial expectations — a flexible approach that respects the classical principle while allowing for novel situations."],
   ["target","Cyber and intellectual property cover present their own particular challenges, as the perils are often defined in technical terms and the chains of causation may pass through several stages of digital harm before reaching tangible loss."],
   ["coin","The classical cases will continue to be cited for many decades to come; the doctrine they established has proved remarkably resilient even in the face of perils its authors could never have imagined."]],
  conicon:"shield",
  conclusion:"The leading cases form a coherent body of doctrine that has stood the test of time. Modern challenges are not so much rewriting the rules as applying them to new contexts."},
 {n:"06",kick:"Application",ti:"Applying the Doctrine in Practice",
  blurb:"A systematic approach to causation analysis that turns even the most complex claim into a manageable problem.",
  intro:"Practical application of the doctrine of proximate cause requires a systematic approach. Faced with a claim involving multiple perils, intervening events and competing exclusions, the practitioner needs a clear method that reaches a defensible conclusion. The method below has been refined through generations of practice and applies to virtually every causation question.",
  dhead:"A method for causation analysis",
  dlede:"The recommended approach is:",
  defs:[
   ["target","Step 1 — Identify the loss. What exactly has been damaged or lost? What is the claim?"],
   ["link","Step 2 — Identify each peril in the chain. What events led to the loss? List them in chronological order."],
   ["scales","Step 3 — Categorise each peril. Insured, excluded or uninsured? Read the policy carefully."],
   ["warning","Step 4 — Trace the chain. Is the chain of causation unbroken from the first peril to the loss? Has any novus actus intervened?"],
   ["question","Step 5 — Apply the wording. What does the policy say about 'directly or indirectly', concurrent causation, consequential loss? Does the policy displace the common-law default?"]],
  wrap:"The method is unglamorous but reliable. Most causation disputes that go to court are won and lost on the careful application of these steps, not on dramatic flashes of legal insight. The practitioner who can methodically work through them, with the policy wording in one hand and the facts in the other, will reach the right answer in the great majority of cases.",
  chead:"A practical illustration",cicon:"matrix",
  callout:"A factory suffers a burst pipe (insured peril: escape of water). The water shorts the electrics and a fire breaks out (insured peril: fire). The fire causes structural damage. The chain is unbroken, and both perils are insured; the full loss is recoverable. Method applied, answer reached.",
  notes:[
   ["coin","Where the analysis is genuinely difficult, do not hesitate to instruct a loss adjuster or coverage counsel early. Causation disputes are expensive to litigate; sensible early advice often heads off years of expensive argument."],
   ["link","Documentation matters. The investigation report, the witness statements and the engineer's evidence are what the analysis turns on. Get them right at the outset; do not assume that legal analysis can compensate for weak factual investigation."],
   ["warning","Be alert to the temptation of motivated reasoning. Both sides in a causation dispute have an interest in the answer; the disinterested analysis of the chain is what produces the right result."],
   ["question","Settlements based on a compromise of the causation question are common and often sensible. The doctrine of proximate cause is not always the only consideration: commercial relationships, reputational concerns and the cost of litigation also weigh in the balance."]],
  conicon:"target",
  conclusion:"Proximate cause is a doctrine that rewards careful, methodical application. Approach each claim as a structured analysis, work through the steps, and the most complex causation puzzle reveals its solution."}
]}
,
{id:"07",title:"Indemnity",kicker:"Measure",
desc:"The fundamental principle that the insured may recover no more (and no less) than the actual loss suffered — and the modifications by valued policies, reinstatement, average and excess.",
cards:[
 {t:"01 · Definition",ti:"Castellain v. Preston (1883)",
  f:"Brett L.J.'s celebrated definition — the locus classicus of the indemnity principle.",
  p:"State the definition of indemnity in Castellain v. Preston.",
  a:["'The very foundation, in my opinion, of every rule which has been applied to insurance law is this'","'Namely, that the contract of insurance contained in a marine or fire policy is a contract of indemnity, and of indemnity only'","'And that this contract means that the assured, in the case of a loss against which the policy has been made, shall be fully indemnified, but shall never be more than fully indemnified'","Indemnity and indemnity only — and exact indemnity"],
  n:"The principle prevents the insured from making a profit out of the insurance.",
  q:"The leading case for the principle of indemnity is:",
  o:["Castellain v. Preston","Macaura v. Northern Assurance","Carter v. Boehm","Lucena v. Craufurd"],c:0,
  e:"Castellain established the indemnity principle in its modern form."},
 {t:"02 · Purpose",ti:"The Purpose of Indemnity",
  f:"To restore the insured — neither richer nor poorer — to the position immediately before the loss.",
  p:"State the purpose of the indemnity principle.",
  a:["To restore the insured, as nearly as practicable, to the financial position immediately before the loss","To prevent the insured from making a profit out of the insurance","To remove the moral hazard of incentive to incur or exaggerate loss","To support the wider doctrine of insurable interest"],
  n:"Indemnity is not restitution to the original condition — it is financial restoration.",
  q:"The principle of indemnity restores the insured to:",
  o:["The financial position immediately before the loss","The position when the policy was issued","Any improved position","A guaranteed minimum"],c:0,
  e:"The benchmark is the financial position immediately before the loss."},
 {t:"03 · Indemnity vs benefit",ti:"Indemnity vs Benefit Policies",
  f:"Most insurance is indemnity; life and personal accident are typically benefit policies, not subject to the principle.",
  p:"Distinguish indemnity from benefit policies.",
  a:["Indemnity policies — pay the amount of the actual loss; most property and liability cover","Benefit policies — pay a fixed sum on the happening of an insured event; typically life and personal accident","Benefit policies are not subject to the indemnity principle; the insured may have several policies and recover under each","The classification matters for contribution, subrogation and average"],
  n:"You may insure your own life many times over; you may not insure your house many times over.",
  q:"Which is typically a benefit (non-indemnity) policy?",
  o:["Term life assurance","Buildings insurance","Motor comprehensive","Public liability"],c:0,
  e:"Life cover pays a fixed sum on death and is not an indemnity contract."},
 {t:"04 · Methods",ti:"Methods of Providing Indemnity",
  f:"Cash, repair, replacement, reinstatement — four standard methods, chosen by the insurer at its option.",
  p:"List the methods by which indemnity may be provided.",
  a:["Cash payment — the most common method","Repair — restoring the damaged item","Replacement — providing a new equivalent","Reinstatement — rebuilding or recreating the original (especially buildings)","The choice is generally at the insurer's option, not the insured's"],
  n:"Modern motor policies frequently provide repair or replacement; the insured may not insist on cash.",
  q:"In most general insurance, the choice of indemnity method is:",
  o:["At the insurer's option","At the insured's option","Determined by the courts","Fixed by statute"],c:0,
  e:"The insurer typically reserves the right to choose the method."},
 {t:"05 · Depreciation",ti:"Depreciation and Wear and Tear",
  f:"Indemnity normally takes account of depreciation — replacing old with new gives 'new for old' enrichment.",
  p:"Explain the treatment of depreciation in indemnity.",
  a:["The measure of indemnity is the actual financial loss — typically market value at the time of loss","Where an item has depreciated, the insurer's liability reflects that depreciation","'New for old' replacement gives the insured an item better than what was lost","Special endorsements (e.g. 'new for old') displace the default position and provide full replacement value"],
  n:"Modern household policies very often provide 'new for old' as a contractual benefit — but the default rule is otherwise.",
  q:"Under a basic indemnity policy, a five-year-old item is destroyed. Recovery is normally:",
  o:["The market value at the time of loss","The original cost","The new replacement cost","Nil"],c:0,
  e:"The measure is the actual financial loss — market value with depreciation."},
 {t:"06 · Buildings",ti:"Measuring Indemnity — Buildings",
  f:"For buildings, the measure is normally the cost of reinstatement less depreciation — unless reinstatement cover is specified.",
  p:"State the measure of indemnity for buildings.",
  a:["Cost of reinstatement (rebuilding) at the date of loss","Less depreciation (allowance for age, wear and tear, betterment)","Plus debris removal, professional fees, compliance with current regulations","Where reinstatement cover is specified, no deduction for depreciation"],
  n:"Most modern household and commercial property cover is on a reinstatement basis.",
  q:"Standard indemnity for a building is normally:",
  o:["Reinstatement cost less depreciation","Market value of the building","Insured sum","Original purchase price"],c:0,
  e:"The measure for buildings under indemnity is reinstatement cost less depreciation."},
 {t:"07 · Machinery",ti:"Measuring Indemnity — Machinery and Stock",
  f:"For machinery: depreciated replacement cost. For stock: invoice value at time of loss.",
  p:"State the measure of indemnity for machinery and stock.",
  a:["Machinery — replacement cost less depreciation; or, for older machinery, second-hand market value","Stock-in-trade — replacement cost (invoice value at time of loss), plus carriage and duty, less trade discounts","Work in progress — cost of raw materials plus labour expended","Finished goods — at cost price, not selling price (no profit recoverable under indemnity)"],
  n:"For stock, the principle of indemnity strictly excludes profit margin from recovery.",
  q:"Under a standard indemnity policy, finished goods stock is recovered at:",
  o:["Cost price","Selling price","Replacement cost plus mark-up","Insured sum"],c:0,
  e:"The principle of indemnity excludes profit from the measure."},
 {t:"08 · Liability",ti:"Measuring Indemnity — Liability",
  f:"For liability cover, the measure is the legal liability to the third party, plus defence costs.",
  p:"State the measure of indemnity for liability insurance.",
  a:["The legal liability of the insured to the third party (damages, costs, agreed settlements)","Defence costs, generally including legal fees","Subject to the limit of indemnity and any deductible/excess","The insurer typically controls the conduct of the defence"],
  n:"Liability cover is fundamentally indemnity — the insurer pays what the insured legally owes.",
  q:"The measure of indemnity in liability insurance is:",
  o:["The legal liability of the insured plus defence costs","The full sum insured","Damages only, not costs","A fixed schedule"],c:0,
  e:"Indemnity in liability is the legal liability plus defence costs, subject to limits."},
 {t:"09 · Valued",ti:"Valued Policies",
  f:"An exception to indemnity — the insured value is agreed in advance and binding on both sides.",
  p:"Explain valued policies.",
  a:["The insured value is agreed at inception and binding on both parties at the time of total loss","Common in marine, antiques, fine art and other unique items","On total loss, the agreed value is paid without further proof of value","Partial losses are dealt with on a normal indemnity basis"],
  n:"The agreed value is conclusive on the parties even if it later proves wrong.",
  q:"Under a valued policy on a total loss, the insurer pays:",
  o:["The agreed insured value","The market value at time of loss","Replacement cost","An amount fixed by the court"],c:0,
  e:"The agreed value is paid in full on total loss."},
 {t:"10 · Reinstatement",ti:"Reinstatement Cover",
  f:"A standard modern modification — paying full replacement cost with no deduction for depreciation.",
  p:"Explain reinstatement cover.",
  a:["The policy pays the cost of reinstating the item to its original condition, without deduction for depreciation","'New for old' is the popular description","Subject to the building or item actually being reinstated; otherwise indemnity-only is recoverable","Subject to the 85% (or similar) reinstatement memorandum"],
  n:"Reinstatement cover is now standard in household and commercial property; full indemnity-only cover is increasingly uncommon.",
  q:"Reinstatement cover differs from indemnity in that:",
  o:["There is no deduction for depreciation","There is no excess","No survey is required","No claim notification is needed"],c:0,
  e:"Reinstatement provides full replacement value with no depreciation deduction."},
 {t:"11 · 85% memo",ti:"The 85% Reinstatement Memorandum",
  f:"A modern condition requiring the sum insured to be at least 85% of the full reinstatement value.",
  p:"Explain the 85% reinstatement memorandum.",
  a:["A condition in modern reinstatement policies","The sum insured must be at least 85% of the full reinstatement cost at the time of loss","If under-insured by more than 15%, the reinstatement benefit is forfeited and indemnity only is paid","Average then applies on the indemnity basis"],
  n:"The memorandum corrects under-insurance while giving a 15% tolerance for valuation error.",
  q:"Under the 85% reinstatement memorandum, the insured must:",
  o:["Insure for at least 85% of the full reinstatement value","Pay 85% of the premium upfront","Reinstate within 85 days","Notify within 85 days"],c:0,
  e:"The threshold is an 85% sum insured against full reinstatement cost."},
 {t:"12 · First loss",ti:"First Loss Cover",
  f:"Cover for the first portion of the value at risk — appropriate where total loss is implausible.",
  p:"Explain first loss cover.",
  a:["Cover for a chosen first portion of the maximum possible loss","Appropriate where the insured judges total loss to be highly unlikely","Common in burglary and bullion-type risks where only a portion of the stock could realistically be taken at one time","Average is excluded from the first-loss layer — the chosen sum insured is recoverable in full"],
  n:"First loss cover offers a more economical premium for risks where total loss is implausible.",
  q:"First loss cover is most suitable where:",
  o:["Total loss is implausible — only partial loss is realistic","Total loss is virtually certain","Multiple insurers are involved","The sum insured exceeds the value at risk"],c:0,
  e:"First loss is suited to risks where partial loss alone is plausible."},
 {t:"13 · Average",ti:"Average — Pro Rata Reduction",
  f:"The principle that under-insurance produces a pro rata reduction in claim — even for partial losses.",
  p:"State the principle of average.",

 {t:"14 · Excess",ti:"Excess and Deductible",

facts:[
 {n:"01",kick:"Principle",ti:"The Indemnity Principle — Castellain v. Preston",
  blurb:"The principle that the insured may be fully indemnified — but never more than fully indemnified.",
  intro:"The principle of indemnity is one of the great organising ideas of insurance law. Stated in its classical form by Brett L.J. in Castellain v. Preston (1883), it provides that the contract of insurance is one of indemnity and indemnity only: the insured is to be put back, as nearly as possible, into the financial position he occupied immediately before the loss — neither richer nor poorer. From this single principle flow a remarkable number of practical consequences.",
  dhead:"The principle and its purposes",
  dlede:"The principle of indemnity has the following features:",
  defs:[
   ["scales","Full indemnity — the insured is to be made financially whole for the loss suffered."],
   ["target","No more than indemnity — the insured may not profit from the insurance."],
   ["coin","Financial restoration — not restitution in kind; the measure is in money, even where the method of indemnification is repair or replacement."],
   ["shield","Moral hazard control — by removing the prospect of profit, the principle removes the incentive to incur or exaggerate loss."],
   ["link","Doctrinal foundation — the indemnity principle supports and is supported by insurable interest, contribution and subrogation."]],
  wrap:"The principle applies with full force to most general insurance — property, liability, motor, marine, business interruption — but is modified or displaced in certain classes. Life assurance and personal accident cover are not indemnity contracts; they pay agreed sums regardless of the financial impact of the event. Valued policies, similarly, fix the measure in advance, displacing the indemnity calculation at the time of loss.",
  chead:"The classic statement",cicon:"book",
  callout:"Brett L.J. in Castellain v. Preston (1883): 'The very foundation, in my opinion, of every rule which has been applied to insurance law is this, namely, that the contract of insurance contained in a marine or fire policy is a contract of indemnity, and of indemnity only, and that this contract means that the assured, in the case of a loss against which the policy has been made, shall be fully indemnified, but shall never be more than fully indemnified.'",
  notes:[
   ["link","The principle is not just a rule of measure; it is the doctrinal cement that holds the whole of general insurance together. Without it, contribution would be meaningless, subrogation impossible and insurable interest unmoored."],
   ["coin","The principle is one of legal entitlement, not of underwriting practice. Underwriters may offer cover on terms more generous than indemnity (reinstatement, agreed value) but the underlying entitlement remains capped at indemnity unless varied by contract."],
   ["warning","Departures from indemnity should always be made explicit in the wording. Reinstatement, valued policies and benefit-type covers all depart from indemnity by express agreement; silence on the question gives the indemnity default."],
   ["target","The indemnity principle does not prevent the insured from recovering for true consequential loss — loss of profits, loss of rent, additional expenditure — provided these are themselves expressly covered by the policy."]],
  conicon:"shield",
  conclusion:"Indemnity is the master principle of general insurance. The other doctrines — insurable interest, contribution, subrogation, average — are best understood as servants of indemnity, ensuring that it operates fairly and consistently across the entire system."},
 {n:"02",kick:"Measure",ti:"Measuring Indemnity in Practice",
  blurb:"How indemnity is calculated for different kinds of property, with the principle applied class by class.",
  intro:"The principle of indemnity gives the measure in general terms — the financial position immediately before the loss — but its application requires specific rules for different kinds of property. Buildings, machinery, stock and liability all have their own measures, developed over generations of practice and refined by case law. Knowing the right measure for each is one of the practitioner's most essential skills.",
  dhead:"The measures of indemnity",
  dlede:"The standard measures for different classes are these:",
  defs:[
   ["building","Buildings — reinstatement cost at the date of loss, less depreciation for age and wear; plus debris removal, professional fees and compliance with current regulations."],
   ["target","Machinery — depreciated replacement cost (for machinery still readily available) or second-hand market value (for older or obsolete plant)."],
   ["coin","Stock in trade — replacement cost (invoice value plus carriage and duty, less trade discounts); cost price, not selling price, for finished goods."],
   ["link","Work in progress — cost of raw materials plus labour and overhead expended to date."],
   ["scales","Liability — the legal liability of the insured to the third party (damages, costs, agreed settlements) plus defence costs, subject to limits."]],
  wrap:"In each class, the measure aims to restore the insured to the pre-loss position without permitting profit. The detailed calculation requires evidence of value, and disputes about value are common in larger claims; loss adjusters, surveyors and accountants are the routine professional advisers. Where the policy provides reinstatement cover, depreciation is excluded from the calculation; where valued cover applies, the agreed value displaces the calculation altogether for total loss.",
  chead:"A worked example",cicon:"matrix",
  callout:"A retailer's stock is destroyed by fire. Cost price £80,000; selling price £120,000. Under standard indemnity, recovery is £80,000 — the cost of replacing the stock, not the selling price that would have been achieved. The £40,000 of expected profit can only be recovered under a separate business interruption policy.",
  notes:[
   ["link","The exclusion of profit margin under indemnity is one of the most commonly misunderstood features of stock cover. Insureds frequently assume they will recover the selling value of damaged stock; only business interruption cover will deliver that result."],
   ["warning","Compliance with current regulations is a major issue in reinstatement of older buildings. Modern building regulations may require improvements that did not exist when the building was first constructed; the cost of compliance is generally recoverable under indemnity insofar as it forms part of the reinstatement cost."],
   ["coin","Professional fees — typically 10-15% of building reinstatement costs — should always be considered in setting the sum insured. They are recoverable under standard wordings but only within the overall limit."],
   ["target","Debris removal can be a significant cost, particularly for large industrial or contaminated losses. Most policies provide an additional limit (typically 10% of the building sum) for debris removal."]],
  conicon:"target",
  conclusion:"The measure of indemnity is class-specific but conceptually consistent. Master the measure for each major class, and the great bulk of practical questions on indemnity will resolve themselves."},
 {n:"03",kick:"Methods",ti:"Methods of Providing Indemnity",
  blurb:"Cash, repair, replacement, reinstatement — and the practical choice between them.",
  intro:"Once the measure of indemnity has been established, the next question is the method by which it is delivered to the insured. Modern policies typically reserve to the insurer the choice between four methods: payment in cash, repair of the damaged item, provision of a replacement, or reinstatement of the original. The choice is generally the insurer's, not the insured's, and the practical implications differ significantly.",
  dhead:"The four methods",
  dlede:"The methods of providing indemnity are:",
  defs:[
   ["coin","Cash payment — the most common method; the insured receives a sum of money calculated on the appropriate measure."],
   ["target","Repair — the damaged item is restored to its pre-loss condition, typically by a contractor instructed by the insurer."],
   ["link","Replacement — a new equivalent item is supplied; common in motor and household claims for total losses of stock items."],
   ["building","Reinstatement — the original is rebuilt or reconstructed; the principal method for damaged buildings."]],
  wrap:"The right to choose the method has commercial significance for the insurer. Where repair is cheaper than cash payment, insurers will prefer repair; where reinstatement involves overcoming particular difficulties (planning permission, regulatory compliance), insurers may prefer cash. The insured cannot generally insist on a particular method, though the wording of the policy may provide otherwise.",
  chead:"A practical illustration",cicon:"matrix",
  callout:"A modern motor policy gives the insurer the option of repair, replacement or cash. For a minor accident, repair is invariably the choice; for a total loss of an older vehicle, the cash equivalent of its pre-accident market value is paid; for a very new vehicle, replacement may be offered.",
  notes:[
   ["link","Where the insurer chooses repair, the insurer typically controls the contractor and is responsible for the quality of the work. Disputes about the standard of repair are commonly handled through the insurer's complaints process and, where unresolved, the Financial Ombudsman Service for consumer cases."],
   ["warning","Reinstatement under buildings policies can sometimes take years for complex losses; modern policies often provide for additional rent or alternative accommodation costs during the reinstatement period."],
   ["coin","Cash settlement, while convenient, transfers the risk of accurate reinstatement to the insured. An insured who accepts cash and then fails to reinstate properly cannot return to the insurer for further payment."],
   ["target","Replacement requires careful attention to specification: 'a new equivalent' may be open to interpretation, and disputes about whether the replacement truly matches the original are not uncommon."]],
  conicon:"shield",
  conclusion:"The method of indemnity is at the heart of the practical relationship between insurer and insured at the time of claim. The principle of indemnity sets the measure; the chosen method delivers it."},
 {n:"04",kick:"Modification",ti:"Reinstatement Cover and the 85% Memorandum",
  blurb:"The standard modern modification of indemnity — and the condition that polices it.",
  intro:"Modern household and commercial property cover is rarely indemnity-only. Most policies provide for reinstatement cover — full replacement value with no deduction for depreciation — subject to the 85% (or similar) reinstatement memorandum. The combination provides the insured with full replacement value in the common case while protecting the insurer from gross under-insurance.",
  dhead:"Reinstatement cover and the memorandum",
  dlede:"The standard modern position is as follows:",
  defs:[
   ["building","Reinstatement cover — the policy pays the full cost of reinstating the property, without deduction for depreciation; the insured receives 'new for old'."],
   ["scales","The 85% reinstatement memorandum — provides that the sum insured must be at least 85% of the full reinstatement cost at the time of loss."],
   ["warning","Breach of the memorandum — if the property is under-insured by more than 15%, the reinstatement benefit is lost; indemnity-only cover applies, and average operates on that indemnity basis."],
   ["target","Actual reinstatement required — the benefit applies only if the property is actually reinstated; if the insured chooses not to reinstate, indemnity-only is paid."],
   ["link","Time limits — typically requiring reinstatement to commence within a defined period (often 12 to 24 months)."]],
  wrap:"The 85% memorandum is a calibrated mechanism. It is generous enough to allow for honest valuation error (15% margin), but firm enough to discourage deliberate under-insurance. The combination of reinstatement cover and the memorandum has become the standard structure for most modern property insurance, displacing the older pure-indemnity model.",
  chead:"A worked illustration",cicon:"matrix",
  callout:"A factory has a full reinstatement cost of £1,000,000 and is insured for £900,000 — 90% of the full value. A partial loss of £200,000 occurs. The 85% memorandum is satisfied (insured for above 85%); the full £200,000 is paid on the reinstatement basis, with no deduction for depreciation and no operation of average.",
  notes:[
   ["coin","Setting the sum insured accurately is a continuing professional task. Valuations need to be reviewed regularly — at least every three to five years for fixed assets, and annually for items subject to inflation."],
   ["link","'Day one' reinstatement covers automatically uplift the sum insured during the year to allow for inflation; they are now standard in commercial cover and represent a further refinement of the basic reinstatement structure."],
   ["warning","Where the property is part of a larger building (a leasehold flat in a block), reinstatement may require the cooperation of other owners or insurers; modern policies address this through clear identification of the insured interest."],
   ["target","The 85% margin is conventional, not absolute; some policies use 75%, 80% or other figures. The principle is the same — a tolerance for honest error, with a forfeit for gross under-insurance."]],
  conicon:"target",
  conclusion:"Reinstatement cover with the 85% memorandum is the modern standard. It delivers the practical benefit of full replacement while preserving the insurer's protection against unrealistically low sums insured."},
 {n:"05",kick:"Average",ti:"Average and Under-Insurance",
  blurb:"The condition that turns under-insurance into a costly mistake — even on small partial losses.",
  intro:"The condition of average is one of the more punishing features of standard commercial property cover. Where the sum insured is less than the full value at risk, the insured is treated as his own insurer for the shortfall; on any loss — including a partial loss — the claim is reduced in the same proportion as the under-insurance. The effect can be severe: a property insured for half its true value will recover only half of any partial loss, even one that falls well within the sum insured.",
  dhead:"The operation of average",
  dlede:"The condition of average operates as follows:",
  defs:[
   ["scales","Where the sum insured is less than the value of the property, the insured is regarded as self-insurer for the shortfall."],
   ["target","The recoverable amount is calculated by the formula: sum insured / actual value × loss."],
   ["warning","Average applies to all losses — partial as well as total — though its bite is most evident on partial losses, where it cuts deep into apparently sufficient sums insured."],
   ["link","Average operates on the appropriate measure of indemnity; under reinstatement cover, the relevant value is the full reinstatement cost."],
   ["question","Some policies exclude average — for example, household covers and first loss policies — but commercial property cover almost always includes it."]],
  wrap:"Average is the standard sanction against under-insurance in the property market. It is sometimes criticised as harsh, but it serves a real purpose: without it, insureds would face strong incentives to under-insure, paying low premiums and recovering disproportionately at the time of loss. The condition keeps the system honest.",
  chead:"A worked example",cicon:"matrix",
  callout:"A factory worth £500,000 is insured for £300,000. A partial loss of £100,000 occurs. By average, recovery is £300,000 / £500,000 × £100,000 = £60,000. The insured bears the £40,000 shortfall — a sharp reminder of the cost of under-insurance.",
  notes:[
   ["link","The condition of average works on the value of the insured property at the time of loss, not at inception. A property that has appreciated significantly during the policy term may have moved into a position of under-insurance even though the sum insured was adequate at the start."],
   ["warning","Inflation, especially construction-cost inflation, has at various times made average a serious issue for property insureds. The use of 'day one' reinstatement and index-linked sums insured helps mitigate this risk."],
   ["coin","Modern brokers will typically advise on the adequacy of the sum insured and recommend reviews at appropriate intervals. The professional duty is real: a broker who fails to advise on the operation of average may be exposed to a claim for negligence."],
   ["target","Special clauses — 'special condition of average', 'pro rata condition of average', '75% average' and variants — modify the standard operation. Each must be read carefully on its own terms."]],
  conicon:"shield",
  conclusion:"Average is the price of under-insurance. The arithmetic is unforgiving but the principle is sound: those who pay for half the cover should recover for half the loss."},
 {n:"06",kick:"Variations",ti:"Departures from Indemnity",
  blurb:"Valued policies, first loss cover and benefit policies — the structured exceptions to the indemnity principle.",
  intro:"The principle of indemnity is the default, but several structured exceptions are recognised in market practice. Valued policies fix the measure in advance, displacing the indemnity calculation for total loss. First loss cover provides a chosen portion of the value at risk, excluding average from the relevant layer. Benefit policies — life, personal accident, critical illness — pay fixed sums regardless of financial impact. Each exception serves a recognised commercial purpose.",
  dhead:"The principal departures from indemnity",
  dlede:"The recognised exceptions to indemnity are:",
  defs:[
   ["target","Valued policies — the insured value is agreed in advance and conclusive on total loss; common in marine, antiques and fine art."],
   ["scales","First loss cover — the insured covers a chosen first portion of the value at risk; appropriate where total loss is implausible; average is excluded from the first-loss layer."],
   ["link","Reinstatement cover — full replacement value with no deduction for depreciation; in practical effect, an upgrade from pure indemnity to full replacement."],
   ["shield","Benefit policies — life, personal accident, critical illness — pay fixed sums on the happening of insured events without reference to financial loss."],
   ["coin","Agreed value cover — common in motor cover for classic or collectible vehicles; the value is agreed at inception and binding on total loss."]],
  wrap:"Each departure has its own logic. Valued cover removes the difficulty of valuing unique items at the time of loss; first loss cover provides economical cover where total loss is implausible; reinstatement cover responds to insureds' reasonable expectation of full replacement; benefit policies serve a different purpose altogether, providing a fixed financial outcome on the happening of a specified event. Together they fill the gaps that pure indemnity would leave.",
  chead:"A modern application",cicon:"book",
  callout:"A jewellery retailer holds stock worth £2,000,000 across a chain of branches. Total loss in any one event is implausible — the maximum exposure in any single break-in is judged to be £200,000. First loss cover for £250,000 is taken, providing the appropriate level of protection at a fraction of the cost of full-value cover.",
  notes:[
   ["link","Valued policies require care at inception. The agreed value should be reviewed periodically; while it is conclusive at the time of total loss, an out-of-date valuation can leave the insured significantly under- or over-insured in fact."],
   ["warning","First loss cover offers no protection if the maximum possible loss is actually greater than expected. The insured must judge realistically; over-confidence in the unlikelihood of larger losses can prove expensive."],
   ["coin","Benefit policies are not subject to contribution: the insured may have several life policies and recover under each on death, with no apportionment between insurers. This is one of the most practically important distinctions between benefit and indemnity cover."],
   ["target","Modern wordings increasingly blur the line between indemnity and benefit. Many household policies are essentially benefit policies for certain categories (single articles up to a stated value) while being indemnity policies for the rest. Reading the schedule carefully is essential."]],
  conicon:"target",
  conclusion:"The departures from indemnity are not exceptions to a rule — they are deliberate choices made for sound commercial reasons. Knowing when each applies, and how it modifies the indemnity calculation, is part of the standard professional toolkit."}
]}

{id:"08",title:"Contribution and Subrogation",kicker:"Corollaries",
desc:"Two corollaries of the indemnity principle — preventing the insured from recovering twice for the same loss, and preserving the insurer's right to recover from third parties responsible.",
cards:[
 {t:"01 · Contribution",ti:"Contribution Defined",
  f:"The right of one insurer to call on others to share the burden of a loss for which they are concurrently liable.",
  p:"State the definition of contribution.",
  a:["A right at law (and modified by contract)","Whereby an insurer who has paid a claim","May call on other insurers covering the same insured for the same loss","To contribute their rateable proportion of the indemnity"],
  n:"Contribution is the corollary of indemnity — it stops the insured recovering twice.",
  q:"Contribution arises where:",
  o:["Two or more policies cover the same insured for the same loss","An insurer pays more than the sum insured","The insured has a benefit policy","Reinsurance is involved"],c:0,
  e:"Contribution operates between insurers on the same loss for the same insured."},
 {t:"02 · Conditions",ti:"Conditions for Contribution",
  f:"Five conditions must all be satisfied for contribution to arise.",
  p:"List the conditions for contribution.",
  a:["Two or more policies of indemnity must exist","Covering a common interest","Against a common peril","On the same subject matter","Each policy must be liable for the loss (not excluded or expired)"],
  n:"All five must be present; the absence of any one defeats contribution.",
  q:"Which is NOT a condition of contribution?",
  o:["The policies must have been issued by the same insurer","Same insured","Same subject matter","Same peril"],c:0,
  e:"Different insurers is precisely the point — contribution operates between distinct insurers."},
 {t:"03 · Sources",ti:"Sources of Contribution",
  f:"Contribution arises both at common law and under express policy provisions.",
  p:"Explain the sources of contribution.",
  a:["At common law — equity prevents the insured profiting from double cover","By contract — most modern policies contain a 'rateable proportion' or 'contribution' clause","Each insurer pays only its rateable share, not the full claim","The insured cannot demand full payment from one insurer when others are liable"],
  n:"Common-law equity and policy wording typically reach the same result by different paths.",
  q:"Contribution clauses in modern policies typically provide that:",
  o:["The insurer pays only its rateable proportion","The insurer pays in full first and recovers later","The insured chooses which insurer to claim from","No contribution applies in any case"],c:0,
  e:"Modern policies restrict the insurer to its rateable proportion."},
 {t:"04 · Methods",ti:"Methods of Calculation",
  f:"Two methods are used — sum insured method (simpler) and independent liability method (fairer for differing limits).",
  p:"State the two methods of calculating contribution.",
  a:["Sum insured method — each insurer contributes in proportion to its sum insured","Independent liability method — each insurer first calculates what it would have paid alone (ignoring the other policy), then contributes in that proportion","Sum insured method is older and simpler but can produce unfair results where policies have very different limits","Independent liability method is now more commonly used"],
  n:"For most ordinary cases the two methods produce similar results; in unusual cases they can diverge sharply.",
  q:"Independent liability method calculates contribution by reference to:",
  o:["What each insurer would have paid in the absence of the other policy","The total sums insured","The premiums paid","Court order"],c:0,
  e:"Independent liability is calculated as if each policy stood alone."},
 {t:"05 · Sum insured",ti:"Worked Example — Sum Insured Method",
  f:"A simple proportion based on sums insured.",
  p:"Apply the sum insured method to a worked example.",
  a:["Insurer A sum insured £100,000; Insurer B sum insured £200,000","Total sum insured £300,000","Loss of £30,000","Insurer A contributes 100/300 × 30,000 = £10,000","Insurer B contributes 200/300 × 30,000 = £20,000"],
  n:"Each insurer pays in proportion to the sum it insured.",
  q:"Sum insured method: A £50k, B £150k; loss £40k. A pays:",
  o:["£10,000","£20,000","£30,000","£40,000"],c:0,
  e:"50/200 × 40,000 = £10,000."},
 {t:"06 · Independent",ti:"Worked Example — Independent Liability",
  f:"Each insurer first calculates standalone liability, then shares pro rata.",
  p:"Apply the independent liability method to a worked example.",
  a:["A would have paid £25,000 alone; B would have paid £15,000 alone","Total of standalone liabilities = £40,000","Actual loss = £30,000","A contributes 25/40 × 30,000 = £18,750","B contributes 15/40 × 30,000 = £11,250"],
  n:"This method is fairer where the policies have different layers or sublimits.",
  q:"Independent liability method first asks:",
  o:["What each insurer would have paid alone, ignoring the other policy","What the total sums insured are","Who paid first","What the court decides"],c:0,
  e:"Standalone liability is the starting calculation."},
 {t:"07 · Non-contribution",ti:"Non-Contribution Clauses",
  f:"Modern policies frequently include 'excess', 'other insurance' or 'non-contribution' clauses to control the position.",
  p:"Explain non-contribution clauses.",
  a:["A clause stating the policy will not contribute where other insurance is in force","Or that the policy will be excess to any other insurance","Or that the policy will not respond at all if any other insurance is available","Where two policies each have non-contribution clauses, the courts strive to give each effect — sometimes resulting in apportionment between them"],
  n:"The 'excess of other insurance' clause is now standard in many lines.",
  q:"A non-contribution clause typically provides that the policy:",
  o:["Will be excess to any other available insurance","Pays full and seeks recovery","Doubles its payment","Surrenders the claim"],c:0,
  e:"Non-contribution clauses make the policy excess or non-responsive when other cover exists."},
 {t:"08 · Subrogation",ti:"Subrogation Defined",
  f:"The insurer's right to step into the shoes of the insured and pursue recovery from third parties.",
  p:"State the definition of subrogation.",
  a:["The right of one party (the insurer) to step into the shoes of another (the insured)","To enforce any rights and remedies the insured may have against third parties","In respect of the loss for which the insurer has paid an indemnity","Arises by operation of common law and is usually reinforced by contractual provision"],
  n:"Subrogation prevents the insured making a double recovery — from both insurer and the responsible third party.",
  q:"Subrogation is the insurer's right to:",
  o:["Step into the insured's shoes and pursue third parties","Reduce the claim payable","Cancel the policy","Demand additional premium"],c:0,
  e:"Subrogation is the right to enforce the insured's rights against third parties."},
 {t:"09 · Castellain","ti":"Subrogation and Castellain v. Preston",
  f:"The same case that defined indemnity also articulated the principle of subrogation in modern terms.",
  p:"State the connection between Castellain and subrogation.",
  a:["Castellain held that insurance is a contract of indemnity and indemnity only","Without subrogation, the insured could recover from both insurer and a responsible third party — a double recovery","Subrogation is therefore necessary to give effect to indemnity","Brett L.J.: the insurer is entitled to the advantage of every right which the insured may have"],
  n:"Indemnity and subrogation are two sides of the same doctrinal coin.",
  q:"Subrogation gives effect to the principle that:",
  o:["The insured should not recover more than indemnity","The insurer should be paid first","Premium should be calculated by risk","Courts should respect contracts"],c:0,
  e:"Subrogation prevents double recovery and supports indemnity."},
 {t:"10 · Yorkshire",ti:"Yorkshire Insurance v. Nisbet Shipping (1962)",
  f:"The principle that the insurer cannot recover more than it has paid — even where subrogation produces a windfall.",
  p:"State the rule in Yorkshire Insurance v. Nisbet Shipping.",
  a:["Yorkshire paid £72,000 to Nisbet for the loss of a ship","Some years later, currency depreciation produced a recovery of £127,000 from the third party","The court held that Yorkshire could recover only the £72,000 it had paid","The insurer is not entitled to make a profit through subrogation"],
  n:"The case is symmetrical with Castellain: just as the insured cannot profit, neither can the insurer.",
  q:"Yorkshire v. Nisbet establishes that the insurer in subrogation:",
  o:["Cannot recover more than it has paid out","May recover up to the third party's full liability","Owns the cause of action absolutely","Receives all recovery interest free"],c:0,
  e:"Recovery is capped at what the insurer paid; any excess goes to the insured."},
 {t:"11 · Sources of recovery",ti:"Sources of Subrogated Recovery",
  f:"Tort, contract, statute — three streams of legal liability against third parties.",
  p:"List the sources of subrogated recovery.",
  a:["Tort — negligence, nuisance, trespass against a wrongdoer","Contract — breach of contract by a third party (e.g. faulty work by a contractor)","Statute — Riot Damages Act 1886 (against police authority), employer's recovery under MIB schemes, etc.","Indemnity arising from any other source the insured has against a third party"],
  n:"The insurer takes the insured's rights, whatever their source.",
  q:"A statutory source of subrogated recovery is:",
  o:["The Riot Damages Act 1886","The Theft Act 1968","The Sale of Goods Act 1979","The Companies Act 2006"],c:0,
  e:"Riot Damages Act provides statutory recovery against police authority for riot damage."},
 {t:"12 · Lister",ti:"Lister v. Romford Ice (1957)",
  f:"A controversial case on subrogation between employer and employee — leading to a market 'gentlemen's agreement'.",
  p:"State the rule in Lister v. Romford Ice.",
  a:["A lorry driver employed by Romford negligently injured his own father, a fellow employee","Romford's employers' liability insurer paid damages, then sought to subrogate against the negligent son","The House of Lords held that the employer (and so the insurer) was entitled to recover from the employee","The decision led to a market agreement that subrogation rights against fellow employees would not generally be exercised — the 'gentlemen's agreement'"],
  n:"The case shows the human cost of strict subrogation and the market's pragmatic response.",
  q:"The market response to Lister v. Romford Ice was:",
  o:["An agreement not to exercise subrogation against fellow employees","An Act of Parliament reversing the decision","An EU directive","No change at all"],c:0,
  e:"The market agreed not to exercise subrogation rights against fellow employees."},
 {t:"13 · Hold harmless",ti:"Hold Harmless and Waiver",
  f:"The insured may have waived recovery against a third party by contract — affecting the insurer's subrogation rights.",
  p:"Explain hold harmless agreements and waiver clauses.",
  a:["A contractual provision by which one party agrees not to hold another liable for loss","Common in construction contracts, leases and commercial agreements","If signed before the loss, the insured may have waived rights the insurer would otherwise have subrogated","If signed after the loss without the insurer's consent, this may breach the policy condition preserving subrogation rights"],
  n:"The timing of any waiver is crucial — before or after the loss?",
  q:"A hold harmless agreement signed before the loss:",
  o:["May extinguish the rights the insurer could otherwise subrogate","Has no effect on insurance","Always voids the policy","Is enforceable only by the insurer"],c:0,
  e:"Pre-loss waivers extinguish the right; the insurer takes the rights as they stand."},
 {t:"14 · Conditions",ti:"When Subrogation Arises",
  f:"Subrogation typically arises only when the insurer has paid the claim — not before.",
  p:"State when subrogation arises.",
  a:["At common law, subrogation rights arise only when the insurer has actually paid the claim","Until then, the insured retains the right to pursue the third party","Most modern policies override this by clause, permitting the insurer to control any recovery action even before payment","The policy may also require the insured to take all reasonable steps to preserve rights against third parties"],
  n:"Until payment, the right to sue belongs to the insured; the insurer controls only by contract.",
  q:"At common law, subrogation arises:",
  o:["When the insurer has paid the claim","When the policy is issued","When the loss occurs","On the insured's request"],c:0,
  e:"Common-law subrogation requires actual payment of the claim."},
 {t:"15 · Benefit policies",ti:"Subrogation in Benefit Policies",
  f:"Benefit policies are not contracts of indemnity — and so neither contribution nor subrogation generally applies to them.",
  p:"Explain why subrogation does not apply to benefit policies.",
  a:["Subrogation is a corollary of the indemnity principle","Benefit policies — life, personal accident, critical illness — are not contracts of indemnity","The insured may have several benefit policies and recover under each","The insurer who pays a benefit policy has no subrogation rights against third parties","The same applies, by extension, to contribution between such policies"],
  n:"Benefit policies stand outside the indemnity machinery altogether.",
  q:"An insured holds two life policies. On death, the dependants:",
  o:["Recover the full sum on each policy","Recover one in full and the other not at all","Recover proportionate amounts","Have to elect between them"],c:0,
  e:"Life policies are benefit policies; both pay in full."}
],
